<script>
    // 🔗 ใช้ API URL เดียวกับที่หน้า Admin ของน้าทำงานได้ถูกต้องเป๊ะๆ ครับ
    const API_URL = "https://script.google.com/macros/s/AKfycbxlmkzdGMjeP_kLTLvtKe6BVi0tqsp8I0WWDF6Xp8sa4bBfpEnti6rXxyOvRymefyrd/exec";
    
    let categoriesStructure = {}; // เก็บกลุ่มหลักและกลุ่มย่อย
    let cachedMenus = [];          // เก็บรายการอาหารทั้งหมดที่ดึงมาจากฐานข้อมูล
    let currentMainGroup = "";     // กลุ่มหลักที่ลูกค้าเลือกอยู่ปัจจุบัน (เช่น Food, Wine)

    // 🚀 ฟังก์ชันเริ่มต้นระบบเมื่อหน้าเว็บโหลดเสร็จ
    async function initializeApp() {
        showLoadingState(true);
        await fetchCategories();
        await fetchAllMenus();
        showLoadingState(false);
    }

    // 📁 ดึงโครงสร้างหมวดหมู่หลักและหมวดหมู่ย่อยจากเซิร์ฟเวอร์
    async function fetchCategories() {
        try {
            const response = await fetch(`${API_URL}?action=getCategories`);
            const result = await response.json();
            
            if (result.success && Object.keys(result.structure).length > 0) {
                categoriesStructure = {};
                Object.keys(result.structure).forEach(key => {
                    const trimmedKey = key.trim();
                    categoriesStructure[trimmedKey] = result.structure[key].map(sub => sub.trim());
                });
            } else {
                // ข้อมูลจำลองสำรองในกรณีคลาวด์ไม่ส่งค่ากลับมาครับน้า
                categoriesStructure = { "Food": [], "Beverage": [], "Wine": [] };
            }
            
            // ตั้งค่ากลุ่มแรกเป็นกลุ่มเริ่มต้น (Default Active Tab)
            const mainGroups = Object.keys(categoriesStructure);
            if (mainGroups.length > 0) {
                currentMainGroup = mainGroups[0];
            }
            
            renderCategoryTabs();
        } catch (error) {
            console.error("โหลดกลุ่มหมวดหมู่ล้มเหลว:", error);
            categoriesStructure = { "Food": [], "Beverage": [], "Wine": [] };
            currentMainGroup = Object.keys(categoriesStructure)[0];
            renderCategoryTabs();
        }
    }

    // 📋 ดึงรายการอาหารทั้งหมดในระบบ
    async function fetchAllMenus() {
        try {
            const response = await fetch(API_URL);
            const result = await response.json();
            if (result.success && result.menus) {
                // 🎯 คัดกรองเฉพาะเมนูที่มีสถานะเป็น "available" (เปิดขาย) เท่านั้นตามเงื่อนไขหน้าเว็บลูกค้าครับ
                cachedMenus = result.menus.filter(item => (item.status || "").trim() === "available");
                renderMenuDisplay();
            } else {
                renderEmptyState("ไม่พบรายการอาหารที่เปิดให้บริการในขณะนี้ครับน้า");
            }
        } catch (error) {
            console.error("ดาวน์โหลดเมนูอาหารล้มเหลว:", error);
            renderEmptyState("เกิดข้อผิดพลาดในการโหลดข้อมูลเมนูอาหาร กรุณารีเฟรชหน้าใหม่อีกครั้งครับ");
        }
    }

    // 🏷️ สร้างและแสดงผลแท็บหมวดหมู่หลัก (Main Groups) ด้านบน
    function renderCategoryTabs() {
        const tabContainer = document.getElementById("categoryTabsContainer"); // แก้ไอดีให้ตรงกับใน HTML ของน้านะครับ
        if (!tabContainer) return;

        tabContainer.innerHTML = "";
        Object.keys(categoriesStructure).forEach(mainGroup => {
            const isActive = mainGroup === currentMainGroup;
            const activeClass = "bg-amber-500 text-slate-950 font-bold shadow-lg shadow-amber-500/20 border-amber-500";
            const inactiveClass = "bg-slate-900 border-slate-800 text-slate-400 hover:text-slate-100 hover:border-slate-700";
            
            tabContainer.innerHTML += `
                <button type="button" onclick="switchMainCategory('${mainGroup}')" class="px-5 py-2.5 rounded-xl text-sm border font-medium transition cursor-pointer whitespace-nowrap ${isActive ? activeClass : inactiveClass}">
                    ${mainGroup}
                </button>
            `;
        });
    }

    // 🔄 สลับหมวดหมู่หลักเมื่อลูกค้าคลิกเลือกแท็บ
    function switchMainCategory(mainGroup) {
        currentMainGroup = mainGroup;
        renderCategoryTabs(); // วาดปุ่มใหม่ให้แสดงสถานะ Active
        renderMenuDisplay();  // รีเฟรชรายการอาหารด้านล่าง
    }

    // 🍽️ แสดงการ์ดรายการเมนูอาหารแยกตามกลุ่มหลัก และแบ่งกลุ่มย่อยในหน้านั้นๆ
    function renderMenuDisplay() {
        const menuContainer = document.getElementById("menuGridContainer"); // แก้ไอดีให้ตรงกับตู้แสดงการ์ดเมนูของน้าครับ
        if (!menuContainer) return;

        menuContainer.innerHTML = "";
        
        // กรองเอาเฉพาะอาหารที่ตรงกับกลุ่มหลักที่เลือกปัจจุบัน
        const currentMenus = cachedMenus.filter(item => (item.main_group || "").trim() === currentMainGroup);

        if (currentMenus.length === 0) {
            renderEmptyState(`ขณะนี้ยังไม่มีเมนูในหมวดหมู่ ${currentMainGroup} พร้อมให้บริการครับน้า`);
            return;
        }

        // จัดกลุ่มอาหารตามกลุ่มย่อย (Sub Group) เพื่อความสวยงามในการแสดงผล
        const menusBySubGroup = {};
        
        currentMenus.forEach(item => {
            const sub = (item.sub_group || "").trim() || "เมนูแนะนำ";
            if (!menusBySubGroup[sub]) menusBySubGroup[sub] = [];
            menusBySubGroup[sub].push(item);
        });

        // วาดรายการอาหารออกหน้าจอ
        Object.keys(menusBySubGroup).forEach(subGroup => {
            // สร้างหัวข้อกลุ่มย่อย (เช่น Soup, Dessert)
            let subGroupHTML = `
                <div class="col-span-full mt-6 mb-2 border-l-4 border-amber-500 pl-3">
                    <h3 class="text-md font-bold text-slate-200 uppercase tracking-wide">${subGroup}</h3>
                </div>
            `;
            
            // วาดการ์ดเมนูอาหารแต่ละรายการในกลุ่มย่อยนั้น
            menusBySubGroup[subGroup].forEach(item => {
                const imgTag = item.image_url 
                    ? `<img src="${item.image_url}" class="w-full h-48 object-cover rounded-xl transition duration-500 group-hover:scale-105" alt="${item.menu_name_th}">` 
                    : `<div class="w-full h-48 bg-slate-900 rounded-xl flex flex-col items-center justify-center text-slate-600 border border-slate-800"><i class="fa-regular fa-image text-3xl mb-2"></i><span class="text-xs">No Image</span></div>`;
                
                const descTH = item.description_th ? `<p class="text-xs text-slate-400 mt-1 line-clamp-2">${item.description_th}</p>` : '';
                const descEN = item.description_en ? `<p class="text-[11px] text-slate-500 italic line-clamp-1">${item.description_en}</p>` : '';

                subGroupHTML += `
                    <div class="group bg-slate-900/40 border border-slate-900 rounded-2xl p-4 backdrop-blur-sm hover:border-slate-800 transition duration-300 flex flex-col justify-between">
                        <div>
                            <div class="overflow-hidden rounded-xl mb-3 relative">
                                ${imgTag}
                                <span class="absolute top-2.5 right-2.5 bg-slate-950/80 backdrop-blur-md text-amber-500 border border-slate-800 text-[10px] font-bold px-2 py-0.5 rounded-lg font-mono">
                                    #${item.product_no}
                                </span>
                            </div>
                            <h4 class="text-sm font-bold text-slate-100 group-hover:text-amber-500 transition">${item.menu_name_th}</h4>
                            <h5 class="text-xs text-slate-400 font-normal font-sans">${item.menu_name_en}</h5>
                            ${descTH}
                            ${descEN}
                        </div>
                        <div class="flex items-center justify-between mt-4 pt-3 border-t border-slate-900/60">
                            <span class="text-md font-bold text-emerald-400 font-mono">฿${parseFloat(item.price_thb || 0).toLocaleString()}</span>
                            <button type="button" onclick="addMenuToCart('${item.product_no}')" class="bg-slate-100 hover:bg-white text-slate-950 text-xs font-bold px-3 py-1.5 rounded-xl transition cursor-pointer flex items-center space-x-1">
                                <i class="fa-solid fa-plus text-[10px]"></i>
                                <span>สั่งอาหาร</span>
                            </button>
                        </div>
                    </div>
                `;
            });

            menuContainer.innerHTML += subGroupHTML;
        });
    }

    // 🚫 แสดงข้อความกรณีไม่มีข้อมูลพร้อมแสดงผล
    function renderEmptyState(message) {
        const menuContainer = document.getElementById("menuGridContainer");
        if (menuContainer) {
            menuContainer.innerHTML = `
                <div class="col-span-full py-16 text-center text-slate-500">
                    <i class="fa-regular fa-folder-open text-3xl text-slate-700 mb-3 block"></i>
                    <p class="text-sm max-w-md mx-auto">${message}</p>
                </div>
            `;
        }
    }

    // ⏳ แสดง/ซ่อนสถานะการโหลดข้อมูล
    function showLoadingState(isLoading) {
        const menuContainer = document.getElementById("menuGridContainer");
        if (menuContainer && isLoading) {
            menuContainer.innerHTML = `
                <div class="col-span-full py-20 text-center text-slate-400">
                    <i class="fa-solid fa-circle-notch animate-spin text-2xl text-amber-500 mb-3 block"></i>
                    <p class="text-xs uppercase tracking-wider font-mono">กำลังเชื่อมต่อฐานข้อมูลศูนย์คลาวด์...</p>
                </div>
            `;
        }
    }

    // 🛒 ตัวอย่างฟังก์ชันรองรับระบบการกดเพิ่มเมนูลงตะกร้า (ปรับแต่งเพิ่มเติมตามลอจิกตะกร้าของน้าได้เลยครับ)
    function addMenuToCart(productId) {
        console.log("เพิ่มเมนูลงตะกร้า รหัสสินค้า:", productId);
        // หากน้ามีฟังก์ชันจัดการตะกร้าของเดิม ให้ย้ายลอจิกมาต่อในนี้ได้เลยครับน้า
    }

    // โหลดฟังก์ชันเริ่มต้นทันทีเมื่อหน้าเว็บเปิดตัว
    window.onload = initializeApp;
</script>
