<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased custom-scrollbar">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
    </script>

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2 rounded-lg text-gray-900">
                    <i class="fas fa-utensils text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide text-amber-400">ROOM SERVICE</h1>
                    <p class="text-xs text-gray-400" id="text-header-subtitle">สั่งอาหารสะดวก ส่งตรงถึงห้องพัก</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <div class="bg-gray-900 border border-gray-700 p-1 rounded-xl flex space-x-1 text-xs font-bold">
                    <button onclick="changeLanguage('th')" id="lang-btn-th" class="px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950">TH</button>
                    <button onclick="changeLanguage('en')" id="lang-btn-en" class="px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white">EN</button>
                </div>

                <button onclick="toggleCartModal(true)" class="relative bg-amber-500 hover:bg-amber-400 text-gray-950 px-4 py-2 rounded-full font-bold flex items-center space-x-2 transition cursor-pointer shadow-md">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="hidden sm:inline" id="text-btn-cart">ตะกร้าของฉัน</span>
                    <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex space-x-2 border-b border-gray-700 pb-4 mb-6 overflow-x-auto" id="main-group-tabs"></div>
        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2" id="sub-group-chips"></div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 sm:gap-6" id="menu-container">
            <div class="col-span-full text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl text-amber-500 mb-3"></i>
                <p id="text-loading-menu">กำลังโหลดเมนูอาหารแสนอร่อย...</p>
            </div>
        </div>
    </main>

    <div id="condiment-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-md w-full shadow-2xl overflow-hidden p-6">
            <h3 class="text-lg font-bold text-amber-400 mb-1 flex items-center">
                <i class="fas fa-sliders-h mr-2"></i> <span id="text-condiment-title">ตัวเลือกเพิ่มเติม / Option</span>
            </h3>
            <p id="condiment-menu-name" class="text-xs text-gray-300 font-semibold mb-4 border-b border-gray-700 pb-2">ชื่อเมนู</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[11px] font-semibold text-gray-400 mb-2" id="text-condiment-label-select">เลือกรูปแบบ / ตัวเลือกเสริม</label>
                    <div class="grid grid-cols-2 gap-2" id="condiment-options-container"></div>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-gray-400 mb-1" id="text-condiment-label-note">ระบุรายละเอียดเพิ่มเติม (ถ้ามี)</label>
                    <input type="text" id="condiment-custom-note" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="flex space-x-3 mt-5">
                <button onclick="closeCondimentModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded-xl text-xs transition cursor-pointer" id="text-condiment-btn-cancel">ยกเลิก</button>
                <button onclick="confirmAddToCartWithCondiment()" class="flex-1 bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-2 rounded-xl text-xs transition cursor-pointer shadow-md" id="text-condiment-btn-confirm">ใส่ตะกร้าเลย</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-lg w-full max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                <h3 class="text-base font-bold text-amber-400 flex items-center"><i class="fas fa-shopping-cart mr-2"></i><span id="text-cart-title">รายการอาหารในตะกร้า</span></h3>
                <button onclick="toggleCartModal(false)" class="text-gray-400 hover:text-white text-lg cursor-pointer"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar" id="cart-items-list"></div>

            <div class="p-4 bg-gray-900/40 border-t border-gray-700 space-y-1.5 text-xs">
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-subtotal">ราคาค่าอาหารรวม</span>
                    <span id="summary-subtotal">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-service">ค่าบริการ Service Charge (10%)</span>
                    <span id="summary-service-charge">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-vat">ภาษีมูลค่าเพิ่ม VAT (7%)</span>
                    <span id="summary-vat">฿0.00</span>
                </div>
                <div class="pt-2 border-t border-gray-700 flex justify-between items-center text-gray-200">
                    <span class="font-bold text-sm" id="text-bill-grandtotal">ยอดรวมสุทธิ</span>
                    <span class="text-xl font-black text-amber-400" id="cart-total-price">฿0.00</span>
                </div>
            </div>

            <div class="p-4 bg-gray-800 border-t border-gray-700 space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-400 mb-1" id="text-form-room">หมายเลขห้อง (Room No.) *</label>
                        <input type="text" id="customer-room" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white font-bold text-center text-sm focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-[11px] font-semibold text-gray-400 mb-1" id="text-form-name">ชื่อผู้สั่ง (Name) *</label>
                        <input type="text" id="customer-name" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-semibold text-gray-400 mb-1" id="text-form-payment">วิธีชำระเงิน (Payment Method) *</label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="flex items-center space-x-2 bg-gray-900 border border-gray-700 rounded-xl p-2 cursor-pointer">
                            <input type="radio" name="payment_option" value="บันทึกเข้าบัญชีห้องพัก (Charge to Room)" checked class="text-amber-500 accent-amber-500">
                            <span class="text-[10px] font-bold text-gray-200 leading-tight">บันทึกเข้าบัญชีห้องพัก<br><span class="text-[8px] text-gray-400 font-normal">(Charge to Room)</span></span>
                        </label>
                        <label class="flex items-center space-x-2 bg-gray-900 border border-gray-700 rounded-xl p-2 cursor-pointer">
                            <input type="radio" name="payment_option" value="ชำระเงินสดตอนรับอาหาร (Cash on Delivery)" class="text-amber-500 accent-amber-500">
                            <span class="text-[10px] font-bold text-gray-200 leading-tight">ชำระเงินสดตอนรับอาหาร<br><span class="text-[8px] text-gray-400 font-normal">(Cash on Delivery)</span></span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-semibold text-gray-400 mb-1" id="text-form-note">หมายเหตุเพิ่มเติม (Optional)</label>
                    <input type="text" id="order-note" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-amber-500">
                </div>
                
                <button onclick="submitOrderToServer()" id="btn-submit-order" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 text-gray-950 font-black py-2.5 rounded-xl text-xs transition cursor-pointer shadow-lg text-center flex justify-center items-center space-x-2">
                    <i class="fas fa-paper-plane"></i>
                    <span id="text-btn-submit-order">ยืนยันการสั่งซื้อและส่งออเดอร์</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let allMenus = [];
        let cart = [];
        let currentMainGroup = '';
        let currentSubGroup = '';
        let currentLang = 'th';
        let tempSelectedProductNo = null;
        let tempSelectedCondimentTH = 'ปกติ';
        let tempSelectedCondimentEN = 'Normal';

        const SERVICE_CHARGE_RATE = 0.10;
        const VAT_RATE = 0.07;

        const translations = {
            th: {
                subtitle: "สั่งอาหารสะดวก ส่งตรงถึงห้องพัก", btnCart: "ตะกร้าของฉัน", loadingMenu: "กำลังโหลดเมนูอาหารแสนอร่อย...",
                condimentTitle: "ตัวเลือกเพิ่มเติม / Option", condimentSelect: "เลือกรูปแบบ / ตัวเลือกเสริม", condimentNote: "ระบุรายละเอียดเพิ่มเติม (ถ้ามี)", condimentPlaceholder: "เช่น ไม่เผ็ด / ไม่ผัก / แยกน้ำซอส", btnCancel: "ยกเลิก", btnConfirm: "ใส่ตะกร้าเลย",
                cartTitle: "รายการอาหารในตะกร้า", emptyCart: "ไม่มีอาหารในตะกร้า", perPlate: "บาท / จาน", billSubtotal: "ราคาค่าอาหารรวม", billService: "ค่าบริการ Service Charge (10%)", billVat: "ภาษีมูลค่าเพิ่ม VAT (7%)", billGrandtotal: "ยอดรวมสุทธิ",
                formRoom: "หมายเลขห้อง (Room No.) *", formName: "ชื่อผู้สั่ง (Name) *", formPayment: "วิธีชำระเงิน (Payment Method) *", formNote: "หมายเหตุเพิ่มเติม (Optional)", formNotePlaceholder: "เช่น ใส่กล่องทั้งหมด", btnSubmitOrder: "ยืนยันการสั่งซื้อและส่งออเดอร์",
                addBtn: "เพิ่มลงตะกร้า", noMenuMsg: "ไม่มีรายการอาหารในหมวดหมู่นี้", alertEmptyCart: "กรุณาเลือกเมนูอาหารลงตะกร้าก่อนส่งออเดอร์ครับ", alertFormRequire: "กรุณากรอกข้อมูลห้องและชื่อให้ครบถ้วนนะครับน้า", alertSuccess: "🎉 ส่งออเดอร์สำเร็จ! ห้องครัวรับรายการเรียบร้อยแล้วครับ", alertNetError: "❌ ไม่สามารถส่งออเดอร์ได้ กรุณาตรวจสอบอินเทอร์เน็ต"
            },
            en: {
                subtitle: "Convenient room service delivered straight to your room", btnCart: "My Cart", loadingMenu: "Loading delicious menus...",
                condimentTitle: "Additional Options", condimentSelect: "Select Preference / Options", condimentNote: "Special instructions (If any)", condimentPlaceholder: "e.g., No spicy / No veggies", btnCancel: "Cancel", btnConfirm: "Add to Cart",
                cartTitle: "Items in Your Cart", emptyCart: "Your cart is empty", perPlate: "THB / Plate", billSubtotal: "Subtotal", billService: "Service Charge (10%)", billVat: "VAT (7%)", billGrandtotal: "Grand Total",
                formRoom: "Room Number (Room No.) *", formName: "Guest Name *", formPayment: "Payment Method *", formNote: "Overall order note (Optional)", formNotePlaceholder: "e.g., Takeaway box", btnSubmitOrder: "Confirm & Send Order",
                addBtn: "Add to Cart", noMenuMsg: "No items available in this category", alertEmptyCart: "Please add items to your cart before ordering.", alertFormRequire: "Please fill out both 'Room Number' and 'Guest Name'.", alertSuccess: "🎉 Order sent successfully!", alertNetError: "❌ Unable to send order. Please check your internet connection."
            }
        };

        document.addEventListener('DOMContentLoaded', () => { fetchMenuData(); });

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-btn-th').className = lang === 'th' ? "px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950" : "px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white";
            document.getElementById('lang-btn-en').className = lang === 'en' ? "px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950" : "px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white";

            const dict = translations[lang];
            Object.keys(dict).forEach(key => {
                const el = document.getElementById(`text-${key.replace(/[A-Z]/g, letter => `-${letter.toLowerCase()}`)}`);
                if(el) el.innerText = dict[key];
            });
            
            if (allMenus.length > 0) {
                const mainGroups = [...new Set(allMenus.map(m => String(m[1] || '').trim()))].filter(Boolean);
                renderMainGroupTabs(mainGroups);
                renderMenuList();
                renderCartItems();
            }
        }

        function fetchMenuData() {
            fetch(`${WEB_APP_URL}?_nocache=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.menus) {
                        allMenus = data.menus.filter(m => {
                            const st = String(m[9] || '').trim().toLowerCase();
                            return st === 'available' || st === 'เปิดขาย' || st === 'ใช้งาน' || st === '';
                        });
                        if (allMenus.length > 0) { initializeCategoryFilters(); }
                    }
                });
        }

        function initializeCategoryFilters() {
            const mainGroups = [...new Set(allMenus.map(m => String(m[1] || '').trim()))].filter(Boolean);
            currentMainGroup = mainGroups[0] || '';
            if (currentMainGroup) {
                const filtered = allMenus.filter(m => String(m[1] || '').trim() === currentMainGroup);
                const subGroups = [...new Set(filtered.map(m => String(m[2] || '').trim()))].filter(Boolean);
                currentSubGroup = subGroups[0] || '';
            }
            changeLanguage('th');
        }

        function renderMainGroupTabs(groups) {
            document.getElementById('main-group-tabs').innerHTML = groups.map(g => `
                <button onclick="selectMainGroup('${g}')" class="px-4 py-2 font-bold rounded-xl text-xs whitespace-nowrap ${currentMainGroup === g ? 'bg-amber-500 text-gray-950 shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700'}">${g}</button>
            `).join('');
        }

        function selectMainGroup(group) {
            currentMainGroup = group;
            const filtered = allMenus.filter(m => String(m[1] || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filtered.map(m => String(m[2] || '').trim()))].filter(Boolean);
            currentSubGroup = subGroups[0] || '';
            renderMainGroupTabs([...new Set(allMenus.map(m => String(m[1] || '').trim()))].filter(Boolean));
            updateSubGroups();
        }

        function updateSubGroups() {
            const filtered = allMenus.filter(m => String(m[1] || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filtered.map(m => String(m[2] || '').trim()))].filter(Boolean);
            const container = document.getElementById('sub-group-chips');
            
            if (subGroups.length > 0) {
                container.innerHTML = subGroups.map(sg => `
                    <button onclick="selectSubGroup('${sg}')" class="px-3 py-1 rounded-full text-[10px] font-semibold whitespace-nowrap ${currentSubGroup === sg ? 'bg-amber-500 bg-opacity-20 text-amber-400 border border-amber-500' : 'bg-gray-800 text-gray-400 border border-transparent'}">${sg}</button>
                `).join('');
            } else { container.innerHTML = ''; }
            renderMenuList();
        }

        function selectSubGroup(subGroup) { currentSubGroup = subGroup; updateSubGroups(); }

        function renderMenuList() {
            const container = document.getElementById('menu-container');
            const targetMenus = allMenus.filter(m => String(m[1] || '').trim() === currentMainGroup && String(m[2] || '').trim() === currentSubGroup);

            if (targetMenus.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-xs py-8 text-gray-500">${translations[currentLang].noMenuMsg}</p>`;
                return;
            }

            container.innerHTML = targetMenus.map(menu => {
                const pNo = menu[0]; const nameTH = menu[3]; const nameEN = menu[4] || nameTH;
                const descTH = menu[5] || '-'; const descEN = menu[6] || descTH;
                const price = parseFloat(menu[7] || 0); const img = menu[8] || 'https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500';
                
                return `
                    <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow flex flex-col group">
                        <div class="relative h-24 sm:h-40 bg-gray-900 overflow-hidden">
                            <img src="${img}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500'">
                            <span class="absolute top-1 right-1 bg-gray-950/80 text-amber-400 text-[9px] px-1.5 py-0.5 rounded font-bold">ID: ${pNo}</span>
                        </div>
                        <div class="p-2 sm:p-3 flex flex-col flex-1">
                            <h4 class="font-bold text-gray-100 text-xs sm:text-sm line-clamp-1">${currentLang==='th'?nameTH:nameEN}</h4>
                            <p class="text-[10px] text-gray-400 line-clamp-2 mb-2 flex-1">${currentLang==='th'?descTH:descEN}</p>
                            <div class="flex justify-between items-center pt-1.5 border-t border-gray-700">
                                <span class="text-xs sm:text-sm font-black text-amber-400">฿${price.toLocaleString()}</span>
                                <button onclick="handleAddToCart('${pNo}')" class="bg-amber-500 hover:bg-amber-400 text-gray-950 text-[10px] font-bold px-2 py-1 rounded flex items-center"><i class="fas fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function handleAddToCart(productNo) {
            const item = allMenus.find(m => String(m[0]) === String(productNo));
            if (!item) return;
            if (String(item[10] || '').trim() === 'ใช่') { openCondimentModal(productNo); }
            else { addDirectToCart(item); }
        }

        function addDirectToCart(item) {
            const existing = cart.find(c => String(c.product_no) === String(item[0]) && c.condiment_th === 'ปกติ');
            if (existing) { existing.qty += 1; }
            else {
                cart.push({ product_no: item[0], menu_name_th: item[3], menu_name_en: item[4] || item[3], condiment_th: 'ปกติ', condiment_en: 'Normal', price_thb: parseFloat(item[7]||0), qty: 1 });
            }
            updateCartBadge(); renderCartItems();
        }

        function openCondimentModal(productNo) {
            const item = allMenus.find(m => String(m[0]) === String(productNo));
            if (!item) return;
            tempSelectedProductNo = productNo; tempSelectedCondimentTH = 'ปกติ'; tempSelectedCondimentEN = 'Normal';
            document.getElementById('condiment-menu-name').innerText = currentLang === 'th' ? item[3] : (item[4] || item[3]);
            document.getElementById('condiment-custom-note').value = '';

            let choices = String(item[1] || '').toLowerCase().includes('drink') || String(item[1] || '').toLowerCase().includes('เครื่องดื่ม') ?
                [{th: 'ปกติ', en: 'Normal'}, {th: 'ไม่หวาน', en: 'No Sugar'}, {th: 'หวานน้อย', en: 'Less Sweet'}, {th: 'แยกน้ำแข็ง', en: 'Separate Ice'}] :
                [{th: 'ปกติ', en: 'Normal'}, {th: 'เผ็ดน้อย', en: 'Mild Spicy'}, {th: 'ไม่เผ็ด', en: 'Not Spicy'}, {th: 'เผ็ดจัด', en: 'Very Spicy'}];

            document.getElementById('condiment-options-container').innerHTML = choices.map((opt, i) => `
                <button type="button" onclick="selectCondimentChoice(this, '${opt.th}', '${opt.en}')" class="condiment-btn-choice text-[11px] p-2 rounded-xl border ${i===0?'bg-amber-500 bg-opacity-20 text-amber-400 border-amber-500':'bg-gray-900 border-gray-700 text-gray-400'}">${currentLang==='th'?opt.th:opt.en}</button>
            `).join('');
            document.getElementById('condiment-modal').className = "fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4";
        }

        function selectCondimentChoice(btn, th, en) {
            tempSelectedCondimentTH = th; tempSelectedCondimentEN = en;
            document.querySelectorAll('.condiment-btn-choice').forEach(b => b.className = "condiment-btn-choice text-[11px] p-2 rounded-xl border bg-gray-900 border-gray-700 text-gray-400");
            btn.className = "condiment-btn-choice text-[11px] p-2 rounded-xl border bg-amber-500 bg-opacity-20 text-amber-400 border-amber-500";
        }

        function closeCondimentModal() { document.getElementById('condiment-modal').className = "fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden"; }

        function confirmAddToCartWithCondiment() {
            const item = allMenus.find(m => String(m[0]) === String(tempSelectedProductNo));
            if (!item) return;
            const note = document.getElementById('condiment-custom-note').value.trim();
            let finalTH = tempSelectedCondimentTH + (note ? ` [${note}]` : '');
            let finalEN = tempSelectedCondimentEN + (note ? ` [${note}]` : '');

            const existing = cart.find(c => String(c.product_no) === String(item[0]) && c.condiment_th === finalTH);
            if (existing) { existing.qty += 1; }
            else {
                cart.push({ product_no: item[0], menu_name_th: item[3], menu_name_en: item[4]||item[3], condiment_th: finalTH, condiment_en: finalEN, price_thb: parseFloat(item[7]||0), qty: 1 });
            }
            closeCondimentModal(); updateCartBadge(); renderCartItems();
        }

        function updateCartBadge() { document.getElementById('cart-count-badge').innerText = cart.reduce((s, i) => s + i.qty, 0); }
        function toggleCartModal(show) { document.getElementById('cart-modal').className = show ? "fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4" : "fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden"; }

        function renderCartItems() {
            const container = document.getElementById('cart-items-list');
            if (cart.length === 0) { container.innerHTML = `<p class="text-center text-xs text-gray-500">${translations[currentLang].emptyCart}</p>`; updateBillSummary(0); return; }

            let subtotal = 0;
            container.innerHTML = cart.map((item, idx) => {
                subtotal += item.price_thb * item.qty;
                return `
                    <div class="bg-gray-900/60 border border-gray-700 p-2.5 rounded-xl flex justify-between items-center text-xs">
                        <div>
                            <h5 class="font-bold text-gray-200">${currentLang==='th'?item.menu_name_th:item.menu_name_en}</h5>
                            <p class="text-amber-400 font-medium text-[11px]">${currentLang==='th'?item.condiment_th:item.condiment_en}</p>
                            <p class="text-gray-400 text-[11px]">฿${item.price_thb} x ${item.qty}</p>
                        </div>
                        <div class="flex bg-gray-800 rounded border border-gray-700 text-[11px]">
                            <button onclick="updateQty(${idx}, -1)" class="px-2 py-0.5 text-gray-400 hover:text-white">-</button>
                            <span class="px-1 text-gray-200">${item.qty}</span>
                            <button onclick="updateQty(${idx}, 1)" class="px-2 py-0.5 text-gray-400 hover:text-white">+</button>
                        </div>
                    </div>
                `;
            }).join('');
            updateBillSummary(subtotal);
        }

        function updateQty(idx, change) { cart[idx].qty += change; if(cart[idx].qty <= 0) cart.splice(idx, 1); updateCartBadge(); renderCartItems(); }

        function updateBillSummary(subtotal) {
            const svc = subtotal * SERVICE_CHARGE_RATE; const vat = (subtotal + svc) * VAT_RATE;
            document.getElementById('summary-subtotal').innerText = `฿${subtotal.toFixed(2)}`;
            document.getElementById('summary-service-charge').innerText = `฿${svc.toFixed(2)}`;
            document.getElementById('summary-vat').innerText = `฿${vat.toFixed(2)}`;
            document.getElementById('cart-total-price').innerText = `฿ ${(subtotal + svc + vat).toFixed(2)}`;
        }

        function submitOrderToServer() {
            const room = document.getElementById('customer-room').value.trim();
            const name = document.getElementById('customer-name').value.trim();
            if(!room || !name || cart.length === 0) { alert(translations[currentLang].alertFormRequire); return; }

            const btn = document.getElementById('btn-submit-order');
            btn.disabled = true;

            const itemsStr = cart.map(i => `${currentLang==='th'?i.menu_name_th:i.menu_name_en} [${i.condiment_th}] x ${i.qty}`).join(' \n');
            const pay = document.querySelector('input[name="payment_option"]:checked').value;

            fetch(WEB_APP_URL, {
                method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ room_no: room, customer_name: name, items: itemsStr, note: `${document.getElementById('order-note').value} [${pay}]`.trim() })
            }).then(() => {
                alert(translations[currentLang].alertSuccess); cart = []; updateCartBadge(); toggleCartModal(false);
                document.getElementById('customer-room').value = ''; document.getElementById('customer-name').value = '';
                btn.disabled = false;
            }).catch(() => { alert(translations[currentLang].alertNetError); btn.disabled = false; });
        }
    </script>
</body>
</html>
