<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - In-Room Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body>
    <script>
        // ⚙️ [สำคัญมาก] ให้น้าเปลี่ยนลิงก์ตรงนี้ให้เป็น URL Web App ของน้าเองนะครับ
        const WEB_APP_URL = "https://script.google.com/macros/s/XXXXX/exec";
        
        let allMenus = [];
        let cart = [];
        let currentMainGroup = "";
        let currentSubGroup = "ทั้งหมด";

        // ระบบโหลดข้อมูลเริ่มต้นเมื่อเปิดหน้าเว็บ
        window.onload = async function() {
            showLoading(true);
            await fetchMenus();
            showLoading(false);
        };

        // ฟังก์ชันดึงข้อมูลจาก Google Apps Script
        async function fetchMenus() {
            try {
                const response = await fetch(WEB_APP_URL);
                const result = await response.json();
                if (result.success) {
                    // กรองเฉพาะเมนูที่มีรหัสสินค้า และไม่มาจากแท็บระบบป้องกันข้อผิดพลาด
                    allMenus = result.menus.filter(item => {
                        const mainGroupLower = (item.main_group || "").toLowerCase().trim();
                        return item.product_no && 
                               mainGroupLower !== "orders" && 
                               mainGroupLower !== "category" && 
                               mainGroupLower !== "daily_reports" && 
                               mainGroupLower !== "other";
                    });
                    
                    initMainTabs();
                } else {
                    alert("ไม่สามารถโหลดข้อมูลเมนูได้ครับ");
                }
            } catch (error) {
                console.error("Error fetching menus:", error);
            }
        }

        // สร้างปุ่มแท็บกลุ่มหลัก (Food, Beverage, Wine)
        function initMainTabs() {
            const groups = [...new Set(allMenus.map(m => m.main_group))].filter(Boolean);
            const tabContainer = document.getElementById("main-tabs");
            tabContainer.innerHTML = "";
            
            if (groups.length > 0) {
                currentMainGroup = groups[0]; // เลือกแท็บแรกเป็นค่าเริ่มต้น
                groups.forEach((group, index) => {
                    const btn = document.createElement("button");
                    btn.className = `px-6 py-2 rounded-full font-bold transition ${index === 0 ? 'bg-amber-500 text-slate-900' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`;
                    btn.textContent = group;
                    btn.id = `tab-main-${group}`;
                    btn.onclick = () => switchMainTab(group);
                    tabContainer.appendChild(btn);
                });
                renderSubCategories();
            }
        }

        // สลับแท็บกลุ่มหลัก
        function switchMainTab(group) {
            currentMainGroup = group;
            currentSubGroup = "ทั้งหมด";
            
            // เปลี่ยนสีปุ่มที่เลือก
            document.querySelectorAll("#main-tabs button").forEach(btn => {
                btn.className = "px-6 py-2 rounded-full font-bold transition bg-slate-800 text-slate-300 hover:bg-slate-700";
            });
            const activeBtn = document.getElementById(`tab-main-${group}`);
            if (activeBtn) activeBtn.className = "px-6 py-2 rounded-full font-bold transition bg-amber-500 text-slate-900";
            
            renderSubCategories();
        }

        // แสดงผลรายการหมวดหมู่ย่อย (ฝั่งซ้าย)
        function renderSubCategories() {
            const filtered = allMenus.filter(m => m.main_group === currentMainGroup);
            const subGroups = [...new Set(filtered.map(m => m.sub_group))].filter(Boolean);
            
            const container = document.getElementById("sub-category-list");
            container.innerHTML = "";
            
            // เพิ่มตัวเลือก "ทั้งหมด"
            const allBtn = createSubGroupBtn("ทั้งหมด", currentSubGroup === "ทั้งหมด");
            container.appendChild(allBtn);
            
            subGroups.forEach(sub => {
                const btn = createSubGroupBtn(sub, currentSubGroup === sub);
                container.appendChild(btn);
            });
            
            renderMenuItems();
        }

        function createSubGroupBtn(name, isActive) {
            const btn = document.createElement("button");
            btn.className = `w-full flex justify-between items-center px-4 py-3 rounded-lg text-left transition ${isActive ? 'bg-amber-500/20 text-amber-400 border border-amber-500/40' : 'text-slate-400 hover:bg-slate-800'}`;
            btn.innerHTML = `<span>${name}</span> <i class="fa-solid fa-chevron-right text-xs"></i>`;
            btn.onclick = () => {
                currentSubGroup = name;
                renderSubCategories();
            };
            return btn;
        }

        // แสดงผลการ์ดรายการอาหาร (ฝั่งขวา)
        function renderMenuItems() {
            const container = document.getElementById("menu-grid");
            container.innerHTML = "";
            
            let filtered = allMenus.filter(m => m.main_group === currentMainGroup);
            if (currentSubGroup !== "ทั้งหมด") {
                filtered = filtered.filter(m => m.sub_group === currentSubGroup);
            }
            
            // กรองแสดงเฉพาะเมนูที่พร้อมจำหน่าย
            filtered = filtered.filter(m => m.status === "พร้อมจำหน่าย" || m.status === "เปิดขาย");

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500">ไม่มีรายการอาหารในหมวดหมู่นี้คราบ</div>`;
                return;
            }

            filtered.forEach(item => {
                const card = document.createElement("div");
                card.className = "bg-slate-800 rounded-xl overflow-hidden shadow-lg border border-slate-700 flex flex-col justify-between";
                
                // แยกรายการตัวเลือกเสริม (Condiment) เพื่อเตรียมสร้างตัวเลือก
                const condimentHtml = generateCondimentSelector(item.product_no, item.condiment);

                card.innerHTML = `
                    <div>
                        <div class="relative h-48 w-full bg-slate-700">
                            <img src="${item.image_url || 'https://placehold.co/400x300?text=No+Image'}" class="w-full h-full object-cover" alt="${item.menu_name_th}">
                            <span class="absolute top-2 right-2 bg-slate-900/80 text-xs px-2 py-1 rounded text-amber-400 font-mono">ID: ${item.product_no}</span>
                        </div>
                        <div class="p-4">
                            <h3 class="text-lg font-bold text-slate-100">${item.menu_name_th}</h3>
                            <p class="text-sm text-slate-400 mt-1">${item.menu_name_en || ''}</p>
                            <p class="text-xs text-slate-500 mt-2 line-clamp-2">${item.description_th || ''}</p>
                            
                            ${condimentHtml}
                        </div>
                    </div>
                    <div class="p-4 pt-0 border-t border-slate-700/50 flex justify-between items-center mt-4">
                        <span class="text-xl font-bold text-amber-400">฿${parseFloat(item.price_thb || 0).toLocaleString()}</span>
                        <button onclick="addToCartClick('${item.product_no}')" class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-2 rounded-lg font-bold text-sm transition flex items-center gap-2">
                            <i class="fa-solid fa-plus"></i> เพิ่มลงตะกร้า
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // ฟังก์ชันสร้าง UI คัดกรองตัวเลือกเสริม (Condiment) แยกตามเครื่องหมายจุลภาค ( , )
        function generateCondimentSelector(prodNo, condimentStr) {
            if (!condimentStr || condimentStr.trim() === "") return "";
            const options = condimentStr.split(",").map(opt => opt.trim()).filter(Boolean);
            if (options.length === 0) return "";

            let html = `<div class="mt-3 pt-3 border-t border-slate-700/50">
                            <label class="text-xs font-semibold text-slate-400 block mb-1.5"><i class="fa-solid fa-sliders text-amber-500 mr-1"></i> ตัวเลือกเสริม:</label>
                            <select id="condiment-${prodNo}" class="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1.5 text-xs text-slate-200 focus:outline-none focus:border-amber-500">
                        `;
            options.forEach(opt => {
                html += `<option value="${opt}">${opt}</option>`;
            });
            html += `</select></div>`;
            return html;
        }

        // ฟังก์ชันเมื่อกดปุ่มเพิ่มลงตะกร้า
        function addToCartClick(prodNo) {
            const item = allMenus.find(m => m.product_no === prodNo);
            if (!item) return;

            // ดึงค่าตัวเลือกเสริมที่เลือกไว้ (ถ้ามี)
            const selectEl = document.getElementById(`condiment-${prodNo}`);
            const selectedCondiment = selectEl ? selectEl.value : "";

            // ตรวจสอบความซ้ำในตะกร้า (สินค้าเดียวกัน + ตัวเลือกเดียวกัน)
            const existing = cart.find(c => c.product_no === prodNo && c.selected_condiment === selectedCondiment);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({
                    product_no: item.product_no,
                    menu_name_th: item.menu_name_th,
                    price_thb: parseFloat(item.price_thb || 0),
                    selected_condiment: selectedCondiment,
                    quantity: 1
                });
            }
            updateCartUI();
        }

        // อัปเดตข้อมูลบนหน้าจอจำนวนและราคารวมตะกร้าสินค้า
        function updateCartUI() {
            const totalCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price_thb * item.quantity), 0);
            
            document.getElementById("cart-count").textContent = totalCount;
            document.getElementById("cart-btn-text").textContent = `${totalCount} รายการ - ฿${totalPrice.toLocaleString()}`;
        }

        // ฟังก์ชันเปิด/ปิด หน้าจอสรุปตะกร้าสินค้า
        function toggleCartModal(show) {
            const modal = document.getElementById("cart-modal");
            if (show) {
                renderCartModalItems();
                modal.classList.remove("hidden");
            } else {
                modal.classList.add("hidden");
            }
        }

        // แสดงรายการอาหารทั้งหมดที่อยู่ในตะกร้าสินค้า Modal
        function renderCartModalItems() {
            const container = document.getElementById("cart-items-list");
            container.innerHTML = "";
            let totalPrice = 0;

            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center py-6 text-slate-500">ตะกร้าสินค้าของคุณยังว่างอยู่ครับ</p>`;
                document.getElementById("total-checkout-price").textContent = "฿0";
                return;
            }

            cart.forEach((item, index) => {
                const subTotal = item.price_thb * item.quantity;
                totalPrice += subTotal;
                
                const div = document.createElement("div");
                div.className = "flex justify-between items-start border-b border-slate-700 py-3 gap-2";
                div.innerHTML = `
                    <div>
                        <p class="font-bold text-slate-200">${item.menu_name_th}</p>
                        ${item.selected_condiment ? `<p class="text-xs text-amber-400 mt-0.5"><i class="fa-solid fa-square-check"></i> ${item.selected_condiment}</p>` : ''}
                        <p class="text-sm text-slate-400 mt-1">฿${item.price_thb.toLocaleString()} x ${item.quantity}</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="font-bold text-slate-200">฿${subTotal.toLocaleString()}</span>
                        <div class="flex items-center gap-1 bg-slate-900 rounded border border-slate-700 text-xs">
                            <button onclick="changeQty(${index}, -1)" class="px-2 py-1 text-slate-400 hover:text-white">-</button>
                            <span class="px-2 font-mono text-amber-400">${item.quantity}</span>
                            <button onclick="changeQty(${index}, 1)" class="px-2 py-1 text-slate-400 hover:text-white">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById("total-checkout-price").textContent = `฿${totalPrice.toLocaleString()}`;
        }

        function changeQty(index, delta) {
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            renderCartModalItems();
        }

        // 🚀 ฟังก์ชันส่งข้อมูลออเดอร์กลับไปที่ Google Sheets (แท็บ Orders)
        async function submitOrder() {
            const roomNo = document.getElementById("room-number-input").value.trim();
            const guestName = document.getElementById("guest-name-input").value.trim();
            const note = document.getElementById("order-note-input").value.trim();

            if (!roomNo) {
                alert("กรุณากรอกหมายเลขห้องพักด้วยครับน้า");
                return;
            }
            if (cart.length === 0) {
                alert("ยังไม่มีรายการสินค้าในตะกร้าเลยครับ");
                return;
            }

            // แปลงโครงสร้างชุดรายการอาหารรวมถึงตัวเลือก condiment ส่งเข้าชีต
            const orderItems = cart.map(c => ({
                id: c.product_no,
                name: c.menu_name_th,
                qty: c.quantity,
                price: c.price_thb,
                option: c.selected_condiment || "-"
            }));

            const payload = {
                action: "placeOrder",
                room_number: roomNo,
                guest_name: guestName || "ไม่ได้ระบุชื่อ",
                orderitems: orderItems,
                note: note
            };

            showLoading(true);
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors", // ใช้ no-cors ตามมาตรฐานเพื่อความเข้ากันได้ของระบบชีต
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                // เคลียร์ค่าทั้งหมดหลังการยิงสำเร็จ
                alert("🎉 ส่งรายการออเดอร์เรียบร้อยแล้วครับ! ห้องครัวกำลังจัดเตรียมอาหารให้ครับ");
                cart = [];
                updateCartUI();
                toggleCartModal(false);
                document.getElementById("order-note-input").value = "";
            } catch (error) {
                console.error("Order error:", error);
                alert("เกิดข้อผิดพลาดในการส่งออเดอร์ กรุณาลองใหม่อีกครั้งครับ");
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            document.getElementById("loading-screen").className = show ? "fixed inset-0 bg-slate-950/80 flex items-center justify-center z-50" : "hidden";
        }
    </script>

    <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-30 px-4 py-3 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <div class="bg-amber-500 text-slate-900 p-2 rounded-xl font-black text-xl">
                <i class="fa-solid fa-utensils"></i>
            </div>
            <div>
                <h1 class="text-md font-black tracking-wide text-amber-500">ROOM SERVICE</h1>
                <p class="text-xs text-slate-400">บริการสั่งอาหารส่งตรงถึงห้องพักดิจิทัล</p>
            </div>
        </div>
        <button onclick="toggleCartModal(true)" class="bg-amber-500 hover:bg-amber-600 text-slate-900 px-4 py-2.5 rounded-xl font-bold text-sm transition flex items-center gap-2 relative">
            <i class="fa-solid fa-basket-shopping text-base"></i>
            <span id="cart-btn-text">0 รายการ - ฿0</span>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-slate-900">0</span>
        </button>
    </header>

    <div class="max-w-7xl mx-auto px-4 pt-6">
        <div id="main-tabs" class="flex gap-2 border-b border-slate-800 pb-4 overflow-x-auto">
            </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 md:grid-cols-4 gap-6">
        <aside class="md:col-span-1 bg-slate-900/60 p-4 rounded-xl border border-slate-800 h-fit">
            <h2 class="text-xs font-bold uppercase tracking-wider text-slate-500 mb-3 flex items-center gap-2">
                <i class="fa-solid fa-bars-staggered text-amber-500"></i> หมวดหมู่ย่อย
            </h2>
            <div id="sub-category-list" class="space-y-1">
                </div>
        </aside>

        <section class="md:col-span-3">
            <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-4 bg-slate-900 border-b border-slate-700 flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2"><i class="fa-solid fa-basket-shopping text-amber-500"></i> ตะกร้าสินค้าของคุณ</h2>
                <button onclick="toggleCartModal(false)" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div id="cart-items-list" class="p-4 overflow-y-auto flex-1 space-y-1">
                </div>

            <div class="p-4 bg-slate-900/50 border-t border-slate-700 space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">หมายเลขห้องพัก (Room Number) <span class="text-red-500">*</span></label>
                    <input type="text" id="room-number-input" placeholder="ตัวอย่างเช่น: 22, 104" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">ชื่อผู้เข้าพัก (Guest Name)</label>
                    <input type="text" id="guest-name-input" placeholder="ระบุหรือไม่ระบุก็ได้ครับ" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">หมายเหตุเพิ่มเติมถึงห้องครัว</label>
                    <input type="text" id="order-note-input" placeholder="เช่น ขอช้อนส้อมเพิ่ม, เผ็ดน้อย" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-500">
                </div>

                <div class="flex justify-between items-center pt-2">
                    <span class="text-slate-400 font-bold">ราคารวมทั้งสิ้น:</span>
                    <span id="total-checkout-price" class="text-2xl font-black text-amber-400">฿0</span>
                </div>
                <button onclick="submitOrder()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i> ยืนยันคำสั่งซื้อและส่งออเดอร์
                </button>
            </div>
        </div>
    </div>

    <div id="loading-screen" class="hidden">
        <div class="text-center">
            <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-amber-500 border-t-transparent mb-3"></div>
            <p class="text-slate-400 text-sm">กำลังเชื่อมต่อฐานข้อมูล กรุณารอสักครู่ครับน้า...</p>
        </div>
    </div>
</body>
</html>
