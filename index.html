<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }

        .menu-grid-container {
            display: grid !important;
            grid-template-columns: repeat(2, 1fr) !important;
            gap: 16px !important;
            padding: 12px 0 !important;
        }
        .menu-card {
            background-color: #121214 !important;
            border: 1px solid #27272a !important; 
            border-radius: 16px !important;
            overflow: hidden !important;
            display: flex !important;
            flex-direction: column !important;
            position: relative !important;
            transition: all 0.2s ease !important;
        }
        .menu-card:hover { border-color: #f59e0b !important; }
        .menu-card-img { width: 100% !important; height: 140px !important; object-fit: cover !important; }
        .menu-card-info { padding: 12px !important; display: flex !important; flex-direction: column !important; flex-grow: 1 !important; }
        .menu-title { color: #ffffff !important; font-size: 15px !important; font-weight: bold !important; margin-bottom: 2px !important; }
        .menu-subtitle { color: #9ca3af !important; font-size: 12px !important; margin-bottom: 8px !important; }
        .menu-desc { color: #6b7280 !important; font-size: 11px !important; margin-bottom: 8px !important; }
        .menu-price { color: #f59e0b !important; font-size: 15px !important; font-weight: bold !important; margin-top: auto !important; }

        .btn-add-to-cart {
            position: absolute !important;
            right: 12px !important;
            bottom: 12px !important;
            background-color: #f59e0b !important;
            color: #000000 !important;
            border: none !important;
            width: 32px !important;
            height: 32px !important;
            border-radius: 8px !important;
            font-size: 20px !important;
            font-weight: bold !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            cursor: pointer !important;
            transition: all 0.2s ease !important;
        }
        .btn-add-to-cart:hover { background-color: #fbbf24 !important; transform: scale(1.05) !important; }
    </style>
</head>
<body class="bg-[#0b0c0e] text-gray-100 font-sans antialiased custom-scrollbar">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
    </script>

    <header class="bg-[#0f1115] border-b border-gray-800 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2.5 rounded-xl text-gray-900 flex items-center justify-center"><i class="fas fa-utensils text-lg"></i></div>
                <div>
                    <h1 class="text-lg font-black tracking-wide text-amber-500">ROOM SERVICE</h1>
                    <p class="text-xs text-gray-400" id="text-header-subtitle">สั่งอาหารสะดวก ส่งตรงถึงห้องพัก</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <button onclick="toggleCartModal(true)" class="relative bg-amber-500 hover:bg-amber-400 text-gray-950 px-4 py-2 rounded-xl font-bold flex items-center space-x-2 transition text-sm">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="text-btn-cart">ตะกร้าของฉัน</span>
                    <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex space-x-2 border-b border-gray-800 pb-4 mb-6 overflow-x-auto" id="main-group-tabs"></div>
        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2" id="sub-group-chips"></div>

        <div class="menu-grid-container" id="menu-container">
            <div class="col-span-full text-center py-12 text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl text-amber-500 mb-3"></i>
                <p>กำลังโหลดเมนูอาหารแสนอร่อย...</p>
            </div>
        </div>
    </main>

    <div id="condiment-modal" class="fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-md w-full shadow-2xl p-6">
            <h3 class="text-lg font-bold text-amber-500 mb-1 flex items-center">
                <i class="fas fa-sliders-h mr-2"></i> <span>รายละเอียดเพิ่มเติม (Condiment)</span>
            </h3>
            <p id="condiment-menu-name" class="text-sm text-gray-300 font-semibold mb-4 border-b border-gray-800 pb-2">ชื่อเมนูอาหาร</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">ระบุตัวเลือกเสริมหรือคำสั่งพิเศษสำหรับเมนูนี้</label>
                    <input type="text" id="condiment-custom-note" placeholder="เช่น เผ็ดน้อย / ขอไข่ดาวสุกๆ / ไม่ใส่หอมใหญ่" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2.5 text-sm text-white placeholder-gray-600 focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="flex space-x-3 mt-6">
                <button onclick="closeCondimentModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-2.5 rounded-xl transition text-sm">ยกเลิก</button>
                <button onclick="confirmAddToCartWithCondiment()" class="flex-1 bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-2.5 rounded-xl transition text-sm shadow-md">ใส่ตะกร้าสินค้า</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 border border-gray-800 rounded-2xl max-w-lg w-full max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#121418]">
                <h3 class="text-base font-bold text-amber-500 flex items-center"><i class="fas fa-shopping-cart mr-2"></i><span>รายการอาหารในตะกร้า</span></h3>
                <button onclick="toggleCartModal(false)" class="text-gray-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar" id="cart-items-list"></div>

            <div class="p-4 bg-gray-950/60 border-t border-gray-800 space-y-2 text-xs">
                <div class="flex justify-between text-gray-200 pt-2 border-t border-gray-800 items-center">
                    <span class="font-bold text-sm">ยอดรวมสุทธิ (Total)</span>
                    <span class="text-xl font-black text-amber-500" id="cart-total-price">฿0.00</span>
                </div>
            </div>

            <div class="p-4 bg-gray-900 border-t border-gray-800 space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1">หมายเลขห้องพัก *</label>
                        <input type="text" id="customer-room" placeholder="เช่น 302" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-white font-bold text-center focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1">ชื่อผู้สั่งอาหาร *</label>
                        <input type="text" id="customer-name" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                    </div>
                </div>
                
                <button onclick="submitOrderToServer()" id="btn-submit-order" class="w-full bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-3 rounded-xl font-bold flex justify-center items-center space-x-2">
                    <i class="fas fa-paper-plane"></i>
                    <span>ยืนยันและส่งรายการสั่งซื้อ</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let allMenus = [];
        let cart = [];
        let currentMainGroup = '';
        let currentSubGroup = '';
        let tempSelectedProductNo = null;

        document.addEventListener('DOMContentLoaded', () => { fetchMenuData(); });

        function fetchMenuData() {
            fetch(`${WEB_APP_URL}?_nocache=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.menus) {
                        allMenus = data.menus.filter(m => {
                            const st = String(m.status || m.Status || '').trim().toLowerCase();
                            return st === 'ใช้งาน' || st === 'พร้อมขาย' || st === '';
                        });
                        if (allMenus.length > 0) { initializeCategoryFilters(); }
                    }
                }).catch(err => { console.error(err); });
        }

        function initializeCategoryFilters() {
            const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || m.group || '').trim()))].filter(Boolean);
            currentMainGroup = mainGroups.includes("Food") ? "Food" : (mainGroups[0] || '');
            if (currentMainGroup) {
                const filtered = allMenus.filter(m => String(m.main_group || m.group || '').trim() === currentMainGroup);
                const subGroups = [...new Set(filtered.map(m => String(m.sub_group || '').trim()))].filter(Boolean);
                currentSubGroup = subGroups[0] || '';
            }
            renderMainGroupTabs(mainGroups);
            updateSubGroups();
        }

        function renderMainGroupTabs(groups) {
            const container = document.getElementById('main-group-tabs');
            container.innerHTML = groups.map(g => `
                <button onclick="selectMainGroup('${g}')" class="px-5 py-2 font-bold rounded-xl text-xs ${currentMainGroup === g ? 'bg-amber-500 text-gray-950 shadow-md' : 'bg-gray-900 text-gray-400'}">
                    ${g}
                </button>
            `).join('');
        }

        function selectMainGroup(group) {
            currentMainGroup = group;
            const filtered = allMenus.filter(m => String(m.main_group || m.group || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filtered.map(m => String(m.sub_group || '').trim()))].filter(Boolean);
            currentSubGroup = subGroups[0] || '';
            const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || m.group || '').trim()))].filter(Boolean);
            renderMainGroupTabs(mainGroups);
            updateSubGroups();
        }

        function updateSubGroups() {
            const filtered = allMenus.filter(m => String(m.main_group || m.group || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filtered.map(m => String(m.sub_group || '').trim()))].filter(Boolean);
            const container = document.getElementById('sub-group-chips');
            
            if (subGroups.length > 0) {
                container.innerHTML = subGroups.map(sg => `
                    <button onclick="selectSubGroup('${sg}')" class="px-3 py-1 rounded-full text-xs font-medium ${currentSubGroup === sg ? 'bg-amber-500/20 text-amber-500 border border-amber-500/30' : 'bg-gray-900 border border-transparent text-gray-400'}">
                        ${sg}
                    </button>
                `).join('');
            } else { container.innerHTML = ''; }
            renderMenuList();
        }

        function selectSubGroup(subGroup) { currentSubGroup = subGroup; updateSubGroups(); }

        function renderMenuList() {
            const container = document.getElementById('menu-container');
            const targetMenus = allMenus.filter(m => String(m.main_group || m.group || '').trim() === currentMainGroup && String(m.sub_group || '').trim() === currentSubGroup);

            if (targetMenus.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><p>ไม่มีรายการอาหารในหมวดหมู่นี้</p></div>`;
                return;
            }

            container.innerHTML = targetMenus.map(menu => {
                const imgUrl = menu.image_url || 'https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500';
                const finalPrice = parseFloat(menu.price_thb || menu.price || 0);
                const pNo = menu.product_no || menu.id || '00';
                const nameTH = menu.menu_name_th || menu.name_th || 'ไม่มีชื่อเมนู';

                return `
                    <div class="menu-card">
                        <img src="${imgUrl}" alt="${nameTH}" class="menu-card-img" onerror="this.src='https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500'">
                        <div class="menu-card-info">
                            <h4 class="menu-title">${nameTH}</h4>
                            <p class="menu-desc line-clamp-2">${menu.description_th || '-'}</p>
                            <span class="menu-price">฿${finalPrice.toLocaleString()}</span>
                        </div>
                        <button onclick="handleAddToCartClick('${pNo}')" class="btn-add-to-cart">+</button>
                    </div>
                `;
            }).join('');
        }

        /* 🎯 ฟังก์ชันคัดกรองเงื่อนไขกระโดดเข้าตะกร้า หรือ เด้งป๊อปอัปตามที่แอดมินติ๊กระบุ */
        function handleAddToCartClick(productNo) {
            const item = allMenus.find(m => String(m.product_no || m.id || '00') === String(productNo));
            if (!item) return;

            const condVal = String(item.condiment || item.Condiment || '').trim();
            
            // 🔍 เงื่อนไขเช็ก: ถ้าแอดมินติ๊กระบุว่าเป็น 'ใช่' ให้ระบบแสดงหน้า Condiment 
            if (condVal === 'ใช่' || condVal === 'true' || condVal === 'yes') {
                tempSelectedProductNo = productNo;
                document.getElementById('condiment-menu-name').innerText = item.menu_name_th || item.name_th || '';
                document.getElementById('condiment-custom-note').value = '';
                document.getElementById('condiment-modal').classList.remove('hidden');
            } 
            // 🟢 หากเป็นอย่างอื่น (ไม่ได้ติ๊ก หรือระบุว่า ไม่ใช่) -> ให้วิ่งเข้าตะกร้าได้เลยทันที!
            else {
                tempSelectedProductNo = productNo;
                confirmAddToCartDirectly(item, 'ปกติ');
            }
        }

        function closeCondimentModal() { document.getElementById('condiment-modal').classList.add('hidden'); }

        // เพิ่มเข้าตะกร้ากรณีผ่านกล่องระบุ Condiment
        function confirmAddToCartWithCondiment() {
            const item = allMenus.find(m => String(m.product_no || m.id || '00') === String(tempSelectedProductNo));
            if (!item) return;

            const customNote = document.getElementById('condiment-custom-note').value.trim();
            const finalCondiment = customNote ? customNote : 'ปกติ';

            confirmAddToCartDirectly(item, finalCondiment);
            closeCondimentModal();
        }

        // ฟังก์ชันหัวใจหลักในการเขียนข้อมูลลงตะกร้าจำลอง (Cart Object Array)
        function confirmAddToCartDirectly(item, condimentText) {
            const itemPrice = parseFloat(item.price_thb || item.price || 0);
            const pNo = item.product_no || item.id || '00';
            const nameTH = item.menu_name_th || item.name_th || 'Food';

            const existingIndex = cart.findIndex(c => String(c.product_no) === String(pNo) && c.condiment === condimentText);

            if (existingIndex > -1) {
                cart[existingIndex].qty += 1;
            } else {
                cart.push({
                    product_no: pNo,
                    display_name: nameTH,
                    condiment: condimentText,
                    price: itemPrice,
                    qty: 1
                });
            }
            updateCartBadge();
            renderCartItems();
        }

        function updateCartBadge() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count-badge').innerText = totalQty;
        }

        function toggleCartModal(show) {
            const modal = document.getElementById('cart-modal');
            if (show) { modal.classList.remove('hidden'); renderCartItems(); } 
            else { modal.classList.add('hidden'); }
        }

        function changeQty(index, amount) {
            cart[index].qty += amount;
            if (cart[index].qty <= 0) { cart.splice(index, 1); }
            updateCartBadge();
            renderCartItems();
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items-list');
            if (cart.length === 0) {
                container.innerHTML = `<p class="text-center py-8 text-gray-500">ไม่มีสินค้าในตะกร้าสินค้า</p>`;
                document.getElementById('cart-total-price').innerText = '฿0.00';
                return;
            }

            container.innerHTML = cart.map((item, idx) => `
                <div class="flex items-center justify-between bg-gray-950 p-3.5 rounded-xl border border-gray-800">
                    <div class="flex-1 pr-2">
                        <h5 class="font-bold text-xs text-gray-200">${item.display_name}</h5>
                        <p class="text-[11px] text-amber-500 font-medium mt-0.5"><i class="fas fa-sliders-h text-[9px]"></i> ${item.condiment}</p>
                    </div>
                    <div class="flex items-center space-x-3">
                        <button onclick="changeQty(${idx}, -1)" class="w-6 h-6 rounded-lg bg-gray-800 text-white flex items-center justify-center text-xs"><i class="fas fa-minus"></i></button>
                        <span class="font-bold text-xs text-gray-100 min-w-[14px] text-center">${item.qty}</span>
                        <button onclick="changeQty(${idx}, 1)" class="w-6 h-6 rounded-lg bg-gray-800 text-white flex items-center justify-center text-xs"><i class="fas fa-plus"></i></button>
                        <span class="font-black text-xs text-amber-500 min-w-[55px] text-right">฿${(item.price * item.qty).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');

            const grandTotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            document.getElementById('cart-total-price').innerText = `฿${grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function submitOrderToServer() {
            if (cart.length === 0) return;
            const roomNo = document.getElementById('customer-room').value.trim();
            const guestName = document.getElementById('customer-name').value.trim();

            if (!roomNo || !guestName) { alert("กรุณากรอกข้อมูลห้องพักและชื่อผู้สั่งให้ครบถ้วนนะครับ"); return; }

            const submitBtn = document.getElementById('btn-submit-order');
            submitBtn.disabled = true;

            const orderItemsString = cart.map(item => `${item.display_name} (${item.condiment}) x${item.qty}`).join(', ');

            const payload = { room_number: roomNo, guest_name: guestName, orderitems: orderItemsString, note: "สั่งผ่านหน้าเว็บระบบบริการห้องพัก" };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            }).then(() => {
                alert("🎉 ส่งรายการสั่งซื้อสำเร็จ!");
                cart = [];
                updateCartBadge();
                document.getElementById('customer-room').value = '';
                document.getElementById('customer-name').value = '';
                toggleCartModal(false);
                submitBtn.disabled = false;
            }).catch(err => { console.error(err); submitBtn.disabled = false; });
        }
    </script>
</body>
</html>
