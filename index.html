<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Order Food</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased custom-scrollbar">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlmkzdGMjeP_kLTLvtKe6BVi0tqsp8I0WWDF6Xp8sa4bBfpEnti6rXxyOvRymefyrd/exec";
    </script>

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2 rounded-lg text-gray-900">
                    <i class="fas fa-utensils text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide text-amber-400">ROOM SERVICE</h1>
                    <p class="text-xs text-gray-400" id="text-header-subtitle">สั่งอาหารสะดวก ส่งตรงถึงห้องพัก</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <div class="bg-gray-900 border border-gray-700 p-1 rounded-xl flex space-x-1 text-xs font-bold">
                    <button onclick="changeLanguage('th')" id="lang-btn-th" class="px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950">TH</button>
                    <button onclick="changeLanguage('en')" id="lang-btn-en" class="px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white">EN</button>
                </div>

                <button onclick="toggleCartModal(true)" class="relative bg-amber-500 hover:bg-amber-400 text-gray-950 px-4 py-2 rounded-full font-bold flex items-center space-x-2 transition cursor-pointer shadow-md">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="hidden sm:inline" id="text-btn-cart">ตะกร้าของฉัน</span>
                    <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex space-x-2 border-b border-gray-700 pb-4 mb-6 overflow-x-auto" id="main-group-tabs"></div>

        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2" id="sub-group-chips"></div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="menu-container">
            <div class="col-span-full text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl text-amber-500 mb-3"></i>
                <p id="text-loading-menu">กำลังโหลดเมนูอาหารแสนอร่อย...</p>
            </div>
        </div>
    </main>

    <div id="condiment-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-md w-full shadow-2xl overflow-hidden p-6 animate-fade-in">
            <h3 class="text-xl font-bold text-amber-400 mb-2 flex items-center">
                <i class="fas fa-sliders-h mr-2"></i> <span id="text-condiment-title">ตัวเลือกเพิ่มเติม / Condiment</span>
            </h3>
            <p id="condiment-menu-name" class="text-sm text-gray-300 font-semibold mb-4 border-b border-gray-700 pb-2">ชื่อเมนู</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-2" id="text-condiment-label-select">เลือกรูปแบบ / ตัวเลือกเสริม</label>
                    <div class="grid grid-cols-2 gap-2" id="condiment-options-container"></div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-condiment-label-note">ระบุรายละเอียดเพิ่มเติม (ถ้ามี)</label>
                    <input type="text" id="condiment-custom-note" placeholder="" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="flex space-x-3 mt-6">
                <button onclick="closeCondimentModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2.5 rounded-xl transition cursor-pointer text-sm" id="text-condiment-btn-cancel">
                    ยกเลิก
                </button>
                <button onclick="confirmAddToCartWithCondiment()" class="flex-1 bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-2.5 rounded-xl transition cursor-pointer text-sm shadow-md" id="text-condiment-btn-confirm">
                    ใส่ตะกร้าเลย
                </button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-lg w-full max-h-[90vh] flex flex-col shadow-2xl overflow-hidden animate-fade-in">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                <h3 class="text-lg font-bold text-amber-400 flex items-center"><i class="fas fa-shopping-cart mr-2"></i><span id="text-cart-title">รายการอาหารในตะกร้า</span></h3>
                <button onclick="toggleCartModal(false)" class="text-gray-400 hover:text-white text-xl cursor-pointer"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar" id="cart-items-list"></div>

            <div class="p-4 bg-gray-900/40 border-t border-gray-700/80 space-y-2 text-sm">
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-subtotal">ราคาค่าอาหารรวม (Subtotal)</span>
                    <span id="summary-subtotal">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-service">ค่าบริการ Service Charge (10%)</span>
                    <span id="summary-service-charge">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-vat">ภาษีมูลค่าเพิ่ม VAT (7%)</span>
                    <span id="summary-vat">฿0.00</span>
                </div>
                <div class="pt-2 border-t border-gray-700 flex justify-between items-center text-gray-200">
                    <span class="font-bold text-base" id="text-bill-grandtotal">ยอดรวมสุทธิ (Grand Total)</span>
                    <span class="text-2xl font-black text-amber-400" id="cart-total-price">฿0.00</span>
                </div>
            </div>

            <div class="p-4 bg-gray-800/80 border-t border-gray-700 space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-form-room">หมายเลขห้อง (Room No.) *</label>
                        <input type="text" id="customer-room" placeholder="เช่น 405" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 font-bold text-center">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-form-name">ชื่อผู้สั่ง (Name) *</label>
                        <input type="text" id="customer-name" placeholder="เช่น คุณสมชาย" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-form-payment">วิธีชำระเงิน (Payment Method) *</label>
                    <select id="payment-method" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-amber-400 font-bold focus:outline-none focus:border-amber-500 cursor-pointer">
                        <option value="บันทึกเข้าบัญชีห้องพัก (Charge to Room)" class="text-white">บันทึกเข้าบัญชีห้องพัก (Charge to Room)</option>
                        <option value="ชำระเงินสดตอนรับอาหาร (Cash on Delivery)" class="text-white">ชำระเงินสดตอนรับอาหาร (Cash on Delivery)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-form-note">หมายเหตุเพิ่มเติมถึงภาพรวมออเดอร์ (Optional)</label>
                    <input type="text" id="order-note" placeholder="" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                </div>
                
                <button onclick="submitOrderToServer()" id="btn-submit-order" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-gray-950 font-black py-3 rounded-xl transition cursor-pointer shadow-lg text-center mt-2 flex justify-center items-center space-x-2">
                    <i class="fas fa-paper-plane"></i>
                    <span id="text-btn-submit-order">ยืนยันการสั่งซื้อและส่งออเดอร์</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let allMenus = [];
        let cart = [];
        let currentMainGroup = '';
        let currentSubGroup = '';
        let currentLang = 'th'; 
        
        let tempSelectedProductNo = null; 
        let tempSelectedCondimentTH = ''; 
        let tempSelectedCondimentEN = ''; 

        const SERVICE_CHARGE_RATE = 0.10; 
        const VAT_RATE = 0.07;            

        const translations = {
            th: {
                subtitle: "สั่งอาหารสะดวก ส่งตรงถึงห้องพัก",
                btnCart: "ตะกร้าของฉัน",
                loadingMenu: "กำลังโหลดเมนูอาหารแสนอร่อย...",
                condimentTitle: "ตัวเลือกเพิ่มเติม / Option",
                condimentSelect: "เลือกรูปแบบ / ตัวเลือกเสริม",
                condimentNote: "ระบุรายละเอียดเพิ่มเติม (ถ้ามี)",
                condimentPlaceholder: "เช่น ไม่เผ็ด / ไม่ผัก / แยกน้ำซอส",
                btnCancel: "ยกเลิก",
                btnConfirm: "ใส่ตะกร้าเลย",
                cartTitle: "รายการอาหารในตะกร้า",
                emptyCart: "ไม่มีอาหารในตะกร้า",
                perPlate: "บาท / จาน",
                billSubtotal: "ราคาค่าอาหารรวม (Subtotal)",
                billService: "ค่าบริการ Service Charge (10%)",
                billVat: "ภาษีมูลค่าเพิ่ม VAT (7%)",
                billGrandtotal: "ยอดรวมสุทธิ (Grand Total)",
                formRoom: "หมายเลขห้อง (Room No.) *",
                formName: "ชื่อผู้สั่ง (Name) *",
                formPayment: "วิธีชำระเงิน (Payment Method) *",
                formNote: "หมายเหตุเพิ่มเติมถึงภาพรวมออเดอร์ (Optional)",
                formNotePlaceholder: "เช่น ใส่กล่องทั้งหมด, ช้อนส้อม 2 ชุด",
                btnSubmitOrder: "ยืนยันการสั่งซื้อและส่งออเดอร์",
                btnSubmitting: "กำลังส่งออเดอร์ไปยังห้องครัว...",
                addBtn: "เพิ่มลงตะกร้า",
                noMenuMsg: "ไม่มีรายการอาหารในหมวดหมู่นี้",
                alertEmptyCart: "กรุณาเลือกเมนูอาหารลงตะกร้าก่อนส่งออเดอร์ครับ",
                alertFormRequire: "กรุณากรอกข้อมูล 'หมายเลขห้อง' และ 'ชื่อผู้สั่ง' ให้ครบถ้วนก่อนนะครับน้า",
                alertSuccess: "🎉 ส่งออเดอร์สำเร็จ! ห้องครัวรับรายการเรียบร้อยแล้วครับ",
                alertBackendError: "❌ เกิดข้อผิดพลาดจากระบบหลังบ้าน: ",
                alertNetError: "❌ ไม่สามารถส่งออเดอร์ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต"
            },
            en: {
                subtitle: "Convenient room service delivered straight to your room",
                btnCart: "My Cart",
                loadingMenu: "Loading delicious menus...",
                condimentTitle: "Additional Options",
                condimentSelect: "Select Preference / Options",
                condimentNote: "Special instructions (If any)",
                condimentPlaceholder: "e.g., No spicy / No veggies / Sauce on side",
                btnCancel: "Cancel",
                btnConfirm: "Add to Cart",
                cartTitle: "Items in Your Cart",
                emptyCart: "Your cart is empty",
                perPlate: "THB / Plate",
                billSubtotal: "Subtotal",
                billService: "Service Charge (10%)",
                billVat: "VAT (7%)",
                billGrandtotal: "Grand Total",
                formRoom: "Room Number (Room No.) *",
                formName: "Guest Name *",
                formPayment: "Payment Method *",
                formNote: "Overall order note (Optional)",
                formNotePlaceholder: "e.g., Takeaway box, 2 sets of cutlery",
                btnSubmitOrder: "Confirm & Send Order",
                btnSubmitting: "Sending order to kitchen...",
                addBtn: "Add to Cart",
                noMenuMsg: "No items available in this category",
                alertEmptyCart: "Please add items to your cart before ordering.",
                alertFormRequire: "Please fill out both 'Room Number' and 'Guest Name'.",
                alertSuccess: "🎉 Order sent successfully! The kitchen has received your order.",
                alertBackendError: "❌ Backend Error: ",
                alertNetError: "❌ Unable to send order. Please check your internet connection."
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetchMenuData();
        });

        function changeLanguage(lang) {
            currentLang = lang;
            
            if (lang === 'th') {
                document.getElementById('lang-btn-th').className = "px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950";
                document.getElementById('lang-btn-en').className = "px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white";
            } else {
                document.getElementById('lang-btn-th').className = "px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white";
                document.getElementById('lang-btn-en').className = "px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950";
            }

            const dict = translations[lang];
            if(document.getElementById('text-header-subtitle')) document.getElementById('text-header-subtitle').innerText = dict.subtitle;
            if(document.getElementById('text-btn-cart')) document.getElementById('text-btn-cart').innerText = dict.btnCart;
            if(document.getElementById('text-condiment-title')) document.getElementById('text-condiment-title').innerText = dict.condimentTitle;
            if(document.getElementById('text-condiment-label-select')) document.getElementById('text-condiment-label-select').innerText = dict.condimentSelect;
            if(document.getElementById('text-condiment-label-note')) document.getElementById('text-condiment-label-note').innerText = dict.condimentNote;
            if(document.getElementById('text-condiment-custom-note')) document.getElementById('text-condiment-custom-note').placeholder = dict.condimentPlaceholder;
            if(document.getElementById('text-condiment-btn-cancel')) document.getElementById('text-condiment-btn-cancel').innerText = dict.btnCancel;
            if(document.getElementById('text-condiment-btn-confirm')) document.getElementById('text-condiment-btn-confirm').innerText = dict.btnConfirm;
            if(document.getElementById('text-cart-title')) document.getElementById('text-cart-title').innerText = dict.cartTitle;
            if(document.getElementById('text-bill-subtotal')) document.getElementById('text-bill-subtotal').innerText = dict.billSubtotal;
            if(document.getElementById('text-bill-service')) document.getElementById('text-bill-service').innerText = dict.billService;
            if(document.getElementById('text-bill-vat')) document.getElementById('text-bill-vat').innerText = dict.billVat;
            if(document.getElementById('text-bill-grandtotal')) document.getElementById('text-bill-grandtotal').innerText = dict.billGrandtotal;
            if(document.getElementById('text-form-room')) document.getElementById('text-form-room').innerText = dict.formRoom;
            if(document.getElementById('text-form-name')) document.getElementById('text-form-name').innerText = dict.formName;
            if(document.getElementById('text-form-payment')) document.getElementById('text-form-payment').innerText = dict.formPayment;
            if(document.getElementById('text-form-note')) document.getElementById('text-form-note').innerText = dict.formNote;
            if(document.getElementById('order-note')) document.getElementById('order-note').placeholder = dict.formNotePlaceholder;
            if(document.getElementById('text-btn-submit-order')) document.getElementById('text-btn-submit-order').innerText = dict.btnSubmitOrder;

            if (allMenus.length > 0) {
                const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || m.Main_Group || m.group || m.Group || '').trim()))].filter(Boolean);
                renderMainGroupTabs(mainGroups);
                renderMenuList();
                renderCartItems();
            }
        }

        function fetchMenuData() {
            fetch(`${WEB_APP_URL}?action=getAdminData&_nocache=${new Date().getTime()}`) 
                .then(res => res.json())
                .then(data => {
                    if (data && data.menus) {
                        allMenus = data.menus.filter(m => {
                            const st = String(m.status || m.Status || m.state || '').trim().toLowerCase();
                            return st === 'ใช้งาน' || st === 'available' || st === 'พร้อมขาย' || st === '';
                        });
                        
                        if (allMenus.length > 0) {
                            initializeCategoryFilters();
                        } else {
                            showEmptyMessage("ในระบบไม่มีรายการอาหารที่เปิดสถานะ 'ใช้งาน' เลยครับน้า");
                        }
                    } else {
                        showEmptyMessage("ไม่พบโครงสร้างข้อมูลอาหารจาก Google Sheet");
                    }
                })
                .catch(err => {
                    console.error(err);
                    showEmptyMessage("เกิดข้อผิดพลาดในการดึงข้อมูลอาหารจากเซิร์ฟเวอร์");
                });
        }

        function initializeCategoryFilters() {
            const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || m.Main_Group || m.group || m.Group || '').trim()))].filter(Boolean);
            currentMainGroup = mainGroups[0] || '';
            
            if (currentMainGroup) {
                const filteredMenusByMain = allMenus.filter(m => String(m.main_group || m.Main_Group || m.group || m.Group || '').trim() === currentMainGroup);
                const subGroups = [...new Set(filteredMenusByMain.map(m => String(m.sub_group || m.Sub_Group || '').trim()))].filter(Boolean);
                currentSubGroup = subGroups[0] || '';
            }

            changeLanguage('th'); 
        }

        function renderMainGroupTabs(groups) {
            const container = document.getElementById('main-group-tabs');
            if(!container) return;
            container.innerHTML = groups.map(g => `
                <button onclick="selectMainGroup('${g}')" class="px-5 py-2.5 font-bold rounded-xl whitespace-nowrap transition cursor-pointer text-sm ${currentMainGroup === g ? 'bg-amber-500 text-gray-950 shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'}">
                    ${g}
                </button>
            `).join('');
        }

        function selectMainGroup(group) {
            currentMainGroup = group;
            const filteredMenusByMain = allMenus.filter(m => String(m.main_group || m.Main_Group || m.group || m.Group || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filteredMenusByMain.map(m => String(m.sub_group || m.Sub_Group || '').trim()))].filter(Boolean);
            currentSubGroup = subGroups[0] || '';
            
            const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || m.Main_Group || m.group || m.Group || '').trim()))].filter(Boolean);
            renderMainGroupTabs(mainGroups);
            updateSubGroups();
        }

        function updateSubGroups() {
            const filteredMenusByMain = allMenus.filter(m => String(m.main_group || m.Main_Group || m.group || m.Group || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filteredMenusByMain.map(m => String(m.sub_group || m.Sub_Group || '').trim()))].filter(Boolean);
            
            const container = document.getElementById('sub-group-chips');
            if(!container) return;

            if (subGroups.length > 0) {
                container.innerHTML = subGroups.map(sg => `
                    <button onclick="selectSubGroup('${sg}')" class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition cursor-pointer ${currentSubGroup === sg ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-transparent'}">
                        ${sg}
                    </button>
                `).join('');
            } else {
                container.innerHTML = '';
            }
            renderMenuList();
        }

        function selectSubGroup(subGroup) {
            currentSubGroup = subGroup;
            updateSubGroups();
        }

        function renderMenuList() {
            const container = document.getElementById('menu-container');
            if(!container) return;

            const targetMenus = allMenus.filter(m => {
                const mg = String(m.main_group || m.Main_Group || m.group || m.Group || '').trim();
                const sg = String(m.sub_group || m.Sub_Group || '').trim();
                return mg === currentMainGroup && sg === currentSubGroup;
            });

            if (targetMenus.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><i class="fas fa-box-open text-2xl mb-2"></i><p>${translations[currentLang].noMenuMsg}</p></div>`;
                return;
            }

            container.innerHTML = targetMenus.map(menu => {
                const imgUrl = menu.image_url || menu.Image_Url || menu.image || 'https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500';
                const finalPrice = parseFloat(menu.price_thb || menu.Price || menu.price || 0);
                const pNo = menu.product_no || menu.Product_No || menu.id || '00';
                
                const nameTH = menu.menu_name_th || menu.Menu_Name_Th || menu.name_th || menu.name || menu.Menu_Name || 'ไม่มีชื่อเมนู';
                const nameEN = menu.menu_name_en || menu.Menu_Name_En || menu.name_en || menu.menu_name_eng || nameTH;
                const descTH = menu.description_th || menu.Description_Th || menu.desc_th || menu.description || menu.Description || '-';
                const descEN = menu.description_en || menu.Description_En || menu.desc_en || descTH;

                const displayName = currentLang === 'th' ? nameTH : nameEN;
                const displayDesc = currentLang === 'th' ? descTH : descEN;
                const subtitleLang = currentLang === 'th' ? nameEN : nameTH;

                return `
                    <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden shadow-md flex flex-col group hover:border-amber-500/50 transition duration-300">
                        <div class="relative h-48 bg-gray-900 overflow-hidden">
                            <img src="${imgUrl}" alt="${displayName}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500'">
                            <span class="absolute top-3 right-3 bg-gray-950/80 text-amber-400 text-xs px-2.5 py-1 rounded-full font-bold backdrop-blur-sm">ID: ${pNo}</span>
                        </div>
                        <div class="p-4 flex flex-col flex-1">
                            <div class="mb-2">
                                <h4 class="font-bold text-gray-100 text-base line-clamp-1">${displayName}</h4>
                                <p class="text-xs text-gray-400 italic line-clamp-1">${subtitleLang !== displayName ? subtitleLang : ''}</p>
                            </div>
                            <p class="text-xs text-gray-400 line-clamp-2 mb-4 flex-1">${displayDesc}</p>
                            <div class="flex justify-between items-center pt-2 border-t border-gray-700">
                                <span class="text-lg font-black text-amber-400">฿${finalPrice.toLocaleString()}</span>
                                <button onclick="openCondimentModal('${pNo}')" class="bg-amber-500 hover:bg-amber-400 text-gray-950 text-xs font-bold px-3 py-2 rounded-lg flex items-center space-x-1.5 transition cursor-pointer">
                                    <i class="fas fa-plus"></i> <span>${translations[currentLang].addBtn}</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openCondimentModal(productNo) {
            const item = allMenus.find(m => String(m.product_no || m.Product_No || m.id || '00') === String(productNo));
            if (!item) return;

            tempSelectedProductNo = productNo;
            tempSelectedCondimentTH = 'ปกติ';
            tempSelectedCondimentEN = 'Normal';

            const nameTH = item.menu_name_th || item.Menu_Name_Th || item.name_th || item.name || item.Menu_Name || 'Menu';
            const nameEN = item.menu_name_en || item.Menu_Name_En || item.name_en || nameTH;
            const displayMenuName = currentLang === 'th' ? nameTH : nameEN;
            const groupName = item.main_group || item.Main_Group || item.group || '';

            document.getElementById('condiment-menu-name').innerText = `${displayMenuName} (${groupName})`;
            document.getElementById('condiment-custom-note').value = '';

            const optionsContainer = document.getElementById('condiment-options-container');
            let optionsHTML = '';
            const mainType = String(groupName).trim().toLowerCase();

            let choices = [];
            if (mainType.includes('beverage') || mainType.includes('wine') || mainType.includes('drink')) {
                choices = [
                    {th: 'ปกติ', en: 'Normal'},
                    {th: 'ไม่หวาน', en: 'No Sugar'},
                    {th: 'หวานน้อย', en: 'Less Sweet'},
                    {th: 'แยกน้ำแข็ง', en: 'Separate Ice'}
                ];
            } else {
                choices = [
                    {th: 'ปกติ', en: 'Normal'},
                    {th: 'เผ็ดน้อย', en: 'Mild Spicy'},
                    {th: 'ไม่เผ็ด', en: 'Not Spicy'},
                    {th: 'เผ็ดจัด', en: 'Very Spicy'}
                ];
            }

            optionsHTML = choices.map((opt, i) => {
                const buttonText = currentLang === 'th' ? opt.th : opt.en;
                return `
                    <button type="button" onclick="selectCondimentChoice(this, '${opt.th}', '${opt.en}')" class="condiment-btn-choice text-xs p-2 rounded-xl text-center border font-medium cursor-pointer transition ${i===0 ? 'bg-amber-500/20 text-amber-400 border-amber-500' : 'bg-gray-900 border-gray-700 text-gray-400 hover:text-white'}">
                        ${buttonText}
                    </button>
                `;
            }).join('');
            
            if(optionsContainer) optionsContainer.innerHTML = optionsHTML;
            document.getElementById('condiment-modal').classList.remove('hidden');
        }

        function selectCondimentChoice(btnElement, thText, enText) {
            tempSelectedCondimentTH = thText;
            tempSelectedCondimentEN = enText;
            document.querySelectorAll('.condiment-btn-choice').forEach(btn => {
                btn.classList.remove('bg-amber-500/20', 'text-amber-400', 'border-amber-500');
                btn.classList.add('bg-gray-900', 'border-gray-700', 'text-gray-400');
            });
            btnElement.classList.remove('bg-gray-900', 'border-gray-700', 'text-gray-400');
            btnElement.classList.add('bg-amber-500/20', 'text-amber-400', 'border-amber-500');
        }

        function closeCondimentModal() {
            document.getElementById('condiment-modal').classList.add('hidden');
        }

        function confirmAddToCartWithCondiment() {
            const item = allMenus.find(m => String(m.product_no || m.Product_No || m.id || '00') === String(tempSelectedProductNo));
            if (!item) return;

            const customNote = document.getElementById('condiment-custom-note').value.trim();
            
            let finalTH = tempSelectedCondimentTH;
            let finalEN = tempSelectedCondimentEN;

            if (customNote) {
                finalTH += ` [เพิ่มเติม: ${customNote}]`;
                finalEN += ` [Extra: ${customNote}]`;
            }

            const itemPrice = parseFloat(item.price_thb || item.Price || item.price || 0);
            const pNo = item.product_no || item.Product_No || item.id || '00';
            const nameTH = item.menu_name_th || item.Menu_Name_Th || item.name_th || item.name || 'Food';
            const nameEN = item.menu_name_en || item.Menu_Name_En || item.name_en || nameTH;
            
            const existingIndex = cart.findIndex(c => String(c.product_no) === String(pNo) && c.condiment_th === finalTH);

            if (existingIndex > -1) {
                cart[existingIndex].qty += 1;
            } else {
                cart.push({
                    product_no: pNo,
                    name_th: nameTH,
                    name_en: nameEN,
                    price: itemPrice,
                    qty: 1,
                    condiment_th: finalTH,
                    condiment_en: finalEN
                });
            }

            updateCartBadge();
            closeCondimentModal();
        }

        function updateCartQty(productNo, condimentTH, delta) {
            const idx = cart.findIndex(c => String(c.product_no) === String(productNo) && c.condiment_th === condimentTH);
            if (idx === -1) return;

            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) {
                cart.splice(idx, 1);
            }
            updateCartBadge();
            renderCartItems();
        }

        function updateCartBadge() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            const badge = document.getElementById('cart-count-badge');
            if(badge) badge.innerText = totalQty;
        }

        function toggleCartModal(show) {
            const modal = document.getElementById('cart-modal');
            if(!modal) return;
            if (show) {
                modal.classList.remove('hidden');
                renderCartItems();
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderCartItems() {
            const listContainer = document.getElementById('cart-items-list');
            const subtotalContainer = document.getElementById('summary-subtotal');
            const serviceChargeContainer = document.getElementById('summary-service-charge');
            const vatContainer = document.getElementById('summary-vat');
            const totalContainer = document.getElementById('cart-total-price');
            
            if(!listContainer) return;

            if (cart.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-8 text-gray-500"><i class="fas fa-shopping-basket text-xl mb-1"></i><p class="text-sm">${translations[currentLang].emptyCart}</p></div>`;
                if(subtotalContainer) subtotalContainer.innerText = "฿0.00";
                if(serviceChargeContainer) serviceChargeContainer.innerText = "฿0.00";
                if(vatContainer) vatContainer.innerText = "฿0.00";
                if(totalContainer) totalContainer.innerText = "฿0.00";
                return;
            }

            let subtotalPrice = 0;
            listContainer.innerHTML = cart.map(item => {
                const itemSubTotal = item.price * item.qty;
                subtotalPrice += itemSubTotal;

                const nameDisplay = currentLang === 'th' ? item.name_th : item.name_en;
                const condDisplay = currentLang === 'th' ? item.condiment_th : item.condiment_en;

                return `
                    <div class="flex justify-between items-center bg-gray-900/60 p-3 rounded-xl border border-gray-700/50">
                        <div class="flex-1 min-w-0 pr-3">
                            <h5 class="text-sm font-bold text-gray-200 truncate">${nameDisplay}</h5>
                            <p class="text-[11px] text-amber-400 font-medium bg-amber-500/10 px-2 py-0.5 rounded mt-1 inline-block"><i class="fas fa-comment-dots mr-1"></i>${condDisplay}</p>
                            <p class="text-xs text-gray-400 font-semibold mt-1">฿${item.price.toLocaleString(undefined, {minimumFractionDigits: 2})} ${translations[currentLang].perPlate}</p>
                        </div>
                        <div class="flex items-center space-x-2.5">
                            <div class="flex items-center bg-gray-800 rounded-lg border border-gray-600">
                                <button onclick="updateCartQty('${item.product_no}', '${item.condiment_th}', -1)" class="px-2 py-1 text-gray-400 hover:text-white transition"><i class="fas fa-minus text-xs"></i></button>
                                <span class="px-2 font-bold text-sm text-gray-200">${item.qty}</span>
                                <button onclick="updateCartQty('${item.product_no}', '${item.condiment_th}', 1)" class="px-2 py-1 text-gray-400 hover:text-white transition"><i class="fas fa-plus text-xs"></i></button>
                            </div>
                            <span class="text-sm font-bold text-gray-100 min-w-[50px] text-right">฿${itemSubTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            const serviceCharge = subtotalPrice * SERVICE_CHARGE_RATE;
            const vat = (subtotalPrice + serviceCharge) * VAT_RATE;
            const grandTotal = subtotalPrice + serviceCharge + vat;

            if(subtotalContainer) subtotalContainer.innerText = `฿${subtotalPrice.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            if(serviceChargeContainer) serviceChargeContainer.innerText = `฿${serviceCharge.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            if(vatContainer) vatContainer.innerText = `฿${vat.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            if(totalContainer) totalContainer.innerText = `฿${grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        function submitOrderToServer() {
            const roomInput = document.getElementById('customer-room').value.trim();
            const nameInput = document.getElementById('customer-name').value.trim();
            const noteInput = document.getElementById('order-note').value.trim();
            const btn = document.getElementById('btn-submit-order');
            const dict = translations[currentLang];

            if (cart.length === 0) {
                alert(dict.alertEmptyCart);
                return;
            }
            if (!roomInput || !nameInput) {
                alert(dict.alertFormRequire);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i><span>${dict.btnSubmitting}</span>`;

            const modifiedCartItems = cart.map(item => ({
                name: `${item.name_th} / ${item.name_en} (${item.condiment_th} / ${item.condiment_en})`, 
                qty: item.qty
            }));

            let totalSub = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            let totalSvc = totalSub * SERVICE_CHARGE_RATE;
            let totalVat = (totalSub + totalSvc) * VAT_RATE;
            let totalGrand = totalSub + totalSvc + totalVat;
            
            let financialSummary = `[GRAND TOTAL: ฿${totalGrand.toLocaleString(undefined, {minimumFractionDigits: 2})} (Food ฿${totalSub.toLocaleString()} + Svc10% ฿${totalSvc.toLocaleString()} + VAT7% ฿${totalVat.toLocaleString()})]`;
            
            // ดึงค่าวิธีชำระเงินที่เลือกมาพ่วงไว้ที่ช่องหมายเหตุท้ายออเดอร์
            const payMethod = document.getElementById('payment-method').value;
            let finalOrderNote = `[วิธีชำระเงิน: ${payMethod}] ` + (noteInput ? `${noteInput} ${financialSummary}` : financialSummary);

            const orderPayload = {
                action: "createNewOrder",
                room_no: roomInput,
                customer_name: nameInput,
                note: finalOrderNote,
                items: JSON.stringify(modifiedCartItems)
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(orderPayload)
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    alert(dict.alertSuccess);
                    cart = [];
                    updateCartBadge();
                    document.getElementById('customer-room').value = '';
                    document.getElementById('customer-name').value = '';
                    document.getElementById('order-note').value = '';
                    toggleCartModal(false);
                } else {
                    alert(dict.alertBackendError + result.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert(dict.alertNetError);
            })
            .finally(() => {
                btn.disabled = false;
                document.getElementById('text-btn-submit-order').innerText = dict.btnSubmitOrder;
            });
        }

        function showEmptyMessage(msg) {
            const container = document.getElementById('menu-container');
            if(container) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 text-gray-500">
                        <i class="fas fa-exclamation-circle text-2xl mb-2 text-amber-500"></i>
                        <p>${msg}</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
