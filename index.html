<script>
    // 🔗 URL Google Apps Script (Web App) ตัวเดียวกับที่หน้า Admin ของน้าใช้แล้วผ่านสิทธิ์ครับ
    const API_URL = "https://script.google.com/macros/s/AKfycbxlmkzdGMjeP_kLTLvtKe6BVi0tqsp8I0WWDF6Xp8sa4bBfpEnti6rXxyOvRymefyrd/exec";

    // 🚀 ฟังก์ชันดึงข้อมูลเมนูอาหาร (ย้อนกลับไปใช้ลอจิกเดิมของเมื่อวานที่นิ่งที่สุด)
    async function loadMenuData() {
        try {
            // เรียกแสดงข้อความสถานะกำลังโหลดบนบล็อก ID เดิมของน้า
            const loadingElement = document.getElementById("loading-status") || document.getElementById("loading");
            if (loadingElement) {
                loadingElement.innerText = "กำลังโหลดข้อมูลอาหาร...";
            }

            // ดึงข้อมูลรายการอาหารจาก Web App
            const response = await fetch(API_URL);
            const result = await response.json();

            if (result.success && result.menus) {
                // 🎯 คัดกรองเฉพาะเมนูที่มีสถานะ "available" (เปิดขาย) เหมือนเมื่อวานเป๊ะๆ
                const availableMenus = result.menus.filter(item => (item.status || "").trim() === "available");
                
                // นำข้อมูลเมนูไปส่งต่อให้ฟังก์ชันวาดการ์ดเมนูอาหารขึ้นหน้าจอ
                renderMenusToGrid(availableMenus);
            } else {
                showEmptyMessage();
            }
        } catch (error) {
            console.error("เกิดข้อผิดพลาดในการโหลดข้อมูลเมนู:", error);
            showEmptyMessage();
        }
    }

    // 🍽️ ฟังก์ชันวาดการ์ดเมนูอาหารลงหน้าเว็บ (แมปชื่อคีย์ตัวแปรให้ตรงกับระบบชีตของแอดมิน)
    function renderMenusToGrid(menus) {
        // มองหากล่อง Grid แสดงอาหาร โดยรองรับ ID ทุกตัวของหน้าเว็บเดิมของน้าเพื่อป้องกันหน้าจอขาว
        const grid = document.getElementById("menuGridContainer") || 
                     document.getElementById("menu-container") || 
                     document.getElementById("food-items") ||
                     document.getElementById("menu-grid");
        if (!grid) return;

        grid.innerHTML = "";
        
        if (menus.length === 0) {
            grid.innerHTML = `<div class="text-center col-span-full py-8 text-slate-500">ขณะนี้ยังไม่มีเมนูอาหารพร้อมให้บริการครับ</div>`;
            return;
        }

        // วนลูปสร้างการ์ดเมนูอาหาร โดยใช้ชื่อตัวแปรที่ตรงกับข้อมูลหลังบ้านของน้า
        menus.forEach(item => {
            const imgUrl = item.image_url || 'https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500';
            const desc = item.description_th ? `<p class="text-xs text-slate-500 mt-1 line-clamp-2">${item.description_th}</p>` : '';
            
            grid.innerHTML += `
                <div class="bg-slate-900 rounded-xl p-4 border border-slate-800">
                    <div class="relative overflow-hidden rounded-lg">
                        <img src="${imgUrl}" class="w-full h-40 object-cover rounded-lg" onerror="this.src='https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500'">
                        <span class="absolute top-2 right-2 bg-black/70 text-amber-500 text-[10px] font-bold px-2 py-0.5 rounded font-mono">#${item.product_no}</span>
                    </div>
                    <h4 class="font-bold text-white mt-2 text-sm">${item.menu_name_th}</h4>
                    <h5 class="text-xs text-slate-400 font-sans">${item.menu_name_en || ''}</h5>
                    ${desc}
                    
                    <div class="flex justify-between items-center mt-3 pt-2 border-t border-slate-800/50">
                        <span class="text-amber-500 font-bold text-sm">฿${item.price_thb}</span>
                        <button type="button" onclick="addToCart('${item.product_no}', '${item.menu_name_th}', ${item.price_thb})" class="bg-amber-500 hover:bg-amber-600 text-slate-950 text-xs font-bold px-3 py-1.5 rounded-lg transition cursor-pointer">
                            + เพิ่ม
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function showEmptyMessage() {
        const grid = document.getElementById("menuGridContainer") || document.getElementById("menu-container") || document.getElementById("food-items") || document.getElementById("menu-grid");
        if (grid) {
            grid.innerHTML = `<div class="text-center col-span-full py-8 text-slate-500">ขณะนี้ยังไม่มีเมนูอาหารพร้อมให้บริการครับน้า</div>`;
        }
    }

    // 🛒 ฟังก์ชันเชื่อมต่อกับระบบตะกร้าสินค้าเดิมของน้า (ดักรองรับชื่อฟังก์ชันทุกรูปแบบที่น้าอาจใช้)
    function addToCart(id, name, price) {
        console.log("เพิ่มลงตะกร้าสินค้า:", id, name, price);
        if (typeof window.addItemToCart === 'function') {
            window.addItemToCart(id, name, price);
        } else if (typeof window.addToBasket === 'function') {
            window.addToBasket(id, name, price);
        } else if (typeof window.updateCart === 'function') {
            window.updateCart(id, name, price);
        }
    }

    // สั่งให้โหลดข้อมูลทันทีเมื่อหน้าเว็บแสดงผลสำเร็จ
    window.onload = loadMenuData;
</script>
