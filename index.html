<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Order Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased custom-scrollbar">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
    </script>

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2 rounded-lg text-gray-900">
                    <i class="fas fa-utensils text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide text-amber-400">ROOM SERVICE</h1>
                    <p class="text-xs text-gray-400" id="text-header-subtitle">สั่งอาหารสะดวก ส่งตรงถึงห้องพัก</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-3">
                <div class="bg-gray-900 border border-gray-700 p-1 rounded-xl flex space-x-1 text-xs font-bold">
                    <button onclick="changeLanguage('th')" id="lang-btn-th" class="px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950">TH</button>
                    <button onclick="changeLanguage('en')" id="lang-btn-en" class="px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white">EN</button>
                </div>

                <button onclick="toggleCartModal(true)" class="relative bg-amber-500 hover:bg-amber-400 text-gray-950 px-4 py-2 rounded-full font-bold flex items-center space-x-2 transition cursor-pointer shadow-md">
                    <i class="fas fa-shopping-basket"></i>
                    <span class="hidden sm:inline" id="text-btn-cart">ตะกร้าของฉัน</span>
                    <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex space-x-2 border-b border-gray-700 pb-4 mb-6 overflow-x-auto" id="main-group-tabs"></div>

        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2" id="sub-group-chips"></div>

        <div class="grid grid-cols-2 gap-4 sm:grid-cols-2 md:grid-cols-3 md:gap-6" id="menu-container">
            <div class="col-span-full text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl text-amber-500 mb-3"></i>
                <p id="text-loading-menu">กำลังโหลดเมนูอาหารแสนอร่อย...</p>
            </div>
        </div>
    </main>

    <div id="condiment-modal" class="fixed inset-0 bg-black bg-opacity-80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-md w-full shadow-2xl overflow-hidden p-6">
            <h3 class="text-xl font-bold text-amber-400 mb-2 flex items-center">
                <i class="fas fa-sliders-h mr-2"></i> <span id="text-condiment-title">ตัวเลือกเพิ่มเติม / Condiment</span>
            </h3>
            <p id="condiment-menu-name" class="text-sm text-gray-300 font-semibold mb-4 border-b border-gray-700 pb-2">ชื่อเมนู</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-2" id="text-condiment-label-select">เลือกรูปแบบ / ตัวเลือกเสริม</label>
                    <div class="grid grid-cols-2 gap-2" id="condiment-options-container"></div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-condiment-label-note">ระบุรายละเอียดเพิ่มเติม (ถ้ามี)</label>
                    <input type="text" id="condiment-custom-note" placeholder="" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="flex space-x-3 mt-6">
                <button onclick="closeCondimentModal()" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2.5 rounded-xl transition cursor-pointer text-sm" id="text-condiment-btn-cancel">
                    ยกเลิก
                </button>
                <button onclick="confirmAddToCartWithCondiment()" class="flex-1 bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-2.5 rounded-xl transition cursor-pointer text-sm shadow-md" id="text-condiment-btn-confirm">
                    ใส่ตะกร้าเลย
                </button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-lg w-full max-h-[90vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                <h3 class="text-lg font-bold text-amber-400 flex items-center"><i class="fas fa-shopping-cart mr-2"></i><span id="text-cart-title">รายการอาหารในตะกร้า</span></h3>
                <button onclick="toggleCartModal(false)" class="text-gray-400 hover:text-white text-xl cursor-pointer"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar" id="cart-items-list"></div>

            <div class="p-4 bg-gray-900/40 border-t border-gray-700/80 space-y-2 text-sm">
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-subtotal">ราคาค่าอาหารรวม (Subtotal)</span>
                    <span id="summary-subtotal">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-service">ค่าบริการ Service Charge (10%)</span>
                    <span id="summary-service-charge">฿0.00</span>
                </div>
                <div class="flex justify-between text-gray-400">
                    <span id="text-bill-vat">ภาษีมูลค่าเพิ่ม VAT (7%)</span>
                    <span id="summary-vat">฿0.00</span>
                </div>
                <div class="pt-2 border-t border-gray-700 flex justify-between items-center text-gray-200">
                    <span class="font-bold text-base" id="text-bill-grandtotal">ยอดรวมสุทธิ (Grand Total)</span>
                    <span class="text-2xl font-black text-amber-400" id="cart-total-price">฿0.00</span>
                </div>
            </div>

            <div class="p-4 bg-gray-800 border-t border-gray-700 space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-label-room">หมายเลขห้องพัก (Room No.)</label>
                        <input type="text" id="customer-room" placeholder="เช่น 101, 504" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500 font-bold text-center">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-label-name">ชื่อผู้เข้าพัก (Guest Name)</label>
                        <input type="text" id="customer-name" placeholder="ชื่อภาษาอังกฤษหรือไทย" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-label-payment">วิธีชำระเงิน (Payment Method)</label>
                    <select id="payment-method" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500 font-medium">
                        <option value="Charge to Room" selected>ลงบัญชีห้องพัก (Charge to Room)</option>
                        <option value="Cash on Delivery">เงินสดตอนจัดเสิร์ฟ (Cash on Delivery)</option>
                        <option value="Scan QR Code">สแกนจ่าย QR (Scan QR Code)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1" id="text-label-note">หมายเหตุถึงห้องครัว (Order Note)</label>
                    <input type="text" id="order-note" placeholder="เช่น เผ็ดน้อย, ไม่ใส่ผักชี, ขอช้อนส้อมเพิ่ม" class="w-full bg-gray-950 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                </div>

                <button onclick="submitOrderToServer()" id="btn-submit-order" class="w-full bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-3 rounded-xl transition cursor-pointer flex justify-center items-center shadow-lg text-base mt-2">
                    <i class="fas fa-paper-plane mr-2"></i><span id="text-btn-submit-order">ส่งรายการสั่งอาหาร</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'th';
        let allCategoryStructure = {};
        let rawMenus = [];
        let cart = [];
        let selectedMainGroup = '';
        let selectedSubGroup = 'ALL';
        let condimentTempItem = null;

        const translations = {
            th: {
                headerSubtitle: "สั่งอาหารสะดวก ส่งตรงถึงห้องพัก",
                btnCart: "ตะกร้าของฉัน",
                loadingMenu: "กำลังโหลดเมนูอาหารแสนอร่อย...",
                condimentTitle: "ตัวเลือกเพิ่มเติม / Condiment",
                condimentSelect: "เลือกรูปแบบ / ตัวเลือกเสริม",
                condimentNote: "ระบุรายละเอียดเพิ่มเติม (ถ้ามี)",
                condimentCancel: "ยกเลิก",
                condimentConfirm: "ใส่ตะกร้าเลย",
                cartTitle: "รายการอาหารในตะกร้า",
                subtotal: "ราคาค่าอาหารรวม (Subtotal)",
                serviceCharge: "ค่าบริการ Service Charge (10%)",
                vat: "ภาษีมูลค่าเพิ่ม VAT (7%)",
                grandtotal: "ยอดรวมสุทธิ (Grand Total)",
                labelRoom: "หมายเลขห้องพัก (Room No.)",
                labelName: "ชื่อผู้เข้าพัก (Guest Name)",
                labelPayment: "วิธีชำระเงิน (Payment Method)",
                labelNote: "หมายเหตุถึงห้องครัว (Order Note)",
                btnSubmitOrder: "ส่งรายการสั่งอาหาร",
                alertSelectMain: "กรุณาเลือกกลุ่มหลักก่อนครับ",
                alertRoomReq: "🚨 กรุณาระบุหมายเลขห้องพักด้วยครับน้า!",
                alertSuccess: "🎉 ส่งออเดอร์เข้าห้องครัวสำเร็จแล้วครับน้า! กรุณารอรับอาหารสักครู่ครับ",
                alertNetError: "❌ ออเดอร์ส่งไม่สำเร็จเนื่องจากเครือข่ายขัดข้อง กรุณาลองใหม่อีกครั้งครับ"
            },
            en: {
                headerSubtitle: "Convenient Room Service, Delivered to Your Door",
                btnCart: "My Basket",
                loadingMenu: "Loading delicious menus...",
                condimentTitle: "Additional Options / Condiment",
                condimentSelect: "Select Options / Choice",
                condimentNote: "Special Requests (If any)",
                condimentCancel: "Cancel",
                condimentConfirm: "Add to Basket",
                cartTitle: "Items in your Basket",
                subtotal: "Food Subtotal",
                serviceCharge: "Service Charge (10%)",
                vat: "VAT (7%)",
                grandtotal: "Grand Total",
                labelRoom: "Room Number",
                labelName: "Guest Name",
                labelPayment: "Payment Method",
                labelNote: "Note to Kitchen",
                btnSubmitOrder: "Place Order Now",
                alertSelectMain: "Please select a main group first",
                alertRoomReq: "🚨 Please input your Room Number!",
                alertSuccess: "🎉 Your order has been placed successfully! Please wait a moment.",
                alertNetError: "❌ Network error, failed to place order. Please try again."
            }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('lang-btn-th').className = lang === 'th' ? 'px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950' : 'px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white';
            document.getElementById('lang-btn-en').className = lang === 'en' ? 'px-2.5 py-1.5 rounded-lg transition cursor-pointer bg-amber-500 text-gray-950' : 'px-2.5 py-1.5 rounded-lg transition cursor-pointer text-gray-400 hover:text-white';
            
            document.getElementById('text-header-subtitle').innerText = translations[lang].headerSubtitle;
            document.getElementById('text-btn-cart').innerText = translations[lang].btnCart;
            document.getElementById('text-loading-menu').innerText = translations[lang].loadingMenu;
            document.getElementById('text-condiment-title').innerText = translations[lang].condimentTitle;
            document.getElementById('text-condiment-label-select').innerText = translations[lang].condimentSelect;
            document.getElementById('text-condiment-label-note').innerText = translations[lang].condimentNote;
            document.getElementById('text-condiment-btn-cancel').innerText = translations[lang].condimentCancel;
            document.getElementById('text-condiment-btn-confirm').innerText = translations[lang].condimentConfirm;
            document.getElementById('text-cart-title').innerText = translations[lang].cartTitle;
            document.getElementById('text-bill-subtotal').innerText = translations[lang].subtotal;
            document.getElementById('text-bill-service').innerText = translations[lang].serviceCharge;
            document.getElementById('text-bill-vat').innerText = translations[lang].vat;
            document.getElementById('text-bill-grandtotal').innerText = translations[lang].grandtotal;
            document.getElementById('text-label-room').innerText = translations[lang].labelRoom;
            document.getElementById('text-label-name').innerText = translations[lang].labelName;
            document.getElementById('text-label-payment').innerText = translations[lang].labelPayment;
            document.getElementById('text-label-note').innerText = translations[lang].labelNote;
            document.getElementById('text-btn-submit-order').innerText = translations[lang].btnSubmitOrder;
            
            renderMainTabs();
            renderSubChips();
            renderMenus();
            renderCartList();
        }

        async function initData() {
            try {
                let resCat = await fetch(`${WEB_APP_URL}?action=getCategories`);
                let jsonCat = await resCat.json();
                if (jsonCat.success) allCategoryStructure = jsonCat.structure;

                let resMenu = await fetch(WEB_APP_URL);
                let jsonMenu = await resMenu.json();
                if (jsonMenu.success) rawMenus = jsonMenu.menus;

                let groups = Object.keys(allCategoryStructure);
                if (groups.length > 0) selectedMainGroup = groups[0];

                renderMainTabs();
                renderSubChips();
                renderMenus();
            } catch (err) {
                console.error(err);
            }
        }

        function renderMainTabs() {
            const container = document.getElementById('main-group-tabs');
            let groups = Object.keys(allCategoryStructure);
            if (groups.length === 0) return;
            
            container.innerHTML = groups.map(g => {
                let active = g === selectedMainGroup;
                return `<button onclick="selectMainGroup('${g}')" class="px-5 py-2.5 rounded-xl font-bold transition whitespace-nowrap cursor-pointer text-sm ${active ? 'bg-amber-500 text-gray-950 shadow-md' : 'bg-gray-800 text-gray-400 hover:text-white border border-gray-700'}">${g}</button>`;
            }).join('');
        }

        function selectMainGroup(g) {
            selectedMainGroup = g;
            selectedSubGroup = 'ALL';
            renderMainTabs();
            renderSubChips();
            renderMenus();
        }

        function renderSubChips() {
            const container = document.getElementById('sub-group-chips');
            if (!selectedMainGroup) {
                container.innerHTML = `<span class="text-xs text-gray-500">${translations[currentLang].alertSelectMain}</span>`;
                return;
            }
            let list = allCategoryStructure[selectedMainGroup] || [];
            let fullList = ['ALL', ...list];

            container.innerHTML = fullList.map(s => {
                let active = s === selectedSubGroup;
                return `<button onclick="selectSubGroup('${s}')" class="px-3 py-1.5 rounded-full text-xs font-semibold tracking-wide transition whitespace-nowrap cursor-pointer ${active ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50 font-bold' : 'bg-gray-900 text-gray-500 hover:text-gray-300 border border-gray-800' }">${s}</button>`;
            }).join('');
        }

        function selectSubGroup(s) {
            selectedSubGroup = s;
            renderSubChips();
            renderMenus();
        }

        function renderMenus() {
            const container = document.getElementById('menu-container');
            let filtered = rawMenus.filter(m => m.main_group === selectedMainGroup && String(m.status).trim() === "เปิดใช้งาน");
            if (selectedSubGroup !== 'ALL') {
                filtered = filtered.filter(m => m.sub_group === selectedSubGroup);
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-600 text-xs">No active menu items found in this section.</div>`;
                return;
            }

            container.innerHTML = filtered.map(m => {
                let name = currentLang === 'th' ? m.menu_name_th : m.menu_name_en;
                let desc = currentLang === 'th' ? m.description_th : m.description_en;
                let img = m.image_url || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format&fit=crop&q=60';
                
                return `
                    <div class="bg-gray-800 border border-gray-700/60 rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition flex flex-col group">
                        <div class="relative h-36 xs:h-40 bg-gray-950 overflow-hidden">
                            <img src="${img}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" alt="${name}">
                            <div class="absolute bottom-2 right-2 bg-gray-950/80 backdrop-blur-md px-2.5 py-1 rounded-xl text-amber-400 font-black text-sm border border-gray-700/50">
                                ฿${parseFloat(m.price_thb).toLocaleString()}
                            </div>
                        </div>
                        <div class="p-3 flex-1 flex flex-col justify-between">
                            <div>
                                <h4 class="font-bold text-gray-100 text-sm line-clamp-1 group-hover:text-amber-400 transition">${name}</h4>
                                <p class="text-[11px] text-gray-400 mt-1 line-clamp-2 leading-relaxed">${desc || '-'}</p>
                            </div>
                            <button onclick="openCondimentModal(${JSON.stringify(m).replace(/"/g, '&quot;')})" class="w-full mt-3 bg-gray-900 hover:bg-amber-500 hover:text-gray-950 text-amber-400 text-xs font-bold py-2 rounded-xl transition cursor-pointer border border-amber-500/20 hover:border-transparent flex justify-center items-center space-x-1 shadow-sm">
                                <i class="fas fa-plus text-[10px]"></i> <span>สั่งเมนูนี้</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openCondimentModal(menuItem) {
            condimentTempItem = menuItem;
            let name = currentLang === 'th' ? menuItem.menu_name_th : menuItem.menu_name_en;
            document.getElementById('condiment-menu-name').innerText = name;
            document.getElementById('condiment-custom-note').value = '';

            let opsContainer = document.getElementById('condiment-options-container');
            if (menuItem.main_group.toLowerCase() === 'wine') {
                opsContainer.innerHTML = `
                    <button onclick="setCondimentOpt('เสิร์ฟเป็นแก้ว (Glass)')" class="condiment-opt-btn border border-gray-600 p-2.5 text-xs rounded-xl text-center font-semibold text-gray-300 bg-gray-900" id="opt-g1">เสิร์ฟเป็นแก้ว (Glass)</button>
                    <button onclick="setCondimentOpt('เสิร์ฟเปิดขวด (Bottle)')" class="condiment-opt-btn border border-gray-600 p-2.5 text-xs rounded-xl text-center font-semibold text-gray-300 bg-gray-900" id="opt-g2">เสิร์ฟเปิดขวด (Bottle)</button>
                `;
            } else {
                opsContainer.innerHTML = `
                    <button onclick="setCondimentOpt('จานปกติ (Standard)')" class="condiment-opt-btn border border-amber-500 text-amber-400 p-2.5 text-xs rounded-xl text-center font-bold bg-amber-500/10" id="opt-g1">จานปกติ (Standard)</button>
                    <button onclick="setCondimentOpt('พิเศษ/กับข้าว (Premium)')" class="condiment-opt-btn border border-gray-600 p-2.5 text-xs rounded-xl text-center font-semibold text-gray-300 bg-gray-900" id="opt-g2">พิเศษ/กับข้าว (Premium)</button>
                `;
            }
            
            condimentTempItem.selectedOpt = menuItem.main_group.toLowerCase() === 'wine' ? 'เสิร์ฟเป็นแก้ว (Glass)' : 'จานปกติ (Standard)';
            document.getElementById('condiment-modal').classList.remove('hidden');
        }

        function setCondimentOpt(optVal) {
            condimentTempItem.selectedOpt = optVal;
            let btns = document.querySelectorAll('.condiment-opt-btn');
            btns.forEach(b => {
                if (b.innerText === optVal) {
                    b.className = "condiment-opt-btn border border-amber-500 text-amber-400 p-2.5 text-xs rounded-xl text-center font-bold bg-amber-500/10";
                } else {
                    b.className = "condiment-opt-btn border border-gray-600 p-2.5 text-xs rounded-xl text-center font-semibold text-gray-300 bg-gray-900";
                }
            });
        }

        function closeCondimentModal() {
            document.getElementById('condiment-modal').classList.add('hidden');
            condimentTempItem = null;
        }

        function confirmAddToCartWithCondiment() {
            if (!condimentTempItem) return;
            let customNote = document.getElementById('condiment-custom-note').value.trim();
            
            let cartItem = {
                product_no: condimentTempItem.product_no,
                menu_name_th: condimentTempItem.menu_name_th,
                menu_name_en: condimentTempItem.menu_name_en,
                price: parseFloat(condimentTempItem.price_thb),
                option: condimentTempItem.selectedOpt,
                note: customNote,
                qty: 1
            };

            let match = cart.find(c => c.product_no === cartItem.product_no && c.option === cartItem.option && c.note === cartItem.note);
            if (match) {
                match.qty += 1;
            } else {
                cart.push(cartItem);
            }

            updateCartBadge();
            closeCondimentModal();
        }

        function updateCartBadge() {
            let totalQty = cart.reduce((sum, c) => sum + c.qty, 0);
            document.getElementById('cart-count-badge').innerText = totalQty;
        }

        function toggleCartModal(show) {
            const modal = document.getElementById('cart-modal');
            if (show) {
                modal.classList.remove('hidden');
                renderCartList();
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderCartList() {
            const container = document.getElementById('cart-items-list');
            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-500 text-xs">ไม่มีสินค้าในตะกร้าคราบน้า / Basket is empty</div>`;
                calculateBill(0);
                return;
            }

            let subtotal = 0;
            container.innerHTML = cart.map((c, index) => {
                let name = currentLang === 'th' ? c.menu_name_th : c.menu_name_en;
                let rowTotal = c.price * c.qty;
                subtotal += rowTotal;

                return `
                    <div class="bg-gray-900 border border-gray-700/80 rounded-xl p-3 flex justify-between items-center text-xs">
                        <div class="flex-1 mr-2">
                            <h5 class="font-bold text-gray-200 text-sm">${name}</h5>
                            <span class="text-[10px] bg-amber-500/10 text-amber-400 px-1.5 py-0.5 rounded border border-amber-500/20 font-medium inline-block mt-1">${c.option}</span>
                            ${c.note ? `<p class="text-[10px] text-gray-400 mt-1 italic"><i class="fa-regular fa-comment-dots mr-1"></i>${c.note}</p>` : ''}
                        </div>
                        <div class="flex items-center space-x-3 text-right">
                            <div class="flex items-center bg-gray-950 rounded-lg p-1 border border-gray-800">
                                <button onclick="updateQty(${index}, -1)" class="w-6 h-6 text-gray-400 hover:text-white cursor-pointer font-bold">-</button>
                                <span class="w-6 text-center text-white font-bold text-sm">${c.qty}</span>
                                <button onclick="updateQty(${index}, 1)" class="w-6 h-6 text-gray-400 hover:text-white cursor-pointer font-bold">+</button>
                            </div>
                            <span class="font-bold text-amber-400 w-16 text-sm">฿${rowTotal.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }).join('');

            calculateBill(subtotal);
        }

        function updateQty(index, dir) {
            cart[index].qty += dir;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartBadge();
            renderCartList();
        }

        function calculateBill(sub) {
            let sc = sub * 0.10;
            let vat = (sub + sc) * 0.07;
            let grand = sub + sc + vat;

            document.getElementById('summary-subtotal').innerText = `฿${sub.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
            document.getElementById('summary-service-charge').innerText = `฿${sc.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
            document.getElementById('summary-vat').innerText = `฿${vat.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
            document.getElementById('cart-total-price').innerText = `฿${grand.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        }

        function submitOrderToServer() {
            const roomVal = document.getElementById('customer-room').value.trim();
            const nameVal = document.getElementById('customer-name').value.trim();
            const paymentVal = document.getElementById('payment-method').value;
            const noteVal = document.getElementById('order-note').value.trim();
            const btnSubmit = document.getElementById('btn-submit-order');

            if (!roomVal) {
                alert(translations[currentLang].alertRoomReq);
                return;
            }

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i><span>Sending Order...</span>`;

            let orderItemsSummary = cart.map(c => {
                let menuName = currentLang === 'th' ? c.menu_name_th : c.menu_name_en;
                return `${menuName} [${c.option}] (x${c.qty}) ${c.note ? `*โน้ต: ${c.note}` : ''}`;
            }).join(' \n');

            const payload = {
                room_no: roomVal,
                customer_name: nameVal,
                items: orderItemsSummary,
                note: `${noteVal} [ชำระเงินด้วย: ${paymentVal}]`.trim()
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert(translations[currentLang].alertSuccess);
                cart = [];
                updateCartBadge();
                toggleCartModal(false);
                document.getElementById('customer-room').value = '';
                document.getElementById('customer-name').value = '';
                document.getElementById('order-note').value = '';
                
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fas fa-paper-plane mr-2"></i><span>${translations[currentLang].btnSubmitOrder}</span>`;
            })
            .catch(err => {
                console.error(err);
                alert(translations[currentLang].alertNetError);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fas fa-paper-plane mr-2"></i><span>${translations[currentLang].btnSubmitOrder}</span>`;
            });
        }

        window.onload = initData;
    </script>
</body>
</html>
