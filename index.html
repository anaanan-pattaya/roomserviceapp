<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Order Food</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased custom-scrollbar">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxlmkzdGMjeP_kLTLvtKe6BVi0tqsp8I0WWDF6Xp8sa4bBfpEnti6rXxyOvRymefyrd/exec";
    </script>

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2 rounded-lg text-gray-900">
                    <i class="fas fa-utensils text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wide text-amber-400">ROOM SERVICE</h1>
                    <p class="text-xs text-gray-400">สั่งอาหารสะดวก ส่งตรงถึงห้องพัก</p>
                </div>
            </div>
            <button onclick="toggleCartModal(true)" class="relative bg-amber-500 hover:bg-amber-400 text-gray-900 px-4 py-2 rounded-full font-bold flex items-center space-x-2 transition cursor-pointer shadow-md">
                <i class="fas fa-shopping-basket"></i>
                <span class="hidden sm:inline">ตะกร้าของฉัน</span>
                <span id="cart-count-badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-6">
        <div class="flex space-x-2 border-b border-gray-700 pb-4 mb-6 overflow-x-auto" id="main-group-tabs">
            </div>

        <div class="flex space-x-2 mb-6 overflow-x-auto pb-2" id="sub-group-chips">
            </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="menu-container">
            <div class="col-span-full text-center py-12 text-gray-400">
                <i class="fas fa-spinner fa-spin text-3xl text-amber-500 mb-3"></i>
                <p>กำลังโหลดเมนูอาหารแสนอร่อย...</p>
            </div>
        </div>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-lg w-full max-h-[90vh] flex flex-col shadow-2xl overflow-hidden animate-fade-in">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800/50">
                <h3 class="text-lg font-bold text-amber-400"><i class="fas fa-shopping-cart mr-2"></i>รายการอาหารในตะกร้า</h3>
                <button onclick="toggleCartModal(false)" class="text-gray-400 hover:text-white text-xl cursor-pointer"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 space-y-3 custom-scrollbar" id="cart-items-list">
                </div>

            <div class="p-4 bg-gray-800/80 border-t border-gray-700 space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1">หมายเลขห้อง (Room No.) *</label>
                        <input type="text" id="customer-room" placeholder="เช่น 405" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 font-bold text-center">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-1">ชื่อผู้สั่ง (Name) *</label>
                        <input type="text" id="customer-name" placeholder="เช่น คุณสมชาย" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1">หมายเหตุเพิ่มเติมถึงห้องครัว (Optional)</label>
                    <input type="text" id="order-note" placeholder="เช่น เผ็ดน้อย, ไม่ใส่ผักผักชี" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                </div>
                
                <div class="pt-2 border-t border-gray-700 flex justify-between items-center">
                    <span class="text-gray-300 font-medium">ราคารวมทั้งสิ้น:</span>
                    <span class="text-2xl font-black text-amber-400" id="cart-total-price">฿0</span>
                </div>
                
                <button onclick="submitOrderToServer()" id="btn-submit-order" class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-400 hover:to-orange-400 text-gray-950 font-black py-3 rounded-xl transition cursor-pointer shadow-lg text-center mt-2 flex justify-center items-center space-x-2">
                    <i class="fas fa-paper-plane"></i>
                    <span>ยืนยันการสั่งซื้อและส่งออเดอร์</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let allMenus = [];
        let cart = [];
        let currentMainGroup = '';
        let currentSubGroup = '';

        document.addEventListener('DOMContentLoaded', () => {
            fetchMenuData();
        });

        // ดึงข้อมูลรายการเมนูจากหลังบ้าน
        function fetchMenuData() {
            fetch(`${WEB_APP_URL}?action=getAdminData`) 
                .then(res => res.json())
                .then(data => {
                    if (data && data.menus) {
                        // กรองเฉพาะรายการที่ระบุว่า 'ใช้งาน' หรือ 'available'
                        allMenus = data.menus.filter(m => {
                            const st = String(m.status || '').trim().toLowerCase();
                            return st === 'ใช้งาน' || st === 'available' || st === 'พร้อมขาย';
                        });
                        
                        if (allMenus.length > 0) {
                            initializeCategoryFilters();
                        } else {
                            showEmptyMessage("ในระบบไม่มีรายการอาหารที่เปิดสถานะ 'ใช้งาน' เลยครับน้า");
                        }
                    } else {
                        showEmptyMessage("ไม่พบโครงสร้างข้อมูลอาหารจาก Google Sheet");
                    }
                })
                .catch(err => {
                    console.error(err);
                    showEmptyMessage("เกิดข้อผิดพลาดในการดึงข้อมูลอาหารจากเซิร์ฟเวอร์");
                });
        }

        function initializeCategoryFilters() {
            const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || '').trim()))].filter(Boolean);
            currentMainGroup = mainGroups[0] || '';
            
            renderMainGroupTabs(mainGroups);
            updateSubGroups();
        }

        function renderMainGroupTabs(groups) {
            const container = document.getElementById('main-group-tabs');
            container.innerHTML = groups.map(g => `
                <button onclick="selectMainGroup('${g}')" class="px-5 py-2.5 font-bold rounded-xl whitespace-nowrap transition cursor-pointer text-sm ${currentMainGroup === g ? 'bg-amber-500 text-gray-950 shadow-md' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white'}">
                    ${g}
                </button>
            `).join('');
        }

        function selectMainGroup(group) {
            currentMainGroup = group;
            const mainGroups = [...new Set(allMenus.map(m => String(m.main_group || '').trim()))].filter(Boolean);
            renderMainGroupTabs(mainGroups);
            updateSubGroups();
        }

        function updateSubGroups() {
            const filteredMenusByMain = allMenus.filter(m => String(m.main_group || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filteredMenusByMain.map(m => String(m.sub_group || '').trim()))].filter(Boolean);
            currentSubGroup = subGroups[0] || '';

            const container = document.getElementById('sub-group-chips');
            if (subGroups.length > 0) {
                container.innerHTML = subGroups.map(sg => `
                    <button onclick="selectSubGroup('${sg}')" class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition cursor-pointer ${currentSubGroup === sg ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-transparent'}">
                        ${sg}
                    </button>
                `).join('');
            } else {
                container.innerHTML = '';
            }
            renderMenuList();
        }

        function selectSubGroup(subGroup) {
            currentSubGroup = subGroup;
            const filteredMenusByMain = allMenus.filter(m => String(m.main_group || '').trim() === currentMainGroup);
            const subGroups = [...new Set(filteredMenusByMain.map(m => String(m.sub_group || '').trim()))].filter(Boolean);
            
            const container = document.getElementById('sub-group-chips');
            container.innerHTML = subGroups.map(sg => `
                <button onclick="selectSubGroup('${sg}')" class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition cursor-pointer ${currentSubGroup === sg ? 'bg-amber-500/20 text-amber-400 border border-amber-500/50' : 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-transparent'}">
                    ${sg}
                </button>
            `).join('');
            
            renderMenuList();
        }

        function renderMenuList() {
            const container = document.getElementById('menu-container');
            const targetMenus = allMenus.filter(m => String(m.main_group || '').trim() === currentMainGroup && String(m.sub_group || '').trim() === currentSubGroup);

            if (targetMenus.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500"><i class="fas fa-box-open text-2xl mb-2"></i><p>ไม่มีเมนูอาหารในหมวดหมู่นี้</p></div>`;
                return;
            }

            container.innerHTML = targetMenus.map(menu => {
                const imgUrl = menu.image_url && String(menu.image_url).includes('http') ? menu.image_url : 'https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500';
                const finalPrice = parseFloat(menu.price_thb || 0);
                
                return `
                    <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden shadow-md flex flex-col group hover:border-amber-500/50 transition duration-300">
                        <div class="relative h-48 bg-gray-900 overflow-hidden">
                            <img src="${imgUrl}" alt="${menu.menu_name_th}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=500'">
                            <span class="absolute top-3 right-3 bg-gray-950/80 text-amber-400 text-xs px-2.5 py-1 rounded-full font-bold backdrop-blur-sm">ID: ${menu.product_no}</span>
                        </div>
                        <div class="p-4 flex flex-col flex-1">
                            <div class="mb-2">
                                <h4 class="font-bold text-gray-100 text-base line-clamp-1">${menu.menu_name_th}</h4>
                                <p class="text-xs text-gray-400 italic line-clamp-1">${menu.menu_name_en || ''}</p>
                            </div>
                            <p class="text-xs text-gray-400 line-clamp-2 mb-4 flex-1">${menu.description_th || 'ไม่มีรายละเอียดเพิ่มเติม'}</p>
                            <div class="flex justify-between items-center pt-2 border-t border-gray-700">
                                <span class="text-lg font-black text-amber-400">฿${finalPrice.toLocaleString()}</span>
                                <button onclick="addToCart('${menu.product_no}')" class="bg-amber-500 hover:bg-amber-400 text-gray-950 text-xs font-bold px-3 py-2 rounded-lg flex items-center space-x-1.5 transition cursor-pointer">
                                    <i class="fas fa-plus"></i> <span>เพิ่มลงตะกร้า</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(productNo) {
            const item = allMenus.find(m => String(m.product_no) === String(productNo));
            if (!item) return;

            const existingIndex = cart.findIndex(c => String(c.product_no) === String(productNo));
            const itemPrice = parseFloat(item.price_thb || 0);

            if (existingIndex > -1) {
                cart[existingIndex].qty += 1;
            } else {
                cart.push({
                    product_no: item.product_no,
                    name: item.menu_name_th,
                    price: itemPrice,
                    qty: 1
                });
            }
            updateCartBadge();
            renderCartItems();
        }

        function updateCartQty(productNo, delta) {
            const idx = cart.findIndex(c => String(c.product_no) === String(productNo));
            if (idx === -1) return;

            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) {
                cart.splice(idx, 1);
            }
            updateCartBadge();
            renderCartItems();
        }

        function updateCartBadge() {
            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cart-count-badge').innerText = totalQty;
        }

        // ควบคุมเปิด-ปิดตะกร้า
        function toggleCartModal(show) {
            const modal = document.getElementById('cart-modal');
            if (show) {
                modal.classList.remove('hidden');
                renderCartItems();
            } else {
                modal.classList.add('hidden');
            }
        }

        function renderCartItems() {
            const listContainer = document.getElementById('cart-items-list');
            const totalContainer = document.getElementById('cart-total-price');
            
            if (cart.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-8 text-gray-500"><i class="fas fa-shopping-basket text-xl mb-1"></i><p class="text-sm">ไม่มีอาหารในตะกร้า</p></div>`;
                totalContainer.innerText = "฿0";
                return;
            }

            let totalPrice = 0;
            listContainer.innerHTML = cart.map(item => {
                const subTotal = item.price * item.qty;
                totalPrice += subTotal;
                return `
                    <div class="flex justify-between items-center bg-gray-900/60 p-3 rounded-xl border border-gray-700/50">
                        <div class="flex-1 min-w-0 pr-3">
                            <h5 class="text-sm font-bold text-gray-200 truncate">${item.name}</h5>
                            <p class="text-xs text-amber-400 font-semibold">฿${item.price.toLocaleString()} / จาน</p>
                        </div>
                        <div class="flex items-center space-x-2.5">
                            <div class="flex items-center bg-gray-800 rounded-lg border border-gray-600">
                                <button onclick="updateCartQty('${item.product_no}', -1)" class="px-2 py-1 text-gray-400 hover:text-white transition"><i class="fas fa-minus text-xs"></i></button>
                                <span class="px-2 font-bold text-sm text-gray-200">${item.qty}</span>
                                <button onclick="updateCartQty('${item.product_no}', 1)" class="px-2 py-1 text-gray-400 hover:text-white transition"><i class="fas fa-plus text-xs"></i></button>
                            </div>
                            <span class="text-sm font-bold text-gray-100 min-w-[50px] text-right">฿${subTotal.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            totalContainer.innerText = `฿${totalPrice.toLocaleString()}`;
        }

        // ยิงออเดอร์ไปลงทะเบียนที่ฝั่ง Google Sheet
        function submitOrderToServer() {
            const roomInput = document.getElementById('customer-room').value.trim();
            const nameInput = document.getElementById('customer-name').value.trim();
            const noteInput = document.getElementById('order-note').value.trim();
            const btn = document.getElementById('btn-submit-order');

            if (cart.length === 0) {
                alert("กรุณาเลือกเมนูอาหารลงตะกร้าก่อนส่งออเดอร์ครับ");
                return;
            }
            if (!roomInput || !nameInput) {
                alert("กรุณากรอกข้อมูล 'หมายเลขห้อง' และ 'ชื่อผู้สั่ง' ให้ครบถ้วนก่อนนะครับน้า");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-2"></i><span>กำลังส่งออเดอร์ไปยังห้องครัว...</span>`;

            const orderPayload = {
                action: "createNewOrder",
                room_no: roomInput,
                customer_name: nameInput,
                note: noteInput,
                items: JSON.stringify(cart)
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify(orderPayload)
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    alert("🎉 ส่งออเดอร์สำเร็จ! ห้องครัวรับรายการเรียบร้อยแล้วครับ");
                    cart = [];
                    updateCartBadge();
                    document.getElementById('customer-room').value = '';
                    document.getElementById('customer-name').value = '';
                    document.getElementById('order-note').value = '';
                    toggleCartModal(false);
                } else {
                    alert("❌ เกิดข้อผิดพลาดจากระบบหลังบ้าน: " + result.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("❌ ไม่สามารถส่งออเดอร์ได้ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-paper-plane mr-2"></i><span>ยืนยันการสั่งซื้อและส่งออเดอร์</span>`;
            });
        }

        function showEmptyMessage(msg) {
            document.getElementById('menu-container').innerHTML = `
                <div class="col-span-full text-center py-12 text-gray-500">
                    <i class="fas fa-exclamation-circle text-2xl mb-2 text-amber-500"></i>
                    <p>${msg}</p>
                </div>`;
        }
    </script>
</body>
</html>
