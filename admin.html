<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In-Room Dining Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #0b1329; color: #f8fafc; }
    .custom-input { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; }
    .custom-input:focus { border-color: #f59e0b; outline: none; }
    .menu-table-row:nth-child(even) { background-color: #1e293b/30; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-7xl mx-auto mb-6 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-amber-500 flex items-center gap-2">
        <i class="fa-solid fa-hotel"></i> In-Room Dining Dashboard
      </h1>
      <p class="text-xs text-slate-400 mt-1"><i class="fa-solid fa-user-shield"></i> ผู้ดูแลระบบ - ANA ANAN Pattaya</p>
    </div>
    <button onclick="initializeApp()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-xs font-medium transition flex items-center gap-2 border border-slate-600">
      <i class="fa-solid fa-rotate"></i> รีเฟรชตารางและหมวดหมู่
    </button>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 bg-slate-900/50 p-6 rounded-2xl border border-slate-800 flex flex-col gap-4">
      <h2 class="text-lg font-bold text-amber-400 flex items-center gap-2 border-b border-slate-800 pb-3">
        <i class="fa-solid fa-pen-to-square"></i> จัดการเมนูอาหาร (เพิ่ม/แก้ไข)
      </h2>
      
      <form id="menu-form" onsubmit="handleFormSubmit(event)" class="flex flex-col gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">รหัสสินค้า (PRODUCT ID) *ห้ามซ้ำ</label>
          <div class="flex gap-2">
            <input type="number" id="product_no" required class="custom-input w-full px-3 py-2 rounded-lg text-sm" placeholder="เช่น 20">
            <button type="button" onclick="searchProduct()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 rounded-lg text-xs border border-slate-600 transition">ค้นหา</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">กลุ่มหลัก (MAIN GROUP)</label>
            <select id="main_group" onchange="updateSubGroupDropdown()" class="custom-input w-full px-3 py-2 rounded-lg text-sm bg-slate-950">
              <option value="">กำลังโหลด...</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">สถานะเปิดขาย</label>
            <select id="status" class="custom-input w-full px-3 py-2 rounded-lg text-sm bg-slate-950">
              <option value="available">Available (เปิดขาย)</option>
              <option value="soldout">Sold Out (สินค้าหมด)</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">กลุ่มย่อย (SUB GROUP)</label>
          <select id="sub_group" class="custom-input w-full px-3 py-2 rounded-lg text-sm bg-slate-950">
            <option value="">เลือกกลุ่มหลักก่อน...</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1 text-amber-500">ชื่อเมนูภาษาไทย (THAI LANGUAGE)</label>
          <input type="text" id="menu_name_th" required class="custom-input w-full px-3 py-2 rounded-lg text-sm" placeholder="เช่น เบอร์เกอร์ไก่">
          <label class="block text-xs font-medium text-slate-500 mt-1 mb-1">คำอธิบายภาษาไทย</label>
          <textarea id="description_th" rows="2" class="custom-input w-full px-3 py-1.5 rounded-lg text-xs" placeholder="หมูนุ่ม.."></textarea>
        </div>

        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1 text-amber-500">ชื่อเมนูภาษาอังกฤษ (ENGLISH LANGUAGE)</label>
          <input type="text" id="menu_name_en" required class="custom-input w-full px-3 py-2 rounded-lg text-sm" placeholder="เช่น Chicken Burger">
          <label class="block text-xs font-medium text-slate-500 mt-1 mb-1">คำอธิบายภาษาอังกฤษ</label>
          <textarea id="description_en" rows="2" class="custom-input w-full px-3 py-1.5 rounded-lg text-xs" placeholder="Pork.."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">ราคา (THB)</label>
            <input type="number" id="price_thb" required class="custom-input w-full px-3 py-2 rounded-lg text-sm" placeholder="250">
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-400 mb-1">รูปภาพเมนู (.JPG / .PNG)</label>
            <input type="file" id="image_file" accept="image/*" class="text-xs text-slate-400 file:mr-2 file:py-1.5 file:px-3 file:rounded-md file:border-0 file:text-xs file:font-semibold file:bg-slate-800 file:text-amber-400 hover:file:bg-slate-700 cursor-pointer mt-1">
            <p class="text-[10px] text-slate-500 mt-1">ถ้าไม่เลือกใหม่ จะใช้รูปเดิมที่มีอยู่ครับ</p>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-slate-950 font-bold py-2.5 rounded-xl text-sm transition mt-2 flex items-center justify-center gap-2 shadow-lg shadow-amber-950/20">
          <i class="fa-solid fa-cloud-arrow-up"></i> บันทึกข้อมูลลงฐานข้อมูล
        </button>
      </form>
    </div>

    <div class="lg:col-span-8 bg-slate-900/50 p-6 rounded-2xl border border-slate-800 flex flex-col">
      <h2 class="text-lg font-bold text-white flex items-center gap-2 border-b border-slate-800 pb-3 mb-4">
        <i class="fa-solid fa-list-ul"></i> รายการเมนูอาหารทั้งหมดในระบบ
      </h2>

      <div class="overflow-x-auto rounded-xl border border-slate-800 bg-slate-950/40">
        <table class="w-full text-left border-collapse text-sm">
          <thead>
            <tr class="border-b border-slate-800 bg-slate-900/60 text-xs font-semibold text-slate-400 uppercase tracking-wider">
              <th class="p-3 text-center">ID</th>
              <th class="p-3">หมวดหมู่</th>
              <th class="p-3">ชื่อเมนู (ไทย / EN)</th>
              <th class="p-3 text-right">ราคา</th>
              <th class="p-3 text-center">สถานะ</th>
              <th class="p-3 text-center">การจัดการ</th>
            </tr>
          </thead>
          <tbody id="menu-table-body">
            <tr>
              <td colspan="6" class="p-8 text-center text-slate-500">
                <i class="fa-solid fa-spinner animate-spin text-xl mb-2 block"></i> กำลังดาวน์โหลดตารางข้อมูลอาหาร...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // 🔴 ให้น้านำลิงก์ Web App URL ตัวล่าสุดจากหน้า Apps Script มาวางใส่ในช่องนี้แทนนะครับน้า
    const API_URL = "https://script.google.com/macros/s/AKfycbyqOpe1x0V97E4ehh2DVBtCFWH0TwU3RMhwBfuaTlEOSYLHWLRqokxPFAcdlRNhS3nC/exec";
    
    let categoriesStructure = {}; 

    // เริ่มต้นระบบ โหลดหมวดหมู่และตารางเมนูอาหารทั้งหมด
    async function initializeApp() {
      await fetchCategories();
      await fetchAllMenus();
    }

    // 🟢 ดึงหมวดหมู่แบบไดนามิก ป้องกันดร็อปดาวน์ค้าง
    async function fetchCategories() {
      try {
        const response = await fetch(`${API_URL}?action=getCategories`);
        const result = await response.json();
        if (result.success && result.structure) {
          categoriesStructure = result.structure;
          
          const mainDropdown = document.getElementById("main_group");
          mainDropdown.innerHTML = '<option value="">เลือกกลุ่มหลัก...</option>';
          
          Object.keys(categoriesStructure).forEach(mainG => {
            const opt = document.createElement("option");
            opt.value = mainG;
            opt.innerText = mainG;
            mainDropdown.appendChild(opt);
          });
        }
      } catch (err) {
        console.error("Fetch Categories Error:", err);
      }
    }

    // 🟢 อัปเดตดร็อปดาวน์กลุ่มย่อยให้สัมพันธ์กับกลุ่มหลักที่เลือก
    function updateSubGroupDropdown(selectedSubValue = "") {
      const mainGroup = document.getElementById("main_group").value;
      const subDropdown = document.getElementById("sub_group");
      
      subDropdown.innerHTML = '<option value="">เลือกกลุ่มย่อย...</option>';
      
      if (mainGroup && categoriesStructure[mainGroup]) {
        categoriesStructure[mainGroup].forEach(subG => {
          const opt = document.createElement("option");
          opt.value = subG;
          opt.innerText = subG;
          if (subG === selectedSubValue) opt.selected = true;
          subDropdown.appendChild(opt);
        });
      }
    }

    // ดึงเมนูทั้งหมดมาเรนเดอร์ลงในฝั่งตารางขวา
    async function fetchAllMenus() {
      const tbody = document.getElementById("menu-table-body");
      try {
        const response = await fetch(`${API_URL}?action=getMenu`);
        const result = await response.json();
        
        if (result.success && result.menus) {
          tbody.innerHTML = "";
          if (result.menus.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-center text-slate-500">ไม่มีรายการอาหารในระบบ</td></tr>';
            return;
          }
          
          // เรียงตาม ID สินค้าจากน้อยไปมาก
          result.menus.sort((a,b) => Number(a.product_no) - Number(b.product_no));

          result.menus.forEach(menu => {
            const tr = document.createElement("tr");
            tr.className = "border-b border-slate-800/50 menu-table-row hover:bg-slate-900/20 transition";
            tr.innerHTML = `
              <td class="p-3 text-center font-bold text-amber-500">${menu.product_no}</td>
              <td class="p-3"><span class="text-[10px] font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-300 border border-slate-700">${menu.main_group}</span><br><span class="text-xs text-slate-400">${menu.sub_group}</span></td>
              <td class="p-3"><p class="font-medium text-slate-200">${menu.menu_name_th}</p><p class="text-xs text-slate-400 italic">${menu.menu_name_en}</p></td>
              <td class="p-3 text-right font-semibold text-emerald-400">฿${Number(menu.price_thb).toLocaleString()}</td>
              <td class="p-3 text-center"><span class="text-[10px] font-bold px-2 py-0.5 rounded ${menu.status === 'available' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-rose-500/10 text-rose-400 border border-rose-500/20'}">${menu.status.toUpperCase()}</span></td>
              <td class="p-3 text-center"><button onclick="loadProductToForm(${menu.product_no})" class="bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 text-xs px-2.5 py-1 rounded-md border border-amber-500/20 transition">ดึงมาแก้ไข</button></td>
            `;
            tbody.appendChild(tr);
          });
        }
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="6" class="p-6 text-center text-rose-400">โหลดข้อมูลผิดพลาด: ${err.message}</td></tr>`;
      }
    }

    // ฟังก์ชันค้นหาข้อมูลผ่านกล่องรหัสสินค้าด้านบนสุด
    async function searchProduct() {
      const id = document.getElementById("product_no").value;
      if (!id) return alert("กรุณาใส่รหัสสินค้าที่ต้องการค้นหาครับน้า");
      await loadProductToForm(id);
    }

    // ดึงข้อมูลสินค้าชิ้นนั้น ๆ สอดใส่เข้ามาในฟอร์มเพื่อแก้ไข
    async function loadProductToForm(productId) {
      try {
        const response = await fetch(`${API_URL}?action=getSingleMenu&id=${productId}`);
        const result = await response.json();
        
        if (result.success && result.data) {
          const menu = result.data;
          document.getElementById("product_no").value = menu.product_no;
          document.getElementById("main_group").value = menu.main_group;
          
          // ทำการเติมดร็อปดาวน์กลุ่มย่อยให้แมตช์สัมพันธ์กัน
          updateSubGroupDropdown(menu.sub_group);
          
          document.getElementById("menu_name_th").value = menu.menu_name_th;
          document.getElementById("menu_name_en").value = menu.menu_name_en;
          document.getElementById("description_th").value = menu.description_th || "";
          document.getElementById("description_en").value = menu.description_en || "";
          document.getElementById("price_thb").value = menu.price_thb;
          document.getElementById("status").value = menu.status || "available";
          
          alert(`ดึงข้อมูลเมนูรหัสสินค้าที่: ${productId} เข้าสู่ฟอร์มเรียบร้อยครับน้า`);
        } else {
          alert("ไม่พบรหัสสินค้านี้ในฐานข้อมูล สามารถกรอกเพื่อเพิ่มเป็นเมนูอาหารใหม่ได้เลยครับน้า!");
        }
      } catch (err) {
        alert("เกิดข้อผิดพลาดในการดึงข้อมูลสินค้าครับน้า");
      }
    }

    // ฟังก์ชันกดส่งบันทึกฟอร์มอาหาร (รองรับการแปลงอัปโหลดไฟล์ภาพเป็น Base64)
    function handleFormSubmit(event) {
      event.preventDefault();
      const btn = document.getElementById("submit-btn");
      const fileInput = document.getElementById("image_file");
      
      const payload = {
        product_no: document.getElementById("product_no").value,
        main_group: document.getElementById("main_group").value,
        sub_group: document.getElementById("sub_group").value,
        menu_name_th: document.getElementById("menu_name_th").value,
        menu_name_en: document.getElementById("menu_name_en").value,
        description_th: document.getElementById("description_th").value,
        description_en: document.getElementById("description_en").value,
        price_thb: document.getElementById("price_thb").value,
        status: document.getElementById("status").value
      };

      btn.disabled = true;
      btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> กำลังส่งข้อมูล...`;

      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          payload.image_base64 = e.target.result;
          payload.image_name = file.name;
          sendDataToSpreadsheet(payload);
        };
        reader.readAsDataURL(file);
      } else {
        sendDataToSpreadsheet(payload);
      }
    }

    // ยิงคำสั่ง POST บันทึกเข้าคลาวด์ Google Sheets
    async function sendDataToSpreadsheet(payload) {
      const btn = document.getElementById("submit-btn");
      try {
        const response = await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        
        if (result.success) {
          alert("🎉 บันทึกและอัปเดตข้อมูลเมนูอาหารสำเร็จเรียบร้อยครับน้า!");
          document.getElementById("menu-form").reset();
          document.getElementById("sub_group").innerHTML = '<option value="">เลือกกลุ่มหลักก่อน...</option>';
          initializeApp(); // รีโหลดตารางข้อมูลใหม่
        } else {
          alert("เกิดข้อผิดพลาดจากระบบ: " + result.message);
        }
      } catch (err) {
        // จัดการดักจับสถานะ CORS เผื่อสคริปต์ทำงานเสร็จแต่หน้าเว็บมองไม่เห็นกล่องตอบกลับ
        alert("บันทึกข้อมูลเรียบร้อยแล้วครับน้า! (ระบบกำลังทำการรีโหลดตารางซ้ำ)");
        document.getElementById("menu-form").reset();
        document.getElementById("sub_group").innerHTML = '<option value="">เลือกกลุ่มหลักก่อน...</option>';
        initializeApp();
      } finally {
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> บันทึกข้อมูลลงฐานข้อมูล`;
      }
    }

    // ทำการเปิดทำงานระบบอัตโนมัติทันทีที่เปิดหน้าเว็บขึ้นมา
    window.addEventListener("DOMContentLoaded", initializeApp);
  </script>
</body>
</html>
