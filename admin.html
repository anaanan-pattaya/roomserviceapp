<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Admin Dynamic Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .form-input { background-color: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.625rem; color: #f8fafc; width: 100%; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2); }
        .btn-primary { background: linear-gradient(to right, #f59e0b, #d97706); color: #0f172a; font-weight: 600; padding: 0.75rem 1.5rem; border-radius: 0.5rem; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .table-header { background-color: #1e293b; color: #94a3b8; font-weight: 500; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 pb-4 border-b border-slate-800">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-amber-500 flex items-center gap-3">
                    <i class="fa-solid mt-1 fa-utensils"></i> Room Service App
                </h1>
                <p class="text-slate-400 text-sm mt-1">ระบบจัดการอัปเดตข้อมูลเมนูอาหาร</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6 self-start">
                
                <div class="bg-slate-900/80 border border-slate-700 rounded-xl p-5 backdrop-blur-sm shadow-xl">
                    <h3 class="text-sm font-semibold text-amber-500 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-folder-plus"></i> เพิ่มกลุ่มหลัก / กลุ่มย่อยใหม่เข้าระบบ
                    </h3>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-[11px] font-medium text-slate-400 mb-1">กลุ่มหลัก (เช่น Food, Wine)</label>
                                <input type="text" id="new_main_group" class="form-input text-xs" placeholder="พิมพ์กลุ่มหลัก...">
                            </div>
                            <div>
                                <label class="block text-[11px] font-medium text-slate-400 mb-1">กลุ่มย่อย (เช่น Dessert, -)</label>
                                <input type="text" id="new_sub_group" class="form-input text-xs" placeholder="พิมพ์กลุ่มย่อย...">
                            </div>
                        </div>
                        <button type="button" onclick="addNewCategoryRow()" id="btnSaveCat" class="w-full bg-slate-800 hover:bg-amber-500 hover:text-slate-900 text-amber-500 font-medium text-xs py-2.5 rounded-lg border border-slate-600 hover:border-amber-500 transition flex items-center justify-center gap-2">
                            <i class="fa-solid fa-cloud-arrow-up"></i> ส่งหมวดหมู่ใหม่เข้า Google App
                        </button>
                    </div>
                </div>

                <div class="bg-slate-900/50 border border-slate-800 rounded-xl p-6 backdrop-blur-sm">
                    <h2 class="text-xl font-semibold text-slate-200 mb-6 flex items-center gap-2">
                        <i class="fa-regular fa-square-plus text-amber-500"></i> จัดการเมนูอาหาร (เพิ่ม/แก้ไข)
                    </h2>

                    <form id="menuForm" class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">รหัสสินค้า (PRODUCT ID)</label>
                                <div class="flex gap-2">
                                    <input type="number" id="product_no" required class="form-input">
                                    <button type="button" id="btnSearch" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 rounded-lg border border-slate-700 text-sm transition">ค้นหา</button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">สถานะเปิดขาย</label>
                                <select id="status" class="form-input">
                                    <option value="available">Available (เปิดขาย)</option>
                                    <option value="disabled">Disabled (ปิดขายชั่วคราว)</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">กลุ่มหลัก (MAIN GROUP)</label>
                                <select id="main_group" required class="form-input">
                                    <option value="">กำลังโหลดหมวดหมู่...</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">กลุ่มย่อย (SUB GROUP)</label>
                                <select id="sub_group" class="form-input">
                                    <option value="">เลือกกลุ่มย่อย</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5">ชื่อเมนูภาษาไทย</label>
                            <input type="text" id="menu_name_th" required class="form-input" placeholder="เช่น ข้าวผัดกุ้ง">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5">คำอธิบายภาษาไทย</label>
                            <textarea id="description_th" rows="2" class="form-input" placeholder="คำอธิบาย..."></textarea>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5">ชื่อเมนูภาษาอังกฤษ</label>
                            <input type="text" id="menu_name_en" required class="form-input" placeholder="เช่น Fried Rice">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-slate-400 mb-1.5">คำอธิบายภาษาอังกฤษ</label>
                            <textarea id="description_en" rows="2" class="form-input" placeholder="Description..."></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">ราคา (THB)</label>
                                <input type="number" id="price_thb" required class="form-input" placeholder="0">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-slate-400 mb-1.5">รูปภาพเมนู</label>
                                <input type="file" id="menu_image" accept="image/*" class="text-xs text-slate-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-amber-500/10 file:text-amber-500 hover:file:bg-amber-500/20 file:cursor-pointer">
                            </div>
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full btn-primary flex items-center justify-center gap-2 mt-2 shadow-lg">
                            <i class="fa-regular fa-floppy-disk"></i> บันทึกข้อมูลเมนู
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7 bg-slate-900/30 border border-slate-800 rounded-xl overflow-hidden backdrop-blur-sm">
                <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                    <h3 class="font-semibold text-slate-200 flex items-center gap-2">
                        <i class="fa-solid fa-table-list text-amber-500"></i> รายการเมนูทั้งหมดในระบบ
                    </h3>
                    <span id="menuCount" class="text-xs bg-slate-800 text-slate-400 px-2.5 py-1 rounded-full border border-slate-700">0 เมนู</span>
                </div>
                
                <div class="overflow-x-auto max-h-[780px]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="table-header">
                                <th class="p-3 text-center w-16">No.</th>
                                <th class="p-3 text-center w-16">รหัส</th>
                                <th class="p-3">รูป</th>
                                <th class="p-3">หมวดหมู่</th>
                                <th class="p-3">ชื่อเมนูอาหาร</th>
                                <th class="p-3 w-20">ราคา</th>
                                <th class="p-3 text-center w-24">สถานะ</th>
                                <th class="p-3 text-center w-24">การจัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="menuTableBody" class="divide-y divide-slate-800 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxlmkzdGMjeP_kLTLvtKe6BVi0tqsp8I0WWDF6Xp8sa4bBfpEnti6rXxyOvRymefyrd/exec";
        let categoriesStructure = {};
        let cachedMenus = []; // 📦 สต็อกเก็บเมนูอาหารทั้งหมดที่ดาวน์โหลดมา

        async function initializeApp() {
            renderTablePlaceholder('<i class="fa-solid fa-spinner animate-spin text-xl mb-2 block"></i> กำลังดาวน์โหลดโครงสร้างหมวดหมู่...');
            await fetchCategories();
            await fetchAllMenus();
        }

        async function fetchCategories() {
            try {
                const response = await fetch(`${API_URL}?action=getCategories`);
                const result = await response.json();
                if (result.success && Object.keys(result.structure).length > 0) {
                    categoriesStructure = result.structure;
                } else {
                    categoriesStructure = { "Food": [], "Beverage": [], "Wine": [] };
                }
                updateMainGroupDropdown();
            } catch (error) {
                console.error("โหลดกลุ่มหมวดหมู่ล้มเหลว:", error);
                categoriesStructure = { "Food": [], "Beverage": [], "Wine": [] };
                updateMainGroupDropdown();
            }
        }

        function updateMainGroupDropdown() {
            const mainSelect = document.getElementById("main_group");
            mainSelect.innerHTML = '<option value="">เลือกกลุ่มหลัก</option>';
            Object.keys(categoriesStructure).forEach(mainGroup => {
                mainSelect.innerHTML += `<option value="${mainGroup}">${mainGroup}</option>`;
            });
        }

        // 🔄 ดักจับเมื่อเปลี่ยนกลุ่มหลัก
        document.getElementById("main_group").addEventListener("change", function() {
            const mainGroup = this.value;
            const subSelect = document.getElementById("sub_group");
            subSelect.innerHTML = '<option value="">เลือกกลุ่มย่อย</option>';
            if (mainGroup && categoriesStructure[mainGroup]) {
                categoriesStructure[mainGroup].forEach(subGroup => {
                    subSelect.innerHTML += `<option value="${subGroup}">${subGroup}</option>`;
                });
            }
            renderFilteredTable(); // อัปเดตตารางทันทีเมื่อขยับดร็อปดาวน์
        });

        // 🔄 ดักจับเมื่อเปลี่ยนกลุ่มย่อย
        document.getElementById("sub_group").addEventListener("change", renderFilteredTable);

        async function fetchAllMenus() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.success && result.menus) {
                    cachedMenus = result.menus; // โหลดข้อมูลเข้าคลังเก็บชั่วคราว
                    renderFilteredTable();      // สั่งประมวลผลตารางกรอง
                } else {
                    renderTablePlaceholder('ไม่สามารถดึงข้อมูลรายการอาหารได้');
                }
            } catch (error) {
                console.error("ดาวน์โหลดเมนูอาหารล้มเหลว:", error);
                renderTablePlaceholder('เกิดข้อผิดพลาดในการโหลดตารางรายการอาหาร');
            }
        }

        // 🎯 ฟังก์ชันหัวใจหลัก: กรองเมนูตามดร็อปดาวน์ฝั่งซ้าย และรันลำดับ No. ใหม่
        function renderFilteredTable() {
            const selectedMain = document.getElementById("main_group").value;
            const selectedSub = document.getElementById("sub_group").value;
            const tbody = document.getElementById("menuTableBody");
            
            // 🛑 เงื่อนไขที่ 1: ถ้าแอดมินยังเลือกกลุ่มหลัก หรือ กลุ่มย่อยไม่ครบ ให้เคลียร์ตารางเป็นสีเทาว่างเปล่าทันที
            if (!selectedMain || !selectedSub) {
                document.getElementById("menuCount").innerText = `0 เมนู`;
                renderTablePlaceholder('<i class="fa-solid fa-filter text-amber-500/50 text-xl mb-2 block"></i> กรุณาระบุกลุ่มหลักและกลุ่มย่อยที่ฝั่งซ้ายเพื่อแสดงข้อมูลเมนู');
                return;
            }

            tbody.innerHTML = "";
            let runningNumber = 1; // 🔢 ตัวรันนับเลข No. ใหม่ เริ่มต้นที่ 1 ทุกครั้ง

            cachedMenus.forEach(item => {
                // กรองเฉพาะรายการที่แมตช์ตรงกลุ่มหลักและกลุ่มย่อยฝั่งซ้ายเป๊ะๆ
                const matchMain = item.main_group === selectedMain;
                const matchSub = item.sub_group === selectedSub;

                if (matchMain && matchSub) {
                    const imgTag = item.image_url ? `<img src="${item.image_url}" class="w-12 h-12 object-cover rounded-lg border border-slate-700">` : `<div class="w-12 h-12 bg-slate-800 rounded-lg border border-slate-700 flex items-center justify-center text-slate-600"><i class="fa-regular fa-image"></i></div>`;
                    const statusClass = item.status === "available" ? "bg-emerald-500/10 text-emerald-400 border-emerald-500/20" : "bg-rose-500/10 text-rose-400 border-rose-500/20";
                    const statusText = item.status === "available" ? "AVAILABLE" : "DISABLED";
                    
                    tbody.innerHTML += `
                        <tr class="hover:bg-slate-800/30 transition">
                            <td class="p-3 text-center font-bold text-slate-400">${runningNumber}</td>
                            <td class="p-3 text-center font-semibold text-amber-500">${item.product_no}</td>
                            <td class="p-3">${imgTag}</td>
                            <td class="p-3 text-xs text-slate-400">${item.main_group}<br><span class="text-slate-500 font-bold">${item.sub_group || '-'}</span></td>
                            <td class="p-3 font-medium text-slate-200">${item.menu_name_th}<br><span class="text-xs text-slate-400 font-normal">${item.menu_name_en}</span></td>
                            <td class="p-3 font-semibold text-emerald-400">฿${item.price_thb}</td>
                            <td class="p-3 text-center"><span class="text-[10px] px-2 py-0.5 rounded-full border ${statusClass}">${statusText}</span></td>
                            <td class="p-3 text-center"><button type="button" onclick="loadMenuToForm('${item.product_no}')" class="bg-amber-500/10 hover:bg-amber-500/20 text-amber-500 text-xs px-2 py-1 rounded border border-amber-500/20 transition">ดึงมาแก้ไข</button></td>
                        </tr>
                    `;
                    runningNumber++; // ขยับข้อถัดไป
                }
            });

            // อัปเดตป้ายบอกจำนวนรวมเฉพาะกลุ่มที่โชว์
            document.getElementById("menuCount").innerText = `${runningNumber - 1} เมนู`;

            // 🛑 เงื่อนไขที่ 2: ถ้ากรองแล้วปรากฏว่ายังไม่มีเมนูใดๆ ในกลุ่มย่อยนี้เลยในฐานข้อมูล
            if (runningNumber === 1) {
                renderTablePlaceholder('<i class="fa-regular fa-folder-open text-slate-600 text-xl mb-2 block"></i> ตารางว่างเปล่า! ยังไม่มีข้อมูลอาหารลงทะเบียนไว้ในกลุ่มย่อยนี้');
            }
        }

        function renderTablePlaceholder(htmlContent) {
            document.getElementById("menuTableBody").innerHTML = `<tr><td colspan="8" class="p-12 text-center text-slate-500">${htmlContent}</td></tr>`;
        }

        // 🆕 ฟังก์ชันส่งข้อมูลกลุ่มย่อย/กลุ่มหลักใหม่เข้าไปยัง Google Sheets
        async function addNewCategoryRow() {
            const mainInput = document.getElementById("new_main_group").value.trim();
            const subInput = document.getElementById("new_sub_group").value.trim();
            const btn = document.getElementById("btnSaveCat");

            if (!mainInput || !subInput) {
                alert("กรุณากรอกระบุทั้งชื่อกลุ่มหลักและกลุ่มย่อยให้ครบถ้วนก่อนกดส่งครับน้า!");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> กำลังส่งเข้าคลาวด์...';

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        actionType: "addCategory",
                        main_group: mainInput,
                        sub_group: subInput
                    })
                });
                const result = await response.json();

                if (result.success) {
                    alert("บันทึกกลุ่มหมวดหมู่ชุดใหม่ลง Google Sheet เรียบร้อยครับน้า!");
                    document.getElementById("new_main_group").value = "";
                    document.getElementById("new_sub_group").value = "";
                    await fetchCategories(); // โหลดดร็อปดาวน์ใหม่โดยอัตโนมัติ
                } else {
                    alert("ข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("บันทึกหมวดหมู่ใหม่เข้าสู่คลาวด์เรียบร้อยแล้วครับน้า!");
                await fetchCategories();
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> ส่งหมวดหมู่ใหม่เข้า Google App';
            }
        }

        async function loadMenuToForm(productId) {
            try {
                const btnSubmit = document.getElementById("btnSubmit");
                btnSubmit.disabled = true;
                btnSubmit.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> กำลังดึงข้อมูล...';
                
                const response = await fetch(`${API_URL}?action=getSingleMenu&id=${productId}`);
                const result = await response.json();
                
                if (result.success && result.data) {
                    const item = result.data;
                    document.getElementById("product_no").value = item.product_no;
                    document.getElementById("status").value = item.status || "available";
                    
                    const mainSelect = document.getElementById("main_group");
                    if (![...mainSelect.options].some(o => o.value === item.main_group)) {
                        mainSelect.innerHTML += `<option value="${item.main_group}">${item.main_group}</option>`;
                    }
                    document.getElementById("main_group").value = item.main_group;
                    
                    const subSelect = document.getElementById("sub_group");
                    subSelect.innerHTML = '<option value="">เลือกกลุ่มย่อย</option>';
                    if (categoriesStructure[item.main_group]) {
                        categoriesStructure[item.main_group].forEach(sub => {
                            subSelect.innerHTML += `<option value="${sub}">${sub}</option>`;
                        });
                    }
                    if (item.sub_group && ![...subSelect.options].some(o => o.value === item.sub_group)) {
                        subSelect.innerHTML += `<option value="${item.sub_group}">${item.sub_group}</option>`;
                    }
                    document.getElementById("sub_group").value = item.sub_group || "";
                    
                    document.getElementById("menu_name_th").value = item.menu_name_th;
                    document.getElementById("menu_name_en").value = item.menu_name_en;
                    document.getElementById("description_th").value = item.description_th || "";
                    document.getElementById("description_en").value = item.description_en || "";
                    document.getElementById("price_thb").value = item.price_thb;
                    
                    renderFilteredTable(); // ล็อกการกรองหน้าตารางให้ตรงตามตัวที่ดึงมาแก้ไขทันที
                    document.getElementById("product_no").scrollIntoView({ behavior: 'smooth' });
                }
            } catch (error) {
                alert("ดึงข้อมูลเมนูล้มเหลว: " + error.toString());
            } finally {
                const btnSubmit = document.getElementById("btnSubmit");
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fa-regular fa-floppy-disk"></i> บันทึกข้อมูลเมนู';
            }
        }

        document.getElementById("btnSearch").addEventListener("click", function() {
            const id = document.getElementById("product_no").value;
            if (id) loadMenuToForm(id);
            else alert("กรุณากรอกรหัสสินค้าก่อนกดค้นหาครับน้า");
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    let encoded = reader.result.toString().replace(/^data:(.*,)?/, '');
                    if ((encoded.length % 4) > 0) {
                        encoded += '='.repeat(4 - (encoded.length % 4));
                    }
                    resolve(encoded);
                };
                reader.onerror = error => reject(error);
            });
        }

        document.getElementById("menuForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById("btnSubmit");
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> กำลังส่งข้อมูลเข้าคลาวด์...';

            try {
                const fileInput = document.getElementById("menu_image");
                let base64Data = "";
                let fileName = "";

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    base64Data = await fileToBase64(file);
                    fileName = file.name;
                }

                const payload = {
                    product_no: document.getElementById("product_no").value,
                    status: document.getElementById("status").value,
                    main_group: document.getElementById("main_group").value,
                    sub_group: document.getElementById("sub_group").value,
                    menu_name_th: document.getElementById("menu_name_th").value,
                    menu_name_en: document.getElementById("menu_name_en").value,
                    description_th: document.getElementById("description_th").value,
                    description_en: document.getElementById("description_en").value,
                    price_thb: document.getElementById("price_thb").value,
                    image_base64: base64Data ? `data:${fileInput.files[0].type};base64,${base64Data}` : "",
                    image_name: fileName
                };

                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();

                if (result.success) {
                    alert("บันทึกข้อมูลเมนูเรียบร้อยแล้วครับน้า!");
                    document.getElementById("menuForm").reset();
                    await fetchAllMenus();
                } else {
                    alert("คลาวด์ปฏิเสธการบันทึก: " + result.message);
                }

            } catch (error) {
                console.error("บันทึกเมนูล้มเหลว:", error);
                alert("ระบบดำเนินการบันทึกและกำลังรีเฟรชตารางข้อมูลครับน้า");
                document.getElementById("menuForm").reset();
                await fetchAllMenus();
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = '<i class="fa-regular fa-floppy-disk"></i> บันทึกข้อมูลเมนู';
            }
        });

        window.onload = initializeApp;
    </script>
</body>
</html>
