<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In-Room Dining Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

    <script>
        // ลิงก์ Web App URL ของน้า
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxmCikCoXMiyEWNWwSjwHHOWkc5C7fcwz0VPR-psh9aipHXsdoZNDrbCdk8JIYlQte8/exec";
    </script>

    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-30 px-6 py-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-yellow-600 text-white rounded-xl flex items-center justify-center text-xl font-bold shadow-md">
                    <i class="fa-solid fa-bell-concierge"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold text-white tracking-wide">In-Room Dining Dashboard</h1>
                    <p class="text-xs text-yellow-500 font-medium"><i class="fa-solid fa-hotel mr-1"></i> ระบบจัดการภายใน ANA ANAN</p>
                </div>
            </div>
            <button onclick="loadOrders()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-xl text-xs font-bold transition-colors flex items-center space-x-2 shadow">
                <i class="fa-solid fa-rotate"></i> <span>รีเฟรชออเดอร์</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-xl p-6 h-fit">
                <h2 class="font-bold text-white text-sm flex items-center space-x-2 mb-4 border-b border-gray-700 pb-3">
                    <i class="fa-solid fa-plus-circle text-yellow-500"></i>
                    <span>เพิ่มเมนูอาหารใหม่</span>
                </h2>
                
                <form id="add-menu-form" onsubmit="submitNewMenu(event)" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">กลุ่มหลัก</label>
                            <select id="menu-group" onchange="updateSubGroupOptions()" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500 font-bold" required>
                                <option value="Food">Food (อาหาร)</option>
                                <option value="Beverage">Beverage (เครื่องดื่ม)</option>
                                <option value="Wine">Wine (ไวน์)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">กลุ่มย่อย</label>
                            <select id="menu-sub" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500 font-bold" required>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">ชื่อเมนู (ภาษาไทย)</label>
                        <input type="text" id="menu-name-th" placeholder="เช่น ชีสเบอร์เกอร์เนื้อ" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500" required>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-gray-400 mb-1">ชื่อเมนู (ภาษาอังกฤษ)</label>
                            <input type="text" id="menu-name-en" placeholder="เช่น Cheese Burger" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-400 mb-1">รหัส (ID)</label>
                            <input type="number" id="menu-id" placeholder="104" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">คำอธิบายเมนู (ภาษาอังกฤษ)</label>
                        <input type="text" id="menu-desc" placeholder="เช่น Beef patty with cheddar cheese" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">ราคา (บาท THB)</label>
                        <input type="number" id="menu-price" placeholder="250" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-yellow-500" required>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1"><i class="fa-solid fa-image mr-1"></i> รูปภาพเมนู (.jpg, .png)</label>
                        <input type="file" id="menu-file" accept="image/*" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-3 py-2 text-xs text-gray-300 focus:outline-none cursor-pointer file:mr-3 file:py-1 file:px-2 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-gray-700 file:text-white" required>
                    </div>

                    <button type="submit" id="btn-add-menu" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-3 rounded-xl transition-all shadow-md flex items-center justify-center space-x-2 text-xs">
                        <i class="fa-solid fa-cloud-arrow-up"></i> <span>บันทึกและอัปโหลดเมนู</span>
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-gray-800 border border-gray-700 rounded-2xl shadow-xl overflow-hidden h-fit">
                <div class="px-6 py-4 border-b border-gray-700 bg-gray-800 flex justify-between items-center">
                    <h2 class="font-bold text-white text-sm flex items-center space-x-2">
                        <i class="fa-solid fa-list text-yellow-500"></i>
                        <span>รายการสั่งอาหารเข้าใหม่ (Live Orders)</span>
                    </h2>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-800 bg-opacity-50 text-gray-400 text-[11px] font-bold uppercase border-b border-gray-700">
                                <th class="p-4 w-36">วัน-เวลา</th>
                                <th class="p-4 w-24">ห้อง</th>
                                <th class="p-4 w-36">ชื่อแขก</th>
                                <th class="p-4">รายละเอียดออเดอร์</th>
                                <th class="p-4 w-28 text-right">ยอดรวม</th>
                            </tr>
                        </thead>
                        <tbody id="order-table-body" class="divide-y divide-gray-700 text-xs">
                            <tr>
                                <td colspan="5" class="p-12 text-center text-gray-500">กำลังโหลดข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <script>
        const subGroupData = {
            "Food": ["Appetizer", "Burger", "Soup", "Main Course", "Dessert"],
            "Beverage": ["Soft Drink", "Juice", "Coffee", "Tea", "Mocktail"],
            "Wine": ["Red Wine", "White Wine", "Sparkling", "Champagne"]
        };

        window.onload = function() {
            loadOrders();
            updateSubGroupOptions();
            setInterval(loadOrders, 20000);
        };

        function updateSubGroupOptions() {
            const mainGroup = document.getElementById('menu-group').value;
            const subGroupSelect = document.getElementById('menu-sub');
            subGroupSelect.innerHTML = '';
            subGroupData[mainGroup].forEach(subName => {
                const option = document.createElement('option');
                option.value = subName; option.innerText = subName;
                subGroupSelect.appendChild(option);
            });
        }

        function loadOrders() {
            const tableBody = document.getElementById('order-table-body');
            fetch(`${WEB_APP_URL}?action=getOrders`)
            .then(res => res.json())
            .then(response => {
                if (response.success) { renderOrderTable(response.orders); }
                else { tableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-400">เกิดข้อผิดพลาด: ${response.message}</td></tr>`; }
            }).catch(err => {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-400">เชื่อมต่อคลาวด์ไม่ได้</td></tr>`;
            });
        }

        function renderOrderTable(orders) {
            const tableBody = document.getElementById('order-table-body');
            if (!orders || orders.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-gray-500">ยังไม่มีรายการสั่งเข้ามาครับ</td></tr>`;
                return;
            }
            tableBody.innerHTML = '';
            orders.forEach(order => {
                const tr = document.createElement('tr');
                tr.className = "bg-gray-800 bg-opacity-20";
                let itemsHtml = order.orderItems || '';
                tr.innerHTML = `
                    <td class="p-4 text-gray-400 whitespace-nowrap">${order.timestamp}</td>
                    <td class="p-4 font-black text-white text-sm"><span class="bg-gray-900 px-2 py-0.5 rounded-lg">${order.roomNumber}</span></td>
                    <td class="p-4 font-bold text-gray-200">${order.guestName}</td>
                    <td class="p-4 text-gray-300">${itemsHtml}</td>
                    <td class="p-4 text-right font-bold text-yellow-500">฿${order.totalPrice.toLocaleString()}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function submitNewMenu(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-add-menu');
            const fileInput = document.getElementById('menu-file');
            
            if(fileInput.files.length === 0) { alert("กรุณาเลือกไฟล์รูปภาพก่อนครับ"); return; }
            
            btn.disabled = true;
            btn.innerHTML = `<span>กำลังอัปเดตไฟล์...</span>`;

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const payload = {
                    action: "addMenu",
                    tabName: document.getElementById('menu-group').value,
                    subGroup: document.getElementById('menu-sub').value,
                    productNo: document.getElementById('menu-id').value,
                    nameEn: document.getElementById('menu-name-en').value.trim(),
                    descEn: document.getElementById('menu-desc').value.trim(),
                    nameTh: document.getElementById('menu-name-th').value.trim(),
                    price: document.getElementById('menu-price').value,
                    status: "Available",
                    imageFile: base64Data,
                    imageFileName: file.name
                };

                fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                })
                .then(() => {
                    alert("🎉 เพิ่มรายการสำเร็จเรียบร้อยครับ!");
                    document.getElementById('add-menu-form').reset();
                    updateSubGroupOptions();
                    btn.disabled = false;
                    btn.innerHTML = `<span>บันทึกและอัปโหลดเมนู</span>`;
                })
                .catch(err => {
                    alert("เครือข่ายขัดข้อง");
                    btn.disabled = false;
                    btn.innerHTML = `<span>บันทึกและอัปโหลดเมนู</span>`;
                });
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
