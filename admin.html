<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลเมนูอาหาร (Admin Backoffice)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-6">
        <header class="flex items-center space-x-3 border-b border-gray-700 pb-4 mb-6">
            <div class="bg-amber-500 p-2 rounded-lg text-gray-950"><i class="fas fa-folder-plus text-lg"></i></div>
            <div>
                <h1 class="text-lg font-black text-amber-400">ADMIN MENU MANAGEMENT</h1>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 shadow">
                <h3 class="text-xs font-bold text-gray-200 mb-3 border-b border-gray-700 pb-1.5">กรอกรายละเอียดเมนู</h3>
                
                <form id="menuForm" class="space-y-3 text-xs">
                    <div>
                        <label class="block text-gray-400 mb-0.5">รหัสสินค้า / Product ID *</label>
                        <input type="text" id="product_no" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-400 mb-0.5">หมวดหมู่หลัก</label>
                            <input type="text" id="main_group" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-0.5">หมวดหมู่ย่อย</label>
                            <input type="text" id="sub_group" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-400 mb-0.5">ชื่อเมนู (ไทย)</label>
                            <input type="text" id="menu_name_th" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-0.5">ชื่อเมนู (Eng)</label>
                            <input type="text" id="menu_name_en" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-0.5">คำอธิบายย่อ (ไทย)</label>
                        <input type="text" id="description_th" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-0.5">คำอธิบายย่อ (Eng)</label>
                        <input type="text" id="description_en" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-gray-400 mb-0.5">ราคาขาย (฿) *</label>
                            <input type="number" id="price_thb" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-0.5">ตัวเลือกเสริม</label>
                            <select id="condiment_required" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                                <option value="ไม่">ไม่ใช่ (ไม่มีป๊อปอัพ)</option>
                                <option value="ใช่">ใช่ (เปิดให้เลือกพิเศษ)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-0.5">สถานะเปิดขาย</label>
                        <select id="status" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white focus:outline-none">
                            <option value="เปิดขาย">เปิดขาย</option>
                            <option value="ปิดขาย">ปิดขาย</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-0.5">รูปภาพสินค้า</label>
                        <input type="file" id="image_file" accept="image/*" class="w-full text-xs text-gray-400 cursor-pointer">
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-amber-500 hover:bg-amber-400 text-gray-950 font-bold py-2 rounded-xl text-xs transition mt-2">
                        <i class="fas fa-save mr-1"></i> บันทึกข้อมูลเมนู
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-gray-800 border border-gray-700 rounded-xl p-5 shadow overflow-x-auto text-xs">
                <h3 class="text-xs font-bold text-gray-200 mb-3 border-b border-gray-700 pb-1.5">รายการอาหารทั้งหมด</h3>
                <table class="w-full text-left">
                    <thead>
                        <tr class="border-b border-gray-700 text-gray-400 bg-gray-900/40">
                            <th class="p-2">ID</th>
                            <th class="p-2">ชื่อเมนู</th>
                            <th class="p-2">หมวดหมู่</th>
                            <th class="p-2 text-right">ราคา</th>
                            <th class="p-2 text-center">สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="menu-table-body" class="divide-y divide-gray-700">
                        <tr><td colspan="5" class="p-4 text-center text-gray-500">กำลังโหลด...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";

        document.addEventListener("DOMContentLoaded", fetchAllMenus);

        function fetchAllMenus() {
            fetch(`${API_URL}?action=getMenuData&_t=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.menus) {
                        document.getElementById("menu-table-body").innerHTML = data.menus.map(m => `
                            <tr>
                                <td class="p-2 font-mono text-amber-500">${m[0]}</td>
                                <td class="p-2"><b>${m[3]}</b></td>
                                <td class="p-2">${m[1]} / ${m[2]}</td>
                                <td class="p-2 text-right">฿${parseFloat(m[7]||0).toLocaleString()}</td>
                                <td class="p-2 text-center"><span class="${m[9]==='เปิดขาย'||m[9]==='Available'?'text-emerald-400':'text-red-400'}">${m[9]||'เปิดขาย'}</span></td>
                            </tr>
                        `).join('');
                    }
                });
        }

        document.getElementById("menuForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            let base64Data = ""; let fileName = "";
            const fileInput = document.getElementById("image_file");
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0]; fileName = file.name;
                base64Data = await new Promise((res) => {
                    const r = new FileReader(); r.onload = () => res(r.result.split(",")[1]); r.readAsDataURL(file);
                });
            }

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "saveMenu",
                    product_no: document.getElementById("product_no").value,
                    main_group: document.getElementById("main_group").value,
                    sub_group: document.getElementById("sub_group").value,
                    menu_name_th: document.getElementById("menu_name_th").value,
                    menu_name_en: document.getElementById("menu_name_en").value,
                    description_th: document.getElementById("description_th").value,
                    description_en: document.getElementById("description_en").value,
                    price_thb: document.getElementById("price_thb").value,
                    condiment_required: document.getElementById("condiment_required").value,
                    status: document.getElementById("status").value,
                    image_base64: base64Data, image_name: fileName
                })
            })
            .then(res => res.json())
            .then(result => {
                if(result.success) { alert("บันทึกเมนูสำเร็จเรียบร้อยครับ!"); document.getElementById("menuForm").reset(); fetchAllMenus(); }
            }).finally(() => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save mr-1"></i> บันทึกข้อมูลเมนู'; });
        });
    </script>
</body>
</html>
