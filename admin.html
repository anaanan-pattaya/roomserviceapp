<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้านจัดการเมนูอาหาร (Admin Backoffice)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="flex items-center justify-between border-b border-gray-700 pb-4 mb-8">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2.5 rounded-xl text-gray-950"><i class="fas fa-folder-plus text-xl"></i></div>
                <div>
                    <h1 class="text-xl font-black text-amber-400">ADMIN MENU MANAGEMENT</h1>
                    <p class="text-xs text-gray-400">เพิ่ม แก้ไขสถานะ และจัดเก็บภาพสินค้าลงระบบ Google Drive</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-xl h-fit">
                <h3 class="text-base font-bold text-gray-100 mb-4 border-b border-gray-700 pb-2 flex items-center"><i class="fas fa-edit mr-2 text-amber-500"></i>รายละเอียดข้อมูลเมนู</h3>
                
                <form id="menuForm" class="space-y-4 text-xs font-semibold">
                    <div>
                        <label class="block text-gray-400 mb-1">รหัสสินค้า / Product ID *</label>
                        <input type="text" id="product_no" placeholder="เช่น P01, F02" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:outline-none focus:border-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-400 mb-1">หมวดหมู่หลัก (Main)</label>
                            <input type="text" id="main_group" placeholder="Food / Beverage" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">หมวดหมู่ย่อย (Sub)</label>
                            <input type="text" id="sub_group" placeholder="Appetizer / Juice" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-400 mb-1">ชื่อเมนู (ภาษาไทย)</label>
                            <input type="text" id="menu_name_th" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">ชื่อเมนู (English)</label>
                            <input type="text" id="menu_name_en" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">คำอธิบายย่อ (ไทย)</label>
                        <input type="text" id="description_th" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">คำอธิบายย่อ (English)</label>
                        <input type="text" id="description_en" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-gray-400 mb-1">ราคาขาย / Price (฿) *</label>
                            <input type="number" id="price_thb" required class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">ตัวเลือกเสริม (Condiment)</label>
                            <select id="condiment_required" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                                <option value="ไม่">ไม่ใช่ (No Pop-up)</option>
                                <option value="ใช่">ใช่ (เปิดป๊อปอัพตัวเลือก)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">สถานะเปิดขาย / Status</label>
                        <select id="status" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-500">
                            <option value="เปิดขาย">เปิดขาย (Available)</option>
                            <option value="ปิดขาย">ปิดขาย (Out of stock)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-400 mb-1">รูปภาพเมนูอาหาร (รูปใหม่)</label>
                        <input type="file" id="image_file" accept="image/*" class="w-full text-xs text-gray-400 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-gray-700 file:text-gray-200 hover:file:bg-gray-600 cursor-pointer">
                    </div>

                    <button type="submit" id="btnSubmit" class="w-full bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-3 rounded-xl transition shadow-md flex justify-center items-center space-x-2 text-sm mt-2">
                        <i class="fas fa-save"></i> <span>บันทึกข้อมูลเมนูอาหาร</span>
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-gray-800 border border-gray-700 rounded-2xl p-6 shadow-xl flex flex-col">
                <h3 class="text-base font-bold text-gray-100 mb-4 border-b border-gray-700 pb-2"><i class="fas fa-list text-amber-500 mr-2"></i>รายการอาหารทั้งหมดในระบบ</h3>
                <div class="overflow-x-auto flex-1 text-xs">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400 bg-gray-900/40">
                                <th class="p-3">ID</th>
                                <th class="p-3">ชื่อเมนู</th>
                                <th class="p-3">หมวดหมู่</th>
                                <th class="p-3 text-right">ราคา</th>
                                <th class="p-3 text-center">ตัวเลือกเสริม</th>
                                <th class="p-3 text-center">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="menu-table-body" class="divide-y divide-gray-700">
                            <tr><td colspan="6" class="p-8 text-center text-gray-500">กำลังเชื่อมต่อรายชื่ออาหาร...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";

        document.addEventListener("DOMContentLoaded", fetchAllMenus);

        function fetchAllMenus() {
            fetch(`${API_URL}?action=getMenuData&_t=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    if(data && data.menus) {
                        const tbody = document.getElementById("menu-table-body");
                        tbody.innerHTML = data.menus.map(m => `
                            <tr class="hover:bg-gray-700/30 transition">
                                <td class="p-3 font-mono text-amber-500">${m[0]}</td>
                                <td class="p-3">
                                    <div class="font-bold">${m[3]}</div>
                                    <div class="text-[10px] text-gray-400 italic">${m[4]||''}</div>
                                </td>
                                <td class="p-3 text-gray-300">${m[1]} / ${m[2]}</td>
                                <td class="p-3 text-right font-bold text-gray-200">฿${parseFloat(m[7]||0).toLocaleString()}</td>
                                <td class="p-3 text-center"><span class="${m[10]==='ใช่'?'text-amber-400 bg-amber-500/10 border border-amber-500/20':'text-gray-500'} px-2 py-0.5 rounded">${m[10]||'ไม่'}</span></td>
                                <td class="p-3 text-center"><span class="${m[9]==='เปิดขาย'||m[9]==='Available'?'text-emerald-400 bg-emerald-500/10':'text-red-400 bg-red-500/10'} px-2 py-0.5 rounded font-bold">${m[9]||'เปิดขาย'}</span></td>
                            </tr>
                        `).join('');
                    }
                }).catch(err => console.error("Error drawing table:", err));
        }

        document.getElementById("menuForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const btn = document.getElementById("btnSubmit");
            btn.disabled = true; btn.innerText = "กำลังอัปโหลดและบันทึก...";

            let base64Data = ""; let fileName = "";
            const fileInput = document.getElementById("image_file");
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileName = file.name;
                base64Data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result.split(",")[1]);
                    reader.readAsDataURL(file);
                });
            }

            const payload = {
                action: "saveMenu",
                product_no: document.getElementById("product_no").value,
                main_group: document.getElementById("main_group").value,
                sub_group: document.getElementById("sub_group").value,
                menu_name_th: document.getElementById("menu_name_th").value,
                menu_name_en: document.getElementById("menu_name_en").value,
                description_th: document.getElementById("description_th").value,
                description_en: document.getElementById("description_en").value,
                price_thb: document.getElementById("price_thb").value,
                condiment_required: document.getElementById("condiment_required").value,
                status: document.getElementById("status").value,
                image_base64: base64Data,
                image_name: fileName
            };

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    alert("บันทึกเมนูและจัดเก็บรูปลงระบบสำเร็จเรียบร้อยครับน้า!");
                    document.getElementById("menuForm").reset();
                    fetchAllMenus();
                } else { alert("เกิดข้อผิดพลาด: " + result.message); }
            })
            .catch(err => alert("บันทึกล้มเหลว: " + err.message))
            .finally(() => { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> <span>บันทึกข้อมูลเมนูอาหาร</span>'; });
        });
    </script>
</body>
</html>
