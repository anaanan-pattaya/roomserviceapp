<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลเมนูอาหาร (Admin Backoffice)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .cyber-font { font-family: 'Chakra Petch', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen antialiased selection:bg-amber-500 selection:text-slate-950">

    <header class="border-b border-slate-900 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-amber-500 to-orange-600 flex items-center justify-center shadow-lg shadow-amber-500/20">
                    <i class="fa-solid fa-utensils text-slate-950 text-xl"></i>
                </div>
                <div>
                    <h1 class="text-md font-bold tracking-tight text-white leading-tight">ROOM SERVICE</h1>
                    <p class="text-[10px] text-amber-500/80 font-medium tracking-wider uppercase cyber-font">Database Center x Drive Storage</p>
                </div>
            </div>
            <div class="flex items-center space-x-3 text-xs">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-slate-400 font-medium cyber-font">CONNECTED TO GOOGLE APP SCRIPT</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div class="bg-slate-900/40 border border-slate-900 rounded-2xl p-6 backdrop-blur-sm">
                    <div class="flex items-center space-x-2 mb-4">
                        <i class="fa-solid fa-folder-plus text-amber-500"></i>
                        <h2 class="text-sm font-bold text-slate-200">เพิ่มกลุ่มหลัก & กลุ่มย่อยชุดใหม่</h2>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">ชื่อกลุ่มหลัก (เช่น Food, Wine)</label>
                            <input type="text" id="new_main_group" placeholder="พิมพ์ชื่อกลุ่มหลัก" class="w-full bg-slate-950 border border-slate-800 text-sm px-3 py-2 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-amber-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">ชื่อกลุ่มย่อย (เช่น Soup, Dessert)</label>
                            <input type="text" id="new_sub_group" placeholder="พิมพ์ชื่อกลุ่มย่อย" class="w-full bg-slate-950 border border-slate-800 text-sm px-3 py-2 rounded-xl text-white placeholder-slate-600 focus:outline-none focus:border-amber-500 transition">
                        </div>
                    </div>

                    <button type="button" id="btnSaveCat" onclick="addNewCategoryRow()" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-slate-950 font-bold py-2.5 rounded-xl text-xs flex items-center justify-center space-x-2 shadow-lg shadow-amber-500/10 cursor-pointer transition">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>ส่งหมวดหมู่ใหม่เข้า Google App</span>
                    </button>
                </div>

                <form id="menuForm" class="bg-slate-900/40 border border-slate-900 rounded-2xl p-6 backdrop-blur-sm space-y-4">
                    <div class="flex items-center justify-between border-b border-slate-900 pb-3">
                        <div class="flex items-center space-x-2">
                            <i class="fa-solid fa-receipt text-amber-500"></i>
                            <h2 class="text-sm font-bold text-slate-200">ฟอร์มบันทึก / อัปเดตข้อมูลเมนู</h2>
                        </div>
                        <span class="text-[10px] cyber-font bg-slate-950 px-2 py-0.5 rounded border border-slate-800 text-slate-400">MENU CONSOLE</span>
                    </div>

                    <div class="grid grid-cols-3 gap-3">
                        <div class="col-span-2">
                            <label class="block text-xs text-slate-400 mb-1">รหัสเมนูสินค้า (Product No.) *</label>
                            <div class="flex space-x-1">
                                <input type="text" id="product_no" required placeholder="ตัวอย่าง: F101" class="w-full bg-slate-950 border border-slate-800 text-sm font-bold px-3 py-2 rounded-xl text-amber-500 focus:outline-none focus:border-amber-500 transition">
                                <button type="button" id="btnSearch" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-xl text-xs border border-slate-700 transition cursor-pointer">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">สถานะระบบ</label>
                            <select id="status" class="w-full bg-slate-950 border border-slate-800 text-sm px-2 py-2 rounded-xl text-white focus:outline-none focus:border-amber-500 transition font-bold">
                                <option value="เปิดใช้งาน" selected class="text-emerald-400">เปิดใช้งาน</option>
                                <option value="ปิดใช้งาน" class="text-rose-400">ปิดใช้งาน</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">เลือกกลุ่มหลัก (Main)</label>
                            <select id="main_group" required class="w-full bg-slate-950 border border-slate-800 text-sm px-3 py-2 rounded-xl text-white focus:outline-none focus:border-amber-500 transition">
                                <option value="">โหลดข้อมูล...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">เลือกกลุ่มย่อย (Sub)</label>
                            <select id="sub_group" required class="w-full bg-slate-950 border border-slate-800 text-sm px-3 py-2 rounded-xl text-white focus:outline-none focus:border-amber-500 transition">
                                <option value="">เลือกกลุ่มหลักก่อน</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">ชื่ออาหาร (ภาษาไทย) *</label>
                            <input type="text" id="menu_name_th" required placeholder="เช่น ข้าวกะเพราไก่" class="w-full bg-slate-955 border border-slate-800 text-sm px-3 py-2 rounded-xl text-white focus:outline-none focus:border-amber-500 transition">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">ชื่ออาหาร (English) *</label>
                            <input type="text" id="menu_name_en" required placeholder="เช่น Basil Chicken Rice" class="w-full bg-slate-955 border border-slate-800 text-sm px-3 py-2 rounded-xl text-white focus:outline-none focus:border-amber-500 transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-slate-400 mb-
