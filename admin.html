<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Service - Admin Backoffice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
    </script>

    <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-amber-500 p-2 rounded-lg text-gray-900">
                    <i class="fas fa-tools text-xl"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-amber-400">ระบบจัดการข้อมูลหลังบ้าน <span class="text-xs bg-amber-500/20 text-amber-300 px-2 py-0.5 rounded ml-2">ADMIN BACKOFFICE</span></h1>
                    <p class="text-xs text-gray-400">ควบคุม แก้ไข และเชื่อมโยงข้อมูลกับ Google Sheets & Drive</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg">
                <h3 class="text-sm font-bold text-amber-400 mb-4 flex items-center"><i class="fas fa-edit mr-2"></i> ข้อมูลรายละเอียดเมนู</h3>
                
                <form id="menu-form" onsubmit="saveMenuData(event)" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">รหัสเมนูสินค้า (Product No.) *</label>
                        <div class="flex space-x-2">
                            <input type="text" id="inp-product-no" required placeholder="ตัวอย่าง: 101" class="flex-1 bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                            <button type="button" onclick="searchProduct()" class="bg-gray-800 hover:bg-gray-700 text-xs font-bold px-4 rounded-lg border border-gray-700"><i class="fas fa-search"></i> ค้นหา</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">เลือกกลุ่มหลัก (Main Group) *</label>
                            <select id="inp-main-group" required onchange="onMainGroupChange()" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-2.5 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                                <option value="Food">Food</option>
                                <option value="Beverage">Beverage</option>
                                <option value="Wine">Wine</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">เลือกกลุ่มย่อย (Sub Group) *</label>
                            <select id="inp-sub-group" required class="w-full bg-gray-950 border border-gray-700 rounded-lg px-2.5 py-2 text-sm text-white focus:outline-none focus:border-amber-500"></select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">ชื่ออาหาร (ภาษาไทย) *</label>
                            <input type="text" id="inp-name-th" required placeholder="เช่น ข้าวกะเพราไก่" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">ชื่ออาหาร (English) *</label>
                            <input type="text" id="inp-name-en" required placeholder="เช่น Basil Chicken Rice" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">คำอธิบายเพิ่มเติม (ไทย)</label>
                        <textarea id="inp-desc-th" rows="2" placeholder="ระบุรายละเอียด เช่น ความเผ็ด ส่วนผสม..." class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-amber-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">คำอธิบายเพิ่มเติม (English)</label>
                        <textarea id="inp-desc-en" rows="2" placeholder="Ingredients details..." class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-amber-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-xs text-amber-400 mb-1"><i class="fas fa-tags text-[10px]"></i> ตัวเลือกเสริมเครื่องปรุง (Condiment) [แยกด้วยเครื่องหมายจุลภาค ,]</label>
                        <input type="text" id="inp-condiments" placeholder="เช่น หวานน้อย, เผ็ดมาก, ไม่ใส่ผัก" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">ราคาอาหาร (บาท THB) *</label>
                            <input type="number" id="inp-price" required placeholder="0" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">สถานะระบบ *</label>
                            <select id="inp-status" required class="w-full bg-gray-950 border border-gray-700 rounded-lg px-2.5 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                                <option value="พร้อมจำหน่าย (Available)">พร้อมจำหน่าย (Available)</option>
                                <option value="หมด (Out of Stock)">หมด (Out of Stock)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">รูปภาพอาหาร (วาง URL ลิงก์ตรงรูปภาพ)</label>
                        <input type="text" id="inp-img-url" placeholder="https://example.com/image.jpg" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
                    </div>

                    <button type="submit" id="btn-save" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 rounded-xl transition cursor-pointer text-sm shadow-md mt-4">
                        <i class="fas fa-save mr-1.5"></i> บันทึกข้อมูลเมนู
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div class="bg-gray-900 border border-gray-800 rounded-2xl p-5 shadow-lg h-full flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-sm font-bold text-amber-400 flex items-center"><i class="fas fa-table mr-2"></i> ตารางรายการอาหารทั้งหมด</h3>
                    <div class="flex space-x-2 text-xs">
                        <select id="table-filter-main" onchange="renderAdminTable()" class="bg-gray-950 border border-gray-700 rounded px-2.5 py-1.5 text-white">
                            <option value="All">ทั้งหมด</option>
                            <option value="Food">Food</option>
                            <option value="Beverage">Beverage</option>
                            <option value="Wine">Wine</option>
                        </select>
                    </div>
                </div>

                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead>
                            <tr class="border-b border-gray-800 text-gray-400 font-semibold bg-gray-950/50">
                                <th class="p-3">รหัส</th>
                                <th class="p-3">รูปภาพ</th>
                                <th class="p-3">ชื่อรายการอาหาร / ตัวเลือกเสริม</th>
                                <th class="p-3 text-right">ราคา</th>
                                <th class="p-3 text-center">สถานะ</th>
                                <th class="p-3 text-center">แอคชั่น</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-gray-800">
                            <tr>
                                <td colspan="6" class="p-8 text-center text-gray-500"><i class="fas fa-spinner fa-spin mr-2"></i> กำลังดึงข้อมูล...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let allMenus = [];
        let categories = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadInitialData();
        });

        function loadInitialData() {
            fetch(WEB_APP_URL)
                .then(res => res.json())
                .then(data => {
                    allMenus = data.menus || [];
                    categories = data.categories || [];
                    
                    populateMainGroupOptions();
                    renderAdminTable();
                })
                .catch(err => {
                    console.error("Error loading admin data: ", err);
                });
        }

        function populateMainGroupOptions() {
            onMainGroupChange(); // อัปเดต Sub-group ทันทีที่โหลด
        }

        function onMainGroupChange() {
            const mainSel = document.getElementById('inp-main-group').value;
            const subSel = document.getElementById('inp-sub-group');
            subSel.innerHTML = '';

            // กรองหา Sub Group ที่เป็นของ Main Group นี้จากชีต Category
            const relatedSubs = categories
                .filter(c => c.main_group.toLowerCase() === mainSel.toLowerCase())
                .map(c => c.sub_group);

            const uniqueSubs = [...new Set(relatedSubs)].filter(Boolean);

            if (uniqueSubs.length > 0) {
                uniqueSubs.forEach(sg => {
                    const opt = document.createElement('option');
                    opt.value = sg;
                    opt.textContent = sg;
                    subSel.appendChild(opt);
                });
            } else {
                const opt = document.createElement('option');
                opt.value = "General";
                opt.textContent = "General";
                subSel.appendChild(opt);
            }
        }

        function renderAdminTable() {
            const filterVal = document.getElementById('table-filter-main').value;
            const tbody = document.getElementById('admin-table-body');
            
            let filtered = allMenus;
            if (filterVal !== "All") {
                filtered = allMenus.filter(m => {
                    const mainG = m.main_group || m.group || "";
                    return mainG.toLowerCase() === filterVal.toLowerCase();
                });
            }

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-8 text-center text-gray-500">ไม่มีข้อมูลอาหารในหมวดหมู่นี้</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                const pNo = item.product_no || item.id || "-";
                const nameTH = item.menu_name_th || item.name_th || item.name || "ไม่มีชื่อ";
                const price = parseFloat(item.price_thb || item.price || 0).toLocaleString();
                const status = item.status || "พร้อมจำหน่าย";
                const img = item.image_url || "https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=100";
                const condiments = item.condiment || "-";

                return `
                    <tr class="hover:bg-gray-900/40">
                        <td class="p-3 font-mono font-bold text-amber-500">${pNo}</td>
                        <td class="p-3">
                            <img src="${img}" class="w-10 h-10 object-cover rounded-lg border border-gray-800" onerror="this.src='https://images.unsplash.com/photo-1495147466023-ac5c588e2e94?w=100'">
                        </td>
                        <td class="p-3">
                            <div class="font-bold text-gray-200">${nameTH}</div>
                            <div class="text-[10px] text-gray-500 mt-0.5">เครื่องปรุง: <span class="text-amber-400">${condiments}</span></div>
                        </td>
                        <td class="p-3 text-right font-bold text-white">฿${price}</td>
                        <td class="p-3 text-center">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold ${status.includes('พร้อม') || status.toLowerCase().includes('avail') ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-red-500/10 text-red-400 border border-red-500/20'}">
                                ${status}
                            </span>
                        </td>
                        <td class="p-3 text-center">
                            <button onclick="editItem('${pNo}')" class="bg-amber-500 hover:bg-amber-400 text-gray-950 font-bold px-2.5 py-1 rounded transition text-[10px]">
                                <i class="fas fa-edit"></i> แก้ไข
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function searchProduct() {
            const pNo = document.getElementById('inp-product-no').value.trim();
            if(!pNo) return;

            const item = allMenus.find(m => String(m.product_no || m.id || "").trim() === String(pNo));
            if (item) {
                document.getElementById('inp-main-group').value = item.main_group || "Food";
                onMainGroupChange();
                document.getElementById('inp-sub-group').value = item.sub_group || "General";
                document.getElementById('inp-name-th').value = item.menu_name_th || item.name_th || "";
                document.getElementById('inp-name-en').value = item.menu_name_en || item.name_en || "";
                document.getElementById('inp-desc-th').value = item.description_th || "";
                document.getElementById('inp-desc-en').value = item.description_en || "";
                document.getElementById('inp-condiments').value = item.condiment || "";
                document.getElementById('inp-price').value = item.price_thb || item.price || 0;
                document.getElementById('inp-status').value = item.status || "พร้อมจำหน่าย (Available)";
                document.getElementById('inp-img-url').value = item.image_url || "";
                alert("พบข้อมูลเมนู รหัส " + pNo + " แล้วครับ ระบบเปลี่ยนเป็นโหมดแก้ไขแล้ว");
            } else {
                alert("ไม่พบรหัสสินค้าที่ระบุ คุณสามารถป้อนข้อมูลเพื่อเพิ่มใหม่ได้เลยครับ");
            }
        }

        function editItem(productNo) {
            document.getElementById('inp-product-no').value = productNo;
            searchProduct();
        }

        function saveMenuData(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin mr-1"></i> กำลังบันทึก...`;

            const payload = {
                action: "saveMenu",
                product_no: document.getElementById('inp-product-no').value.trim(),
                main_group: document.getElementById('inp-main-group').value,
                sub_group: document.getElementById('inp-sub-group').value,
                menu_name_th: document.getElementById('inp-name-th').value.trim(),
                menu_name_en: document.getElementById('inp-name-en').value.trim(),
                description_th: document.getElementById('inp-desc-th').value.trim(),
                description_en: document.getElementById('inp-desc-en').value.trim(),
                condiment: document.getElementById('inp-condiments').value.trim(),
                price_thb: parseFloat(document.getElementById('inp-price').value),
                status: document.getElementById('inp-status').value,
                image_url: document.getElementById('inp-img-url').value.trim()
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    alert("บันทึกข้อมูลเมนูสำเร็จแล้ว!");
                    document.getElementById('menu-form').reset();
                    loadInitialData(); // โหลดใหม่เพื่ออัปเดตตาราง
                } else {
                    alert("เกิดข้อผิดพลาด: " + res.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์หลังบ้านได้");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-save mr-1.5"></i> บันทึกข้อมูลเมนู`;
            });
        }
    </script>
</body>
</html>
