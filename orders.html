<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Orders - จอภาพรับออเดอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0b1329] text-gray-100 font-sans antialiased min-h-screen">

    <header class="max-w-7xl mx-auto px-4 pt-6 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 gap-4">
        <div>
            <h1 class="text-2xl font-black text-emerald-400 flex items-center tracking-wide">
                <i class="fas fa-bell text-xl mr-2.5 animate-bounce"></i> จอภาพรับออเดอร์ห้องพัก (Live Orders)
            </h1>
            <p class="text-xs text-gray-400 mt-0.5">อัปเดตอัตโนมัติเรียลไทม์ • ระบบพิมพ์ออเดอร์ในครัวอัตโนมัติ</p>
        </div>
        <div class="flex items-center space-x-2 w-full md:w-auto justify-end">
            <div id="connection-status" class="bg-amber-500/10 text-amber-400 text-xs px-3 py-1.5 rounded-xl border border-amber-500/30 font-bold flex items-center space-x-1.5">
                <i class="fas fa-circle-notch fa-spin"></i> <span id="status-text">กำลังตรวจสอบสัญญาณ...</span>
            </div>
            <button onclick="fetchLiveOrders()" class="bg-gray-800 hover:bg-gray-700 text-xs text-gray-200 px-3 py-1.5 rounded-xl border border-gray-700 transition font-bold flex items-center space-x-1">
                <i class="fas fa-sync-alt"></i> <span>รีเฟรชทันที</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-900/50 border border-gray-800 p-5 rounded-2xl flex flex-col justify-between">
                <span class="text-xs font-bold text-gray-400 tracking-wide uppercase">ออเดอร์ใหม่รอดำเนินการ</span>
                <span id="count-pending" class="text-5xl font-black text-amber-500 mt-2">0</span>
            </div>
            <div class="bg-gray-900/50 border border-gray-800 p-5 rounded-2xl flex flex-col justify-between">
                <span class="text-xs font-bold text-gray-400 tracking-wide uppercase">เสิร์ฟเรียบร้อยแล้ววันนี้</span>
                <span id="count-served" class="text-5xl font-black text-emerald-400 mt-2">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-7">
                <h3 class="text-base font-bold text-gray-300 mb-4 flex items-center">
                    <span class="w-2.5 h-2.5 rounded-full bg-amber-500 mr-2 animate-ping"></span>
                    รายการอาหารที่กำลังต้องทำในห้องครัว
                </h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4" id="pending-orders-box"></div>
            </div>

            <div class="lg:col-span-5 border-t lg:border-t-0 lg:border-l border-gray-800 pt-6 lg:pt-0 lg:pl-6">
                <h3 class="text-base font-bold text-gray-400 mb-4 flex items-center">
                    <i class="fas fa-history mr-2"></i> ประวัติรายการจัดเสิร์ฟเสร็จแล้ว
                </h3>
                <div class="space-y-3 opacity-60 hover:opacity-100 transition duration-300 max-h-[70vh] overflow-y-auto pr-1" id="served-orders-box"></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
        let localKnownOrdersCount = -1;
        let cachedOrdersArray = [];

        function playAlertSound() {
            try {
                let context = new (window.AudioContext || window.webkitAudioContext)();
                let osc = context.createOscillator();
                let gain = context.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, context.currentTime); // โน้ต D5
                osc.frequency.setValueAtTime(880.00, context.currentTime + 0.15); // โน้ต A5
                gain.gain.setValueAtTime(0.4, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.4);
            } catch (e) { console.log("Audio play blocked", e); }
        }

        async function fetchLiveOrders() {
            const statusBox = document.getElementById("connection-status");
            const statusText = document.getElementById("status-text");
            
            try {
                statusBox.className = "bg-amber-500/10 text-amber-400 text-xs px-3 py-1.5 rounded-xl border border-amber-500/30 font-bold flex items-center space-x-1.5";
                statusText.innerText = "กำลังอัปเดต...";

                let res = await fetch(`${API_URL}?action=getAdminData`);
                let result = await res.json();

                if (result.success) {
                    cachedOrdersArray = result.orders || [];
                    
                    statusBox.className = "bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1.5 rounded-xl border border-emerald-500/30 font-bold flex items-center space-x-1.5";
                    statusText.innerText = "สัญญาณปกติ";

                    let totalPending = cachedOrdersArray.filter(o => o.status === "รอดำเนินการ").length;
                    
                    if (localKnownOrdersCount !== -1 && totalPending > localKnownOrdersCount) {
                        playAlertSound();
                    }
                    localKnownOrdersCount = totalPending;

                    renderDashboardView();
                }
            } catch (error) {
                console.error(error);
                statusBox.className = "bg-red-500/10 text-red-400 text-xs px-3 py-1.5 rounded-xl border border-red-500/30 font-bold flex items-center space-x-1.5";
                statusText.innerText = "เครือข่ายหลุด";
            }
        }

        function renderDashboardView() {
            const pendingBox = document.getElementById("pending-orders-box");
            const servedBox = document.getElementById("served-orders-box");

            let pendingHtml = "";
            let servedHtml = "";
            let pendingCounter = 0;
            let servedCounter = 0;

            // วนลูปการแสดงผลออเดอร์ย้อนกลับจากใหม่ไปเก่า
            for (let i = cachedOrdersArray.length - 1; i >= 0; i--) {
                let item = cachedOrdersArray[i];
                let orderId = item.order_id;
                let room = item.room_no || item.room_number || "-";
                let guestName = item.customer_name || item.guest_name || "ไม่ระบุชื่อ";
                let itemsText = item.items || "";
                let fullNote = item.note || "-";
                let rawTime = item.Timestamp || "";
                
                let timeStr = "";
                if(rawTime) {
                    let d = new Date(rawTime);
                    timeStr = !isNaN(d.getTime()) ? d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'}) : String(rawTime).substring(11,16);
                }

                if (item.status === "รอดำเนินการ") {
                    pendingCounter++;
                    pendingHtml += `
                        <div class="bg-gray-900 border-2 border-amber-500/40 rounded-2xl p-4 flex flex-col justify-between shadow-lg relative overflow-hidden">
                            <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-amber-500 to-orange-500"></div>
                            <div class="flex justify-between items-start mb-2 mt-1">
                                <div>
                                    <span class="text-2xl font-black text-white bg-gray-950 px-2.5 py-0.5 rounded-xl border border-gray-800">ROOM ${room}</span>
                                    <h4 class="text-base font-bold text-gray-100 mt-1">${guestName}</h4>
                                </div>
                                <div class="text-right">
                                    <span class="text-xs text-gray-500 font-medium block">#ID-${orderId}</span>
                                    <span class="text-[10px] text-gray-400 block mt-0.5">${timeStr}</span>
                                </div>
                            </div>
                            <div class="flex-1 bg-gray-950/40 border border-gray-800/40 rounded-xl px-3 py-2.5 my-2 font-bold text-amber-400 text-sm whitespace-pre-wrap">
                                ${itemsText}
                            </div>
                            <div class="bg-gray-950/20 rounded-xl p-2.5 my-2 border border-gray-800/30 text-xs text-gray-400">
                                <span class="font-bold text-gray-300 block mb-0.5">บันทึกข้อความ:</span>
                                ${fullNote}
                            </div>
                            <button onclick="triggerPrintById('${orderId}')" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 text-xs font-bold py-1.5 rounded-lg mb-2 transition flex justify-center items-center space-x-1">
                                <i class="fas fa-print"></i> <span>พิมพ์ใบสั่งคัดลอก...</span>
                            </button>
                            <button onclick="updateStatus(${orderId}, 'เสิร์ฟเรียบร้อย')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-gray-950 text-sm font-black py-2.5 rounded-xl transition cursor-pointer flex justify-center items-center space-x-1 shadow-md">
                                <i class="fas fa-check-circle text-base"></i> <span>ประกอบอาหารเสร็จสิ้น & จัดเสิร์ฟ</span>
                            </button>
                        </div>
                    `;
                } else {
                    servedCounter++;
                    servedHtml += `
                        <div class="bg-gray-900/60 border border-gray-800 rounded-xl p-3 flex justify-between items-center text-xs">
                            <div class="flex-1 min-w-0 mr-2">
                                <div class="flex items-center space-x-2">
                                    <span class="font-black text-gray-300 bg-gray-950 px-1.5 py-0.5 rounded border border-gray-800">ห้อง ${room}</span>
                                    <span class="text-gray-400 font-bold truncate">${guestName}</span>
                                </div>
                                <p class="text-[11px] text-gray-500 mt-1 truncate max-w-xs font-semibold text-emerald-500/80">${itemsText.replace(/\n/g, ', ')}</p>
                            </div>
                            <div class="text-right flex items-center space-x-3">
                                <span class="text-[10px] text-gray-600 block cyber-font">ID-${orderId}</span>
                                <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded font-bold text-[10px]">SERVED</span>
                            </div>
                        </div>
                    `;
                }
            }

            document.getElementById("count-pending").innerText = pendingCounter;
            document.getElementById("count-served").innerText = servedCounter;
            
            pendingBox.innerHTML = pendingCounter === 0 ? `<div class="col-span-full bg-gray-900/20 border border-dashed border-gray-800 rounded-2xl py-12 text-center text-xs text-gray-500 font-medium">💤 ขณะนี้ไม่มีออเดอร์ค้างในระบบครัวคราบน้า</div>` : pendingHtml;
            servedBox.innerHTML = servedCounter === 0 ? `<div class="text-center py-6 text-xs text-gray-600">ไม่มีข้อมูลการเสิร์ฟของวันนี้</div>` : servedHtml;
        }

        async function updateStatus(orderId, nextStatus) {
            try {
                let res = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "updateOrderStatus",
                        order_id: orderId,
                        status: nextStatus
                    })
                });
                let result = await res.json();
                if (result.success) {
                    await fetchLiveOrders();
                }
            } catch (err) { alert("เปลี่ยนสถานะไม่สำเร็จทางเทคนิคครับ"); }
        }

        function triggerPrintById(orderId) {
            let order = cachedOrdersArray.find(o => String(o.order_id) === String(orderId));
            if (!order) return;
            
            let printWindow = window.open('', '_blank', 'width=350,height=500');
            printWindow.document.write(`
                <html>
                <head>
                    <style>
                        body { font-family: 'Courier New', monospace; font-size: 13px; color:#000; padding:10px; width:280px; }
                        .center { text-align: center; font-weight: bold; }
                        .line { border-bottom: 1px dashed #000; my: 8px; margin-bottom:8px; margin-top:8px;}
                        .bold { font-weight: bold; font-size:16px; }
                        .items { white-space: pre-wrap; font-weight:bold; font-size:14px; }
                    </style>
                </head>
                <body>
                    <div class="center bold">ROOM SERVICE ORDER</div>
                    <div class="center">Order ID: #ID-${order.order_id}</div>
                    <div class="line"></div>
                    <div><b>Room No:</b> ${order.room_no || order.room_number || '-'}</div>
                    <div><b>Name:</b> ${order.customer_name || order.guest_name || '-'}</div>
                    <div><b>Time:</b> ${new Date(order.Timestamp).toLocaleString('th-TH')}</div>
                    <div class="line"></div>
                    <div class="items">${order.items}</div>
                    <div class="line"></div>
                    <div><b>Note:</b> ${order.note || '-'}</div>
                    <div class="line"></div>
                    <div class="center font-size:10px;">-- สำเนาสำหรับห้องครัว --</div>
                    <script>window.print(); window.close();<\/script>
                </body>
                </html>
            `);
            printWindow.document.close();
        }

        // โหลดข้อมูลอัตโนมัติทุกๆ 10 วินาที
        fetchLiveOrders();
        setInterval(fetchLiveOrders, 10000);
    </script>
</body>
</html>
