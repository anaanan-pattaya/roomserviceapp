<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จอภาพรับออเดอร์ห้องพัก (Live Orders)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #0b1329; color: #f8fafc; }
    .order-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid #334155; }
    .new-pulse { animation: pulseBg 2s infinite; }
    @keyframes pulseBg {
      0%, 100% { border-color: #f59e0b; box-shadow: 0 0 5px rgba(245,158,11,0.2); }
      50% { border-color: #ef4444; box-shadow: 0 0 15px rgba(239,68,68,0.5); }
    }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-slate-700 pb-6 mb-8">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold text-emerald-400 flex items-center gap-3">
        <i class="fa-solid fa-bell-concierge"></i> จอภาพรับออเดอร์ห้องพัก (Live Orders)
      </h1>
      <p class="text-sm text-slate-400 mt-1">อัปเดตอัตโนมัติเรียลไทม์ • ระบบห้องครัวและเสิร์ฟ</p>
    </div>
    
    <div class="flex items-center gap-3 w-full md:w-auto justify-end">
      <div id="connection-status" class="px-4 py-2 rounded-full text-xs font-semibold flex items-center gap-2 bg-amber-500/10 text-amber-400 border border-amber-500/20">
        <i class="fa-solid fa-spinner class-spin animate-spin"></i> <span id="status-text">กำลังตรวจสอบสัญญาณ...</span>
      </div>
      <button onclick="fetchLiveOrders()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 border border-slate-600">
        <i class="fa-solid fa-rotate"></i> รีเฟรชทันที
      </button>
    </div>
  </div>

  <div class="max-w-7xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 gap-4 mb-8">
    <div class="p-6 rounded-xl border border-slate-700 bg-slate-900/50">
      <p class="text-sm text-slate-400 font-medium">ออเดอร์ใหม่รอดำเนินการ</p>
      <p id="count-new" class="text-4xl md:text-5xl font-bold text-amber-500 mt-2">0</p>
    </div>
    <div class="p-6 rounded-xl border border-slate-700 bg-slate-900/50">
      <p class="text-sm text-slate-400 font-medium">เสิร์ฟสำเร็จแล้ววันนี้</p>
      <p id="count-served" class="text-4xl md:text-5xl font-bold text-emerald-500 mt-2">0</p>
    </div>
  </div>

  <div class="max-w-7xl mx-auto">
    <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div id="initial-loading" class="col-span-full flex flex-col items-center justify-center py-20 gap-4">
        <div class="w-12 h-12 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-slate-400 text-base">กำลังเชื่อมต่อคลาวด์ ดึงรายการออเดอร์ล่าสุด...</p>
      </div>
    </div>
  </div>

  <script>
    // 🔴 ให้น้านำลิงก์ Web App URL ตัวล่าสุดจากหน้า Apps Script มาวางใส่ในช่องนี้แทนนะครับน้า
    const API_URL = "https://script.google.com/macros/s/AKfycbzoKV1eetXPFpa4ZP3RJ5ZSDWA4HDTNlWl0YzP7jlpVj1AgZevylhViV3mnkXfom3ST/exec";

    // ฟังก์ชันดึงออเดอร์หลักจากระะบบหลังบ้าน
    async function fetchLiveOrders() {
      const statusContainer = document.getElementById("connection-status");
      const statusText = document.getElementById("status-text");
      const container = document.getElementById("orders-container");
      const loadingSpinner = document.getElementById("initial-loading");

      try {
        const response = await fetch(`${API_URL}?action=getOrders`);
        const result = await response.json();

        if (result.success) {
          // สลัดตัดป้ายสถานะล็อกเออร์เรอร์ออก เปลี่ยนเป็นออนไลน์ใช้งานได้
          statusContainer.className = "px-4 py-2 rounded-full text-xs font-semibold flex items-center gap-2 bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
          statusText.innerText = "เชื่อมต่อเสถียร";
          
          if (loadingSpinner) loadingSpinner.remove();
          renderOrderCards(result.orders);
        } else {
          throw new Error(result.message || "Server return success false");
        }
      } catch (error) {
        console.error("Fetch Error:", error);
        statusContainer.className = "px-4 py-2 rounded-full text-xs font-semibold flex items-center gap-2 bg-rose-500/10 text-rose-400 border border-rose-500/20";
        statusText.innerText = "เชื่อมต่อล้มเหลว";
        container.innerHTML = `<div class="col-span-full text-center py-12 text-rose-400 bg-rose-500/5 rounded-xl border border-rose-500/10">
          <i class="fa-solid fa-triangle-exclamation text-2xl mb-2"></i>
          <p>ไม่สามารถโหลดข้อมูลออเดอร์ได้ชั่วคราว: ${error.message}</p>
        </div>`;
      }
    }

    // ฟังก์ชันเรนเดอร์การ์ดรายการคำสั่งซื้อลงหน้าจอห้องครัว
    function renderOrderCards(orders) {
      const container = document.getElementById("orders-container");
      container.innerHTML = "";

      let countNew = 0;
      let countServed = 0;

      if (!orders || orders.length === 0) {
        container.innerHTML = `<div class="col-span-full text-center py-20 text-slate-500">
          <i class="fa-solid fa-inbox text-4xl mb-3 block"></i>
          <p class="text-base">ยังไม่มีรายการออเดอร์สั่งเข้ามาในระบบวันนี้</p>
        </div>`;
        document.getElementById("count-new").innerText = "0";
        document.getElementById("count-served").innerText = "0";
        return;
      }

      orders.forEach(order => {
        const isNew = order.status.toLowerCase() === "new";
        if (isNew) countNew++;
        if (order.status.toLowerCase() === "served") countServed++;

        const card = document.createElement("div");
        card.className = `order-card p-6 rounded-2xl flex flex-col justify-between transition duration-300 transform hover:-translate-y-1 hover:shadow-xl ${isNew ? 'new-pulse' : ''}`;

        // จัดฟอร์แมตจัดวางรูปแบบรายการอาหารด้านในการ์ด
        let itemsHtml = "";
        if (order.itemsSummary) {
          const items = order.itemsSummary.split(",");
          itemsHtml = items.map(item => `
            <div class="flex justify-between items-start py-1.5 border-b border-slate-800/60 last:border-0 text-sm">
              <span class="text-slate-200 font-medium">${item.trim()}</span>
            </div>
          `).join("");
        }

        card.innerHTML = `
          <div>
            <div class="flex justify-between items-start gap-2 mb-4">
              <div>
                <span class="text-xs font-bold uppercase tracking-wider px-2.5 py-1 rounded-md ${isNew ? 'bg-amber-500/10 text-amber-400 border border-amber-500/20' : 'bg-slate-800 text-slate-400'}">
                  ${isNew ? 'ออเดอร์ใหม่' : 'เสิร์ฟเสร็จแล้ว'}
                </span>
                <h3 class="text-xl font-bold text-white mt-2 flex items-center gap-1.5">
                  <i class="fa-solid fa-door-open text-slate-400 text-base"></i> ห้อง ${order.room}
                </h3>
              </div>
              <p class="text-xs text-slate-400 font-mono text-right">${order.timestamp}</p>
            </div>
            
            <p class="text-xs text-slate-400 mb-4 flex items-center gap-1.5">
              <i class="fa-solid fa-user text-slate-500"></i> คุณ: ${order.name || 'ไม่ระบุชื่อ'}
            </p>
            
            <div class="bg-slate-900/60 rounded-xl p-4 mb-4 border border-slate-800/50">
              <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 border-b border-slate-800 pb-1">รายการที่สั่ง</p>
              ${itemsHtml || '<p class="text-xs text-slate-500">ไม่มีข้อมูลรายการ</p>'}
            </div>
          </div>

          <div class="mt-4 pt-4 border-t border-slate-800/80 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
            <div>
              <p class="text-xs text-slate-400">ราคารวมสุทธิ</p>
              <p class="text-lg font-bold text-emerald-400">฿${Number(order.totalPrice).toLocaleString()}</p>
            </div>
            ${isNew ? `
              <button onclick="updateStatus(${order.rowId}, 'served', this)" class="w-full sm:w-auto bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-medium px-5 py-2.5 rounded-xl text-sm transition shadow-lg shadow-emerald-950/20 flex items-center justify-center gap-2">
                <i class="fa-solid fa-check"></i> กดเพื่อเสิร์ฟ
              </button>
            ` : `
              <span class="text-xs font-medium text-slate-500 flex items-center gap-1.5 py-2">
                <i class="fa-solid fa-circle-check text-slate-600"></i> จัดส่งเรียบร้อย
              </span>
            `}
          </div>
        `;

        container.appendChild(card);
      });

      document.getElementById("count-new").innerText = countNew;
      document.getElementById("count-served").innerText = countServed;
    }

    // ฟังก์ชันส่งคำสั่งยิงไปอัปเดตสถานะที่แผ่นชีตเวลากดเสิร์ฟอาหารครับน้า
    async function updateStatus(rowId, status, button) {
      if (!confirm("ยืนยันการจัดเสิร์ฟออเดอร์นี้ใช่ไหมครับน้า?")) return;
      
      const originalText = button.innerHTML;
      button.disabled = true;
      button.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> บันทึก...`;

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          mode: "no-cors", // ใช้ no-cors ให้ตรงกับโครงสร้าง Apps Script พื้นฐาน
          headers: { "Content-Type": "application/plain" },
          body: JSON.stringify({ action: "updateOrderStatus", rowId: rowId, status: status })
        });

        // ในโหมด no-cors ระบบจะไม่ส่งค่า response body กลับมาอ่าน แต่ส่งคำสั่งเข้าชีตสำเร็จชัวร์ครับน้า
        // เราทำการอัปเดต UI หน้าจอหลอกตารับออเดอร์ทันทีเพื่อให้ครัวลื่นไหลไม่ต้องรอโหลด
        alert("อัปเดตสถานะออเดอร์เรียบร้อยครับน้า!");
        fetchLiveOrders();
      } catch (error) {
        console.error("Update Status Error:", error);
        alert("เกิดข้อผิดพลาดในการเชื่อมต่อระบบหลังบ้านครับน้า");
        button.disabled = false;
        button.innerHTML = originalText;
      }
    }

    // ตั้งค่าเริ่มต้นทำการเรียกโหลดข้อมูลออเดอร์ครั้งแรกเมื่อเปิดหน้ากระดานรับออเดอร์
    window.addEventListener("DOMContentLoaded", () => {
      fetchLiveOrders();
      // ระบบ Auto Loop Refresh ดึงข้อมูลออเดอร์ใหม่จากคลาวด์ทุกๆ 20 วินาทีอัตโนมัติครับน้า
      setInterval(fetchLiveOrders, 20000);
    });
  </script>
</body>
</html>
