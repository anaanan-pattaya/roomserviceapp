<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Orders - จอภาพรับออเดอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS ดักสำหรับการพิมพ์ใบสั่งครัวโดยตรง ไม่ต้องเปิดหน้าต่างใหม่ */
        @media print {
            header, main, button, .no-print {
                display: none !important;
            }
            #kitchen-print-box {
                display: block !important;
                visibility: visible !important;
                position: absolute !important;
                left: 0 !important;
                top: 0 !important;
                width: 100% !important;
                max-width: 76mm !important;
                margin: 0 !important;
                padding: 5px !important;
                background: #ffffff !important;
                color: #000000 !important;
            }
            #kitchen-print-box * {
                color: #000000 !important;
                font-family: 'Tahoma', sans-serif !important;
            }
            .items-area {
                white-space: pre-wrap !important;
                font-size: 14px !important;
                font-weight: bold !important;
            }
            @page { margin: 0 !important; size: auto; }
        }
        #kitchen-print-box { display: none; }
    </style>
</head>
<body class="bg-[#0b1329] text-gray-100 font-sans antialiased min-h-screen">

    <!-- กล่องข้อมูลซ่อนสำหรับเตรียมส่งพิมพ์ -->
    <div id="kitchen-print-box"></div>

    <header class="max-w-7xl mx-auto px-4 pt-6 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 gap-4">
        <div>
            <h1 class="text-2xl font-black text-emerald-400 flex items-center tracking-wide">
                <i class="fas fa-bell text-xl mr-2.5 animate-bounce"></i> จอภาพรับออเดอร์ห้องพัก (Live Orders)
            </h1>
            <p class="text-xs text-gray-400 mt-0.5">อัปเดตอัตโนมัติเรียลไทม์ • ระบบพิมพ์ออเดอร์เข้าครัวอัตโนมัติ (EPSON Kiosk Mode)</p>
        </div>
        <div class="flex items-center space-x-2 w-full md:w-auto justify-end">
            <button onclick="clearPrintHistory()" class="bg-red-900/40 hover:bg-red-800 text-red-300 border border-red-800/60 text-xs px-3 py-1.5 rounded-xl transition font-bold flex items-center space-x-1 cursor-pointer mr-2">
                <i class="fas fa-history"></i> <span>ล้างประวัติคิวพิมพ์ซ้ำ</span>
            </button>
            <div id="connection-status" class="bg-amber-500/10 text-amber-400 text-xs px-3 py-1.5 rounded-xl border border-amber-500/30 font-bold flex items-center space-x-1.5">
                <i class="fas fa-circle-notch fa-spin"></i> <span id="status-text">กำลังตรวจสอบสัญญาณ...</span>
            </div>
            <button onclick="fetchLiveOrders()" class="bg-gray-800 hover:bg-gray-700 text-xs text-gray-200 px-3 py-1.5 rounded-xl border border-gray-700 transition font-bold flex items-center space-x-1">
                <i class="fas fa-sync-alt"></i> <span>รีเฟรชทันที</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-900/50 border border-gray-800 p-5 rounded-2xl flex flex-col justify-between">
                <span class="text-xs font-bold text-gray-400 tracking-wide uppercase">ออเดอร์ใหม่รอดำเนินการ</span>
                <span id="count-pending" class="text-5xl font-black text-amber-500 mt-2">0</span>
            </div>
            <div class="bg-gray-900/50 border border-gray-800 p-5 rounded-2xl flex flex-col justify-between">
                <span class="text-xs font-bold text-gray-400 tracking-wide uppercase">เสิร์ฟสำเร็จแล้ววันนี้</span>
                <span id="count-completed" class="text-5xl font-black text-emerald-500 mt-2">0</span>
            </div>
        </div>

        <div id="initial-loading" class="text-center py-16">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent mb-4"></div>
            <p class="text-slate-400 text-base">กำลังเชื่อมต่อคลาวด์ ดึงรายการออเดอร์ล่าสุด...</p>
        </div>

        <div id="orders-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
        
        let currentOrdersData = [];
        let printedOrders = JSON.parse(localStorage.getItem('printed_orders')) || [];
        let isPrintingNow = false;
        let isFirstLoad = true; // ตัวแปรสำหรับดักการเปิดเบราว์เซอร์ครั้งแรก

        document.addEventListener('DOMContentLoaded', () => {
            fetchLiveOrders();
            setInterval(fetchLiveOrders, 7000);
        });

        async function fetchLiveOrders() {
            const statusContainer = document.getElementById("connection-status");
            const statusText = document.getElementById("status-text");
            const container = document.getElementById("orders-container");
            const loadingSpinner = document.getElementById("initial-loading");

            try {
                const response = await fetch(`${API_URL}?action=getAdminData&_nocache=` + new Date().getTime());
                if (!response.ok) throw new Error("Network Response Error");
                
                const data = await response.json();
                currentOrdersData = data.orders || [];
                
                if (statusContainer) statusContainer.className = "bg-emerald-500/10 text-emerald-400 text-xs px-3 py-1.5 rounded-xl border border-emerald-500/30 font-bold flex items-center space-x-1.5";
                if (statusText) statusText.innerText = "เชื่อมต่อเสถียร";
                if (loadingSpinner) loadingSpinner.classList.add("hidden");
                
                if (container) {
                    container.classList.remove("hidden");
                    renderOrders(currentOrdersData);
                    checkAndAutoPrint(currentOrdersData);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                if (statusContainer) statusContainer.className = "bg-red-500/10 text-red-400 text-xs px-3 py-1.5 rounded-xl border border-red-500/30 font-bold flex items-center space-x-1.5";
                if (statusText) statusText.innerText = "เชื่อมต่อล้มเหลว";
            }
        }

        function checkAndAutoPrint(ordersList) {
            const orderIdKey = (ordersList.length > 0 && ordersList[0].Order_Id) ? 'Order_Id' : 'order_id';
            const statusKey = (ordersList.length > 0 && ordersList[0].Status) ? 'Status' : 'status';

            // 1. ดักรอบแรกสุดที่เปิดเบราว์เซอร์: สั่งล็อกใบเก่าทั้งหมดให้อยู่ในประวัติพิมพ์แล้วทันที (ไม่ให้ปริ้นออกเครื่อง)
            if (isFirstLoad) {
                ordersList.forEach(order => {
                    const orderId = String(order[orderIdKey] || '').trim();
                    if (orderId && orderId !== '-' && !printedOrders.includes(orderId)) {
                        printedOrders.push(orderId);
                    }
                });
                localStorage.setItem('printed_orders', JSON.stringify(printedOrders));
                isFirstLoad = false; // ปิดโหมดโหลดครั้งแรก
                console.log("🔒 ระบบทำการบล็อกออเดอร์เก่าที่มีอยู่แล้ว ไม่ให้ปริ้นซ้ำตอนเปิดบราวเซอร์ใหม่");
                return; // จบการทำงานรอบแรกทันทีโดยไม่พิมพ์อะไร
            }

            // 2. รอบการทำงานปกติหลังจากนั้น: ตรวจจับและพิมพ์เฉพาะออเดอร์ใหม่เอี่ยมที่เข้ามาจริงๆ เท่านั้น
            const pendingQueue = ordersList.filter(order => {
                const orderId = String(order[orderIdKey] || '').trim();
                const status = String(order[statusKey] || '').trim();
                return status === "รอดำเนินการ" && orderId && orderId !== '-' && !printedOrders.includes(orderId);
            });

            if (pendingQueue.length === 0) return;
            
            // เรียงลำดับคิวงานก่อนส่งพิมพ์จากเก่าไปใหม่
            pendingQueue.sort((a, b) => parseInt(a[orderIdKey] || 0) - parseInt(b[orderIdKey] || 0));
            processPrintQueue(pendingQueue);
        }

        async function processPrintQueue(queue) {
            if (isPrintingNow) return;
            isPrintingNow = true;

            for (const order of queue) {
                const orderIdKey = order.Order_Id ? 'Order_Id' : 'order_id';
                const orderId = String(order[orderIdKey] || '').trim();
                
                if (!printedOrders.includes(orderId)) {
                    printedOrders.push(orderId);
                    localStorage.setItem('printed_orders', JSON.stringify(printedOrders));
                }
                triggerPrintById(orderId);
                await new Promise(resolve => setTimeout(resolve, 2500)); // หน่วงเวลาให้หัวพิมพ์ EPSON ทำงานเสร็จในแต่ละบิล
            }
            isPrintingNow = false;
        }

        function triggerPrintById(targetId) {
            const order = currentOrdersData.find(o => String(o.order_id || o.Order_Id || '').trim() === String(targetId).trim());
            if (!order) return;

            const orderId = order.order_id || order.Order_Id || '-';
            const roomNo = order.room_number || order.room_no || order.Room_Number || '-';
            const guestName = order.guest_name || order.customer_name || order.Guest_Name || 'ไม่ระบุชื่อ';
            const timeStr = order.timestamp || order.Timestamp || '';
            const fullNote = order.note || order.Note || '-';
            const itemsText = order.orderitems || order.items || '-';

            const printBox = document.getElementById("kitchen-print-box");
            if (!printBox) return;

            printBox.innerHTML = `
                <div style="text-align: center; font-weight: bold; font-size: 16px;">ROOM SERVICE</div>
                <div style="text-align: center; font-size: 12px;">ใบสั่งอาหารเข้าห้องครัว</div>
                <div style="font-size: 24px; font-weight: bold; border: 3px solid #000; text-align: center; padding: 5px 0; margin: 6px 0;">ROOM: ${roomNo}</div>
                <div style="font-size: 13px;"><b>ออเดอร์:</b> ORD-${orderId}</div>
                <div style="font-size: 13px;"><b>ชื่อแขก:</b> ${guestName}</div>
                <div style="font-size: 13px;"><b>เวลาสั่ง:</b> ${timeStr}</div>
                <div style="border-bottom: 2px dashed #000; margin: 6px 0;"></div>
                <div style="text-align: center; font-weight: bold;">[ รายการสั่งซื้อ ]</div>
                <div style="border-bottom: 2px dashed #000; margin: 6px 0;"></div>
                <div class="items-area">${itemsText}</div>
                <div style="border-bottom: 2px dashed #000; margin: 6px 0;"></div>
                <div style="font-size: 13px;"><b>หมายเหตุ:</b></div>
                <div style="font-size: 12px; border: 1px solid #000; padding: 4px; font-weight: bold;">${fullNote}</div>
                <div style="border-bottom: 2px dashed #000; margin: 8px 0;"></div>
                <br><br><br><br>
            `;

            window.print();
            setTimeout(() => { printBox.innerHTML = ""; }, 300);
        }

        function renderOrders(ordersList) {
            const container = document.getElementById("orders-container");
            const pendingCountEl = document.getElementById('count-pending');
            const completedCountEl = document.getElementById('count-completed');

            const pendingOrders = ordersList.filter(o => String(o.status || o.Status || '').trim() === 'รอดำเนินการ');
            const completedOrders = ordersList.filter(o => String(o.status || o.Status || '').trim() === 'เสิร์ฟเรียบร้อย');

            if (pendingCountEl) pendingCountEl.innerText = pendingOrders.length;
            if (completedCountEl) completedCountEl.innerText = completedOrders.length;

            if (pendingOrders.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 text-gray-500 bg-gray-900/20 rounded-2xl border border-gray-800 border-dashed">
                        <i class="fas fa-inbox text-3xl mb-2 text-gray-600"></i>
                        <p class="text-sm">ยังไม่มีรายการออเดอร์ใหม่รอดำเนินการครับน้า</p>
                    </div>`;
                return;
            }

            pendingOrders.sort((a, b) => parseInt(b.order_id || 0) - parseInt(a.order_id || 0));

            container.innerHTML = pendingOrders.map(order => {
                const orderId = order.order_id || order.Order_Id || '-';
                const roomNo = order.room_number || order.room_no || order.Room_Number || '-';
                const guestName = order.guest_name || order.customer_name || order.Guest_Name || 'ไม่ระบุชื่อ';
                const timeStr = order.timestamp || order.Timestamp || '';
                const fullNote = order.note || order.Note || '-';
                const itemsText = order.orderitems || order.items || '-';

                return `
                    <div class="bg-gray-900/60 border border-gray-800 rounded-2xl p-5 flex flex-col shadow-lg">
                        <div class="flex justify-between items-start border-b border-gray-800 pb-3 mb-3">
                            <div>
                                <span class="bg-amber-500/10 text-amber-400 text-[11px] font-black px-2 py-0.5 rounded-md">ROOM ${roomNo}</span>
                                <h4 class="text-base font-bold text-gray-100 mt-1">${guestName}</h4>
                            </div>
                            <div class="text-right">
                                <span class="text-xs text-gray-500 font-medium block">#ID-${orderId}</span>
                                <span class="text-[10px] text-gray-400 block mt-0.5">${timeStr}</span>
                            </div>
                        </div>
                        <div class="flex-1 bg-gray-950/40 border border-gray-800/40 rounded-xl px-3 py-2.5 my-2 font-bold text-amber-400 text-sm whitespace-pre-wrap">
                            ${itemsText}
                        </div>
                        <div class="bg-gray-950/20 rounded-xl p-2.5 my-2 border border-gray-800/30 text-xs text-gray-400">
                            <span class="font-bold text-gray-300 block mb-0.5">บันทึกข้อความ:</span>
                            ${fullNote}
                        </div>
                        <button onclick="triggerPrintById('${orderId}')" class="w-full bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700 text-xs font-bold py-2 rounded-xl transition flex justify-center items-center space-x-1 cursor-pointer">
                            <i class="fas fa-print"></i> <span>พิมพ์ใบสั่งครัวซ้ำ</span>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function clearPrintHistory() {
            if(confirm("ต้องการล้างประวัติคิวพิมพ์ในเครื่อง เพื่อสั่งพิมพ์ออเดอร์เก่าที่ค้างอยู่ในชีตออกเครื่องพิมพ์ใหม่อีกครั้งใช่ไหมครับน้า?")) {
                localStorage.removeItem('printed_orders');
                printedOrders = [];
                alert("ล้างระบบคิวแล้ว! ระบบจะเริ่มเช็กและพิมพ์ใหม่อัตโนมัติทันทีครับ");
                fetchLiveOrders();
            }
        }
    </script>
</body>
</html>
