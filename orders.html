<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Orders - จอภาพรับออเดอร์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Kanit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .cyber-font { font-family: 'Chakra Petch', sans-serif; }
    </style>
</head>
<body class="bg-[#0b1329] text-gray-100 font-sans antialiased min-h-screen">

    <header class="max-w-7xl mx-auto px-4 pt-6 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center border-b border-gray-800 gap-4">
        <div>
            <h1 class="text-2xl font-black text-emerald-400 flex items-center tracking-wide">
                <i class="fas fa-bell text-xl mr-2.5 animate-bounce"></i> จอภาพรับออเดอร์ห้องพัก (Live Orders)
            </h1>
            <p class="text-xs text-gray-400 mt-0.5">อัปเดตอัตโนมัติเรียลไทม์ • ระบบพิมพ์ออเดอร์ในครัวอัตโนมัติ</p>
        </div>
        <div class="flex items-center space-x-2 w-full md:w-auto">
            <button onclick="fetchOrders()" class="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-gray-200 px-4 py-2 rounded-xl text-xs font-bold transition flex items-center space-x-2 cursor-pointer w-full md:w-auto justify-center">
                <i class="fas fa-sync-alt" id="refresh-icon"></i>
                <span>รีเฟรชออเดอร์ด่วน</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-900/60 border border-gray-800/80 p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ออเดอร์รอทำ</p>
                <p class="text-2xl font-black text-amber-500 mt-1" id="stat-pending">0</p>
            </div>
            <div class="bg-gray-900/60 border border-gray-800/80 p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">เสร็จเรียบร้อย</p>
                <p class="text-2xl font-black text-emerald-500 mt-1" id="stat-completed">0</p>
            </div>
            <div class="bg-gray-900/60 border border-gray-800/80 p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ยกเลิกแล้ว</p>
                <p class="text-2xl font-black text-rose-500 mt-1" id="stat-cancelled">0</p>
            </div>
            <div class="bg-gray-900/60 border border-gray-800/80 p-4 rounded-2xl">
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">ออเดอร์ทั้งหมดวันนี้</p>
                <p class="text-2xl font-black text-blue-400 mt-1" id="stat-all">0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="orders-container">
            <div class="col-span-full py-20 text-center text-gray-500">
                <i class="fas fa-spinner animate-spin text-4xl text-emerald-500 mb-4 block"></i>
                <p class="text-sm font-bold">กำลังเชื่อมต่อฐานข้อมูล Google Sheets และดึงออเดอร์ปัจจุบัน...</p>
            </div>
        </div>
    </main>

    <div id="print-area" class="hidden"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwCplcIewNvsRnEgUh288gJ5jG7n1zLK-ma55KDSExsl4-z6lJCLJlrCFmTO9p2zNU/exec";
        let autoRefreshInterval = null;

        async function fetchOrders() {
            const refreshIcon = document.getElementById("refresh-icon");
            if (refreshIcon) refreshIcon.classList.add("animate-spin");

            try {
                const response = await fetch(`${API_URL}?action=getAdminData`);
                const result = await response.json();
                
                if (result.success && result.orders) {
                    renderOrdersBoard(result.orders);
                } else {
                    renderEmptyBoard("ไม่พบข้อมูลรายการออเดอร์ในแท็บ Sheets 'Orders'");
                }
            } catch (error) {
                console.error("Fetch Orders Error:", error);
                renderEmptyBoard("ระบบเชื่อมต่ออินเทอร์เน็ตหรือดึง API ติดขัด กรุณาลองใหม่อีกครั้ง");
                alert("เกิดข้อผิดพลาดในการโหลดกระดานรับออเดอร์ครับน้า");
            } finally {
                if (refreshIcon) refreshIcon.classList.remove("animate-spin");
            }
        }

        function renderOrdersBoard(orders) {
            const container = document.getElementById("orders-container");
            
            // สถิติตัวเลขสถานะต่าง ๆ
            let pending = 0;
            let completed = 0;
            let cancelled = 0;

            if (!orders || orders.length === 0) {
                renderEmptyBoard("ไม่มีข้อมูลออเดอร์ในขณะนี้");
                updateStats(0, 0, 0, 0);
                return;
            }

            // เรียงออเดอร์จากล่าสุด (ID มากที่สุด) ขึ้นมาแสดงก่อน
            const sortedOrders = [...orders].reverse();

            container.innerHTML = sortedOrders.map(order => {
                // คีย์ของคอลัมน์ใน Google Sheets (อิงตาม doGet ใน Apps Script)
                const timestamp = order.Timestamp || order.timestamp || "-";
                const roomNo = order.room_no || order.room_number || order["Room No."] || order["Room Number"] || "-";
                const guestName = order.customer_name || order.customer || order["Customer Name"] || "ไม่ระบุชื่อ";
                const itemsText = order.items || order.orderitems || "-";
                const note = order.note || "-";
                const orderId = order.order_id || order.id || "-";
                const status = (order.status || "รอดำเนินการ").trim();

                // ตรวจสอบและนับสถิติสถานะ
                if (status === "รอดำเนินการ" || status === "Pending") pending++;
                else if (status === "ทำเสร็จแล้ว" || status === "Completed") completed++;
                else if (status === "ยกเลิก" || status === "Cancelled") cancelled++;

                // กำหนดคลาสสีต่าง ๆ ตามสถานะของแต่ละออเดอร์
                let statusBadgeColor = "bg-amber-500/15 text-amber-400 border-amber-500/30";
                let borderColor = "border-gray-800/80 hover:border-amber-500/30";
                
                if (status === "ทำเสร็จแล้ว" || status === "Completed") {
                    statusBadgeColor = "bg-emerald-500/15 text-emerald-400 border-emerald-500/30";
                    borderColor = "border-gray-800/80 hover:border-emerald-500/30Opacity opacity-60";
                } else if (status === "ยกเลิก" || status === "Cancelled") {
                    statusBadgeColor = "bg-rose-500/15 text-rose-400 border-rose-500/30";
                    borderColor = "border-gray-800/80 opacity-40";
                }

                // สลักเวลาแสดงผลสั้น ๆ
                let timeStr = "-";
                if (timestamp && timestamp !== "-") {
                    try {
                        const d = new Date(timestamp);
                        timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' }) + " น.";
                    } catch (e) {}
                }

                return `
                    <div class="bg-gray-900/50 border ${borderColor} rounded-3xl p-6 flex flex-col shadow-xl transition duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="text-[10px] font-black text-amber-500 tracking-wider uppercase cyber-font">ROOM NUMBER</span>
                                <h4 class="text-2xl font-black text-white leading-none mt-1">ห้อง ${roomNo}</h4>
                                <p class="text-xs text-gray-400 mt-1.5"><i class="far fa-user mr-1 text-gray-500"></i> ${guestName}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-bold text-gray-500 block cyber-font">ID: #${orderId}</span>
                                <span class="text-xs font-black text-emerald-400 block mt-1"><i class="far fa-clock mr-1 text-emerald-500"></i> ${timeStr}</span>
                            </div>
                        </div>

                        <div class="flex-1 bg-gray-950/60 border border-gray-800/40 rounded-2xl px-4 py-3.5 my-3 font-semibold text-amber-400 text-xs whitespace-pre-wrap leading-relaxed">
                            ${itemsText}
                        </div>

                        <div class="bg-gray-950/20 rounded-xl p-3 border border-gray-800/30 text-xs text-gray-400 mb-4">
                            <span class="font-bold text-gray-300 block mb-1">คำแนะนำเพิ่มเติม (Special Note):</span>
                            ${note !== "-" ? note : "<span class='text-gray-600'>ไม่มีบันทึกเพิ่มเติม</span>"}
                        </div>

                        <div class="border-t border-gray-800/60 pt-4 flex flex-col gap-2">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-[10px] font-bold text-gray-400 tracking-wider">สถานะใบงาน:</span>
                                <span class="text-[10px] font-bold px-2.5 py-0.5 rounded-full border ${statusBadgeColor}">${status}</span>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="updateOrderStatus(${orderId}, 'ทำเสร็จแล้ว')" class="bg-emerald-600 hover:bg-emerald-500 text-gray-950 font-black py-2 rounded-xl text-[11px] transition cursor-pointer">
                                    <i class="fas fa-check-circle mr-1"></i> ทำเสร็จแล้ว
                                </button>
                                <button onclick="updateOrderStatus(${orderId}, 'ยกเลิก')" class="bg-gray-800 hover:bg-rose-950/50 hover:text-rose-400 border border-gray-700/80 hover:border-rose-500/20 text-gray-300 font-bold py-2 rounded-xl text-[11px] transition cursor-pointer">
                                    <i class="fas fa-times-circle mr-1"></i> ปฏิเสธ/ยกเลิก
                                </button>
                            </div>
                            <button onclick="triggerPrint('${orderId}', '${roomNo}', '${guestName}', '${itemsText}', '${note}', '${timeStr}')" class="w-full bg-gray-900 border border-gray-800 hover:border-gray-700 text-gray-400 hover:text-white py-1.5 rounded-xl text-[10px] font-bold transition flex items-center justify-center space-x-1.5 mt-1 cursor-pointer">
                                <i class="fas fa-print"></i>
                                <span>พิมพ์ใบสั่งครัวอาหาร (Print)</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            updateStats(pending, completed, cancelled, orders.length);
        }

        function updateStats(pending, completed, cancelled, total) {
            document.getElementById("stat-pending").innerText = pending;
            document.getElementById("stat-completed").innerText = completed;
            document.getElementById("stat-cancelled").innerText = cancelled;
            document.getElementById("stat-all").innerText = total;
        }

        function renderEmptyBoard(message) {
            document.getElementById("orders-container").innerHTML = `
                <div class="col-span-full py-20 text-center text-gray-500">
                    <i class="fas fa-folder-open text-4xl text-gray-700 mb-3 block"></i>
                    <p class="text-sm font-bold text-gray-400">${message}</p>
                </div>
            `;
        }

        async function updateOrderStatus(orderId, newStatus) {
            if (!confirm(`คุณน้าแน่ใจใช่ไหมครับว่าต้องการปรับสถานะออเดอร์ #${orderId} เป็น "${newStatus}"?`)) return;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "updateOrderStatus",
                        order_id: orderId,
                        status: newStatus
                    })
                });
                const result = await response.json();
                if (result.success) {
                    alert(`ปรับปรุงสถานะออเดอร์ #${orderId} เรียบร้อยแล้วครับน้า!`);
                    fetchOrders(); // โหลดข้อมูลอัปเดตใหม่ทันที
                } else {
                    alert(`ไม่สามารถอัปเดตออเดอร์ได้: ${result.message}`);
                }
            } catch (error) {
                console.error(error);
                alert("ส่งสถานะอัปเดตไปยังคลาวด์ไม่สำเร็จ แต่ข้อมูลอาจอัปเดตแล้ว กรุณากดรีเฟรชออเดอร์อีกครั้งครับ");
                fetchOrders();
            }
        }

        function triggerPrint(orderId, roomNo, guestName, itemsText, note, timeStr) {
            const printArea = document.getElementById("print-area");
            
            // โครงสร้างหน้าเอกสารพิมพ์ใบงานสลิปสำหรับครัว
            printArea.innerHTML = `
                <div style="font-family: 'Courier New', Courier, monospace; width: 300px; padding: 10px; color: #000; background: #fff; margin: 0 auto;">
                    <div style="text-align: center; border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 10px;">
                        <h2 style="margin: 0; font-size: 20px;">ROOM SERVICE</h2>
                        <p style="margin: 3px 0 0 0; font-size: 11px;">KITCHEN ORDER SLIP</p>
                    </div>
                    <div style="font-size: 13px; line-height: 1.5; margin-bottom: 10px;">
                        <strong>ROOM: ห้อง ${roomNo}</strong><br>
                        <strong>GUEST: ${guestName}</strong><br>
                        <span>ID: #${orderId}</span> | <span>TIME: ${timeStr}</span>
                    </div>
                    <div style="border-bottom: 1px dashed #000; border-top: 1px dashed #000; padding: 8px 0; margin-bottom: 10px;">
                        <strong style="font-size: 12px; display: block; margin-bottom: 5px;">ITEMS ORDERED:</strong>
                        <div style="font-size: 13px; white-space: pre-wrap; font-weight: bold;">${itemsText}</div>
                    </div>
                    <div style="font-size: 11px; background: #f0f0f0; padding: 6px; border: 1px solid #ccc;">
                        <strong>NOTE / SPECIAL REQUEST:</strong><br>
                        ${note !== "-" ? note : "None"}
                    </div>
                    <div style="text-align: center; margin-top: 25px; font-size: 10px; border-top: 1px dashed #000; padding-top: 10px;">
                        * ขอบคุณสำหรับออเดอร์ บริการเสิร์ฟด่วนถึงห้องพัก *
                    </div>
                </div>
            `;

            // ดำเนินการเปิดหน้าต่าง Print ของบราวเซอร์เพื่อสั่งพิมพ์
            const printContent = printArea.innerHTML;
            const originalContent = document.body.innerHTML;
            
            document.body.innerHTML = printContent;
            window.print();
            document.body.innerHTML = originalContent;
            
            // คืนค่าหน้าจอดั้งเดิมหลังจากปิดกล่องพิมพ์และรีโหลดฟังก์ชันอีกครั้งเพื่อป้องกันการค้าง
            window.location.reload();
        }

        // เริ่มต้นการดึงข้อมูลทันทีเมื่อเปิดหน้ากระดานรับออเดอร์
        window.onload = function() {
            fetchOrders();
            // รีเฟรชออเดอร์อัตโนมัติในทุกๆ 30 วินาที เพื่อไม่ให้ออเดอร์ใหม่ตกหล่น
            autoRefreshInterval = setInterval(fetchOrders, 30000);
        };
    </script>
</body>
</html>
